<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Osmanisches Reich</title>
<style>
/* ── Tokens ── */
:root{
  --c-bg:#f4f3f0;--c-surface:#fff;
  --c-border:#e5e2dc;--c-border-ui:#e0ddd8;
  --c-text:#1a1a1a;--c-text-2:#555;--c-text-3:#888;--c-text-4:#aaa;
  --c-primary:#6d28d9;--c-primary-h:#5b21b6;
  --c-primary-tint:#ede9fe;--c-primary-bg:#faf5ff;--c-primary-ring:#c4b5fd;
  --c-success:#16a34a;--c-danger:#dc2626;
  --c-danger-bg:#fef2f2;--c-danger-border:#fca5a5;
  --c-code-bg:#f8fafc;--c-code-border:#e2e8f0;
}
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--c-bg);color:var(--c-text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Header ── */
#header{flex:0 0 auto;background:var(--c-surface);border-bottom:1px solid var(--c-border-ui);
         padding:10px 24px;display:flex;flex-direction:column;gap:8px;z-index:10}
#stats{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.stat-pill{display:flex;flex-direction:column;align-items:center;padding:4px 10px;
            background:#f9f8f5;border:1px solid var(--c-border-ui);border-radius:4px;min-width:64px}
.sv{font-size:16px;font-weight:700;line-height:1.2}
.sl{font-size:10px;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.04em}
#controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.fb{padding:4px 10px;border:1px solid var(--c-border);border-radius:20px;background:var(--c-surface);
     cursor:pointer;font-size:11px;color:var(--c-text-2);transition:background .15s,color .15s}
.fb.active{background:var(--fc,#333);color:#fff;border-color:var(--fc,#333)}
.fb[data-prec=""]{--fc:#333}
.fc{font-size:10px;opacity:.8}
#src-filter{padding:4px 8px;border:1px solid var(--c-border);border-radius:4px;font-size:11px;
             max-width:280px;background:var(--c-surface)}
#override-btns{display:flex;gap:6px;margin-left:auto}
#btn-export{padding:4px 10px;border:1px solid var(--c-primary);border-radius:4px;
             background:var(--c-surface);color:var(--c-primary);font-size:11px;cursor:pointer;
             transition:background .15s,color .15s}
#btn-export:disabled{border-color:var(--c-border);color:var(--c-text-4);cursor:default}
#btn-export:not(:disabled):hover{background:var(--c-primary);color:#fff}
#btn-recompute{padding:4px 10px;border:1px solid var(--c-border);border-radius:4px;
                background:var(--c-surface);color:var(--c-text-2);font-size:11px;cursor:pointer;
                transition:background .15s}
#btn-recompute:not(:disabled):hover{background:#f3f4f6}
#btn-recompute:disabled{color:var(--c-text-4);cursor:default}
#recompute-log{font-size:11px;color:#374151;background:var(--c-code-bg);
                border:1px solid var(--c-code-border);border-radius:4px;padding:6px 10px;display:none;
                font-family:ui-monospace,monospace;white-space:pre-wrap;max-height:120px;overflow-y:auto}
#recompute-log.error{background:var(--c-danger-bg);border-color:var(--c-danger-border);color:var(--c-danger)}
#cat-controls{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding-top:2px}
.cf{padding:3px 9px;border:1px solid var(--c-border);border-radius:20px;background:var(--c-surface);
     cursor:pointer;font-size:11px;color:var(--c-text-2);transition:background .15s,color .15s}
.cf.active{background:var(--fc,#333);color:#fff;border-color:var(--fc,#333)}
.cf[data-cat=""]{--fc:#333}
#quality-report{display:none;background:#fffbeb;border:1px solid #fcd34d;border-radius:4px;
                 padding:6px 12px;font-size:11px}
#quality-report summary{cursor:pointer;font-weight:600;color:#92400e;user-select:none}
.qr-warn{color:#b45309;margin-top:3px}
.qr-low{color:var(--c-text-3);margin-top:3px}

/* ── Main layout ── */
#main{flex:1 1 0;display:flex;overflow:hidden}

/* ── Timeline ── */
#timeline{flex:0 0 72px;position:relative;background:#fff;border-right:1px solid #e0ddd8;
           overflow:hidden;user-select:none}
.tick{position:absolute;left:0;right:0;display:flex;align-items:center;transform:translateY(-50%);
       cursor:pointer}
.tick:hover .tick-yr{color:#2563eb}
.tick-yr{font-size:10px;color:#bbb;width:36px;text-align:right;padding-right:4px;flex-shrink:0;
          transition:color .15s}
.tick-line{flex:1;height:1px;background:#eee}
.tick[data-decade] .tick-yr{color:#888;font-weight:600}
.tick[data-decade] .tick-line{background:#ccc}
#tl-marker{position:absolute;left:0;right:0;height:2px;background:#2563eb;
            transition:top .2s ease;pointer-events:none;z-index:2}
#tl-marker::before{content:"";position:absolute;left:36px;top:-4px;
                    width:8px;height:8px;background:#2563eb;border-radius:50%}
#tl-year-label{position:absolute;right:4px;font-size:10px;font-weight:700;color:#2563eb;
                transition:top .2s ease;transform:translateY(-100%);pointer-events:none;z-index:2}

/* ── Cards panel ── */
#cards{flex:1 1 0;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}

/* ── Card ── */
.card{background:var(--c-surface);border-radius:6px;border:1px solid var(--c-border);
       border-left:4px solid var(--prec-color,#ccc);
       padding:8px 12px;cursor:default;position:relative;
       transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card.hidden{display:none}
.card.has-override{box-shadow:0 0 0 2px #7c3aed33}
.card-source{font-size:10px;color:var(--c-text-4);margin-bottom:2px;
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 60px)}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.card-time{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--c-text)}
.badge{font-size:9px;text-transform:uppercase;letter-spacing:.05em;padding:1px 5px;
        border-radius:3px;color:#fff;background:var(--prec-color,#999)}
.cat-badge{font-size:9px;padding:1px 6px;border-radius:3px;color:#fff;
           white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.card-text{font-size:12px;line-height:1.55;color:var(--c-text-2)}
.card-page{font-size:10px;color:var(--c-text-4);margin-left:4px}
.card-note{font-size:10px;color:var(--c-primary);margin-top:4px;font-style:italic}

/* ── Edit button ── */
.btn-edit{position:absolute;top:6px;right:8px;padding:2px 7px;
           border:1px solid #d1d5db;border-radius:3px;background:var(--c-code-bg);
           color:var(--c-text-2);font-size:10px;cursor:pointer;line-height:1.4;
           transition:background .12s,border-color .12s}
.btn-edit:hover{background:var(--c-primary-tint);border-color:var(--c-primary);color:var(--c-primary)}
.btn-edit.active{background:var(--c-primary);border-color:var(--c-primary);color:#fff}

/* ── Inline edit form ── */
.edit-form{margin-top:8px;padding:10px;background:#f9f8f5;border-radius:4px;
            border:1px solid var(--c-border-ui);display:flex;flex-direction:column;gap:8px}
.ef-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ef-label{font-size:10px;color:var(--c-text-3);min-width:50px}
.ef-textarea{width:100%;font-size:12px;line-height:1.5;padding:5px 7px;
              border:1px solid #d1d5db;border-radius:3px;resize:vertical;min-height:60px;
              font-family:inherit}
.ef-textarea:focus{border-color:var(--c-primary);outline:none}
.ef-input{padding:3px 7px;border:1px solid #d1d5db;border-radius:3px;font-size:12px;width:72px}
.ef-input:focus{border-color:var(--c-primary);outline:none}
.ef-input-wide{width:100%;padding:3px 7px;border:1px solid #d1d5db;border-radius:3px;font-size:12px}
.ef-check{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--c-text-2);cursor:pointer}
.ef-actions{display:flex;gap:6px}
.btn-save{padding:4px 12px;background:var(--c-primary);color:#fff;border:none;
           border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-save:hover{background:var(--c-primary-h)}
.btn-cancel{padding:4px 10px;background:var(--c-surface);color:var(--c-text-2);
             border:1px solid var(--c-border);border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-cancel:hover{background:#f3f4f6}

/* ── empty state ── */
#empty{display:none;padding:40px;text-align:center;color:#999;font-size:13px}
</style>
</head>

<script>
const DATA = [{"id": "s0031", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Schon seit 1830er interessierte das reich missionarsschulen. Nach krimkrieg viele amerikaner angesiedelt, machen schulen. Das wird als gegengewicht zu russen gutgeheißen, große anzahl führt dann zu sorgen", "time_from": 1830, "time_to": 1830, "precision": "exact", "page": 366, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0067", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Jungosmanen waren für verfassung mit islamischen touch gegen tanzimat als europäische spiegelung", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 489, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0068", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Verfassung drei monate nach thronbesteigung beschlossen, suspendiert wegen krise mit russland und briten, glaibt er nicht an rettung durch veränderung sondern durch kontinuität", "time_from": 1839, "time_to": 1839, "precision": "interpolated", "page": 490, "category": "Reichskrise", "confidence": "high"}, {"id": "s0069", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Tanzimat-zusammenhalt war nch berliner konferenz nicht mehr das richtige, shift zu muslimischer identität", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 491, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0104", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Gleicheitsverständnis aller eigentrlcih eingesetzt, balkanchristen wollen aber eher gleichheit der tanzimat, problem für cup", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 513, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0125", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Arabische regionen gab es auch mehr araber stolz, nach tanzimat und aufstieg in höhere Posiutionen unter abdülhamid. Waren eher liberal als CUP durchgriff. Beleidigung durch türkisch als gerichts- und sekundärschulsprache", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 521, "category": "Reichskrise", "confidence": "high"}, {"id": "s0212", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "osm reich defensive modernisierung (siehe ottoman history podcast, neue art des zugriffs): selim III+MahmudII, Tanzimat, Abdülhamid II", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 8, "category": "Reichskrise", "confidence": "high"}, {"id": "s0070", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Selbstverständnis des reiches als modern wie deutschland etwa, mit kaiser, exotisch wollte man nicht sein", "time_from": 1839, "time_to": 1904, "precision": "interpolated", "page": 491, "category": "Politische Akteure", "confidence": "medium"}, {"id": "s0071", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Islamische identität als gegenstück zu ethnischer europäischer identität", "time_from": 1839, "time_to": 1904, "precision": "interpolated", "page": 492, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0105", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Bulgarien unabhängigkeit, bosnien herzegowina von wien annektiert, kreta von griechenland", "time_from": 1839, "time_to": 1908, "precision": "interpolated", "page": 513, "category": "Reichskrise", "confidence": "high"}, {"id": "s0106", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Bei den wahlen trat libertale uznion gegen cup an, eine eminenz darin ist sabaheddin bey", "time_from": 1839, "time_to": 1908, "precision": "interpolated", "page": 513, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0107", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Abdülhamid knirscht zähne, kommt nicht zum parlament usw, das wird ihm übel genommen", "time_from": 1839, "time_to": 1908, "precision": "interpolated", "page": 514, "category": "Reichskrise", "confidence": "high"}, {"id": "s0074", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Es entwickelte sich seit 1856 (tanzimat) eine syrische identität, die durch gemeinsame sprache getragen war und glauben überbrückte. Provinzen damaskus, sidon und tripoli zu einer superprovinz zusammengefasst – passt nicht mit islam vision abdülhamids zusammen, sayyadi ist sein propagandist. Verteilung islamistischer propaganda, zensur der presse in syrien, alles musste über istanbul gehen", "time_from": 1856, "time_to": 1856, "precision": "exact", "page": 496, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0075", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Religionsfreiheit 1856 dadurch missionare, daher religionsunterricht etc dringender", "time_from": 1856, "time_to": 1856, "precision": "exact", "page": 497, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0218", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "Nahda führt zu arab identität. promulgation of the 1856 Edict führt zu ethniendifferenz. Priv christen führt zu spannungen, auch damaskus 1860, das führt zu europ intrevention", "time_from": 1856, "time_to": 1860, "precision": "exact", "page": 19, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0076", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Abdülhamid war an sich konservativ, wollte reich erhalten und war generell vorsichtig, aber wirtschaft muss laufen, bisschen bürokratie auch ändern. Aber militär und verwaltung bekommen 690% haushalt, public works, bildung etc 5%, 30% war schuldendienst", "time_from": 1856, "time_to": 1891, "precision": "interpolated", "page": 499, "category": "Reichskrise", "confidence": "high"}, {"id": "s0077", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Zentralisierung als lehre aus loslösiung der balkanprovinzen", "time_from": 1856, "time_to": 1891, "precision": "interpolated", "page": 500, "category": "Reichskrise", "confidence": "high"}, {"id": "s0078", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Konstitutionalist midhat pasha ermordet weil konstitutionalist, dann verdeckt, weil angst vor folgen (alles durch sultan", "time_from": 1856, "time_to": 1891, "precision": "interpolated", "page": 501, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0079", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Kurden rekrutiert, die immer sehr unabhängig waren, um armenier zu kontrollieren, formalisierung für integrations ins reich, dann aber doch hamidiya regimente grausam, intervention briten, frankreich, russland", "time_from": 1856, "time_to": 1891, "precision": "interpolated", "page": 502, "category": "Reichskrise", "confidence": "high"}, {"id": "s0080", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Intellektuelle wollen auch reich erhalten, waren aber unzufrieden mit abdülhamid, wegen autokratie, offensichtlichem scheitern das auseinanderfallen zu stoppen", "time_from": 1856, "time_to": 1891, "precision": "interpolated", "page": 504, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0284", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Mt lebanon etwas anders wegen ruhe nach 1860", "time_from": 1860, "time_to": 1860, "precision": "exact", "page": 95, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0376", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Vor tanzimat waren millets einigermaßen selbstverwaltet, als sultans protected flock, konnten aber bei hoher Politik nicht mitreden. Tanzimat macht alle gemeinschaften gleich, erwartet damit auch loyalität. Damit geht auch einher: neue gerichte, neue formen landbesitz, neue steuern. Tanzimat wird nachahmen des westens vorgeworfen, manche versuchen altes system wiederherzustellen. 1860 mt lebanon maroniten vs drusen war konflikt im rahmen von tanzimat – mt leb als provinz mit christ. Gouverneur lässt viele darüber nachdenken, was ihr status im reich sein soll 15-", "time_from": 1860, "time_to": 1860, "precision": "exact", "page": 18, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0377", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Ausländische mächte haben einfluss über handelsbeziehungen, schulen etc, sorge des hohen pfote", "time_from": 1860, "time_to": 1881, "precision": "interpolated", "page": 18, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0219", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "1861 Règlement Organique for Lebanon umorganisation durch osm reich, christliche händklerklasse, arabs für schutz durch osm reich", "time_from": 1861, "time_to": 1861, "precision": "exact", "page": 19, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0220", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "Arabs: nahda und islamische identität, zwei parallele entwicklungen", "time_from": 1861, "time_to": 1908, "precision": "interpolated", "page": 20, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0221", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "Erste kosnt periode ist wichtig für araber diskussionen, als abdülhamid konst aufhebt, gehen viele nach ägypten, rida und al azm gründen Ottoman Consultative Society und al manar (also in ägypten) „The society, composed of Turks, Arabs, Armenians, Greeks, and Kurds, intended to unite the Ottoman nationalities in order to transform the Ottoman govern- ment into a constitutional regime and prevent the empire’s collapse.“", "time_from": 1861, "time_to": 1908, "precision": "interpolated", "page": 20, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0222", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "Abdülhamid hat angst vor abspenstigen arabern, zieht sie an den hof, konservative als seine berater, hijaz und syrien werden damit wichtiger am hof", "time_from": 1861, "time_to": 1908, "precision": "interpolated", "page": 20, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0213", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "jungosmanen 1865 – 1878, gegen tnzimat weil imitation des westens", "time_from": 1865, "time_to": 1878, "precision": "exact", "page": 8, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0364", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "The official Ottoman press began to be published in the 19th century and was followed by the emergence of the private press. The transformation of the literary public spheres into political public spheres in the modern sense took place in the second half of the 19th century, reaching its peak with the promulgation of the Otto- man constitution in 1876.6 In fact, the creation of private press and the proliferation of the ethnic press in the second half of the 19th century further developed the notion of multiple public spheres as opposed to the public sphere dominated by the Ottoman ruling elite. Hence, public spheres already existed among the ethnic groups in the first half of the 19th century.", "time_from": 1876, "time_to": 1876, "precision": "exact", "page": 191, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0022", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Volkszählung: 20,4 mio menschen, ¾ Muslime", "time_from": 1877, "time_to": 1830, "precision": "interpolated", "page": 357, "category": "Reichskrise", "confidence": "high"}, {"id": "s0023", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Kapitulationen waren teil der osmanisches modernisierungspolitik, ging von entwicklung aus, wehrte sich nicht", "time_from": 1877, "time_to": 1830, "precision": "interpolated", "page": 359, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0024", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Public debt administration hatte mehr beamte als das Finanzministerium, Bruttoeinnahmen von 30% des Staatshaushaltes. Immer noch besser als ägypten, wo einfach beschlagnahmt wurde", "time_from": 1877, "time_to": 1830, "precision": "interpolated", "page": 359, "category": "Reichskrise", "confidence": "high"}, {"id": "s0025", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Landwirtschaft kapitulationen tabak und baumwolle", "time_from": 1877, "time_to": 1830, "precision": "interpolated", "page": 363, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0027", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Abdülhamids kulturpolitik stellte sich gegen koloniale prägung und zustrom muslimischer einwanderer aus Balkan und kaukasus", "time_from": 1877, "time_to": 1830, "precision": "interpolated", "page": 364, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0028", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Fußnote bildung cioleta islamic benevolent societies – über damaskus als ausnahme in Bildungspolitik", "time_from": 1877, "time_to": 1830, "precision": "interpolated", "page": 364, "category": "Politische Akteure", "confidence": "medium"}, {"id": "s0029", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Medresen wurden nicht reformiert, da jemandes turf für ausnahme von Militärdienst", "time_from": 1877, "time_to": 1830, "precision": "interpolated", "page": 366, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0030", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Nichtmuslime hatten normalerweise eigene schulen, wer es sich leisten konnte, schickte seine kinder ins ausland, andere option missionarsschulen", "time_from": 1877, "time_to": 1830, "precision": "interpolated", "page": 366, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0021", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Parlament hatte zweit sitzungen, dann 1877 ende, verfassung mit verfassung außer kraft gesetzt, autoren verbannt", "time_from": 1877, "time_to": 1877, "precision": "exact", "page": 354, "category": "Reichskrise", "confidence": "high"}, {"id": "s0143", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Verfassung 1877 war sehr schwach, keine parteien rechte, parlament als nette berater. Echtes limit des sultans war die bürokratie der hohen pforte, und die hat abdülhamid wirklich zurück gedrängt, macht zentralisiert und damit die möglichkeit des militärs geschaffen, ihn loszuwerden", "time_from": 1877, "time_to": 1877 , "date_raw": null, "text": "aremnier erste öffentliche sphäre 1. Konst periode, dann muslim zuwanderung, macht stress in agragland,hoffen erst auf sozialismus, dann auch europäer. Arf für osm reich, hunchaks dagegen. Massaker sassun 1894, europ untersuchung, reformforderung, sultan will nicht 9ff", "time_from": 1894, "time_to": 1894, "precision": "exact", "page": null, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0176", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "When Kıbrıslı Kâmil Pascha (leader of the last effort of officialdom to restore responsible government in 1895)31 attempted to place the Sublime Porte above the parliament and the CUP, he received the first vote of no confidence in Ottoman history, on 13 February 1909. (bürokraten können parlament nicht ignorieren", "time_from": 1895, "time_to": 1909, "precision": "exact", "page": 80, "category": "Reichskrise", "confidence": "high"}, {"id": "s0072", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Bau einer bahn von damaskus nach median 1900 -1908", "time_from": 1900, "time_to": 1908, "precision": "exact", "page": 495, "category": "Reichskrise", "confidence": "high"}, {"id": "s0035", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "1902 Generalkongress der osm Opposition 1902 in Paris Spaltung in Konstitutionalisten, Materialisten und Anarchisten.  Wichtigste spaltfrage: einmischung ausländischer Mächte in Riech", "time_from": 1902, "time_to": 1902, "precision": "exact", "page": 371, "category": "Reichskrise", "confidence": "high"}, {"id": "s0083", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Abdülhamid unterdrückte KEF erfolgreich im innern, will aber au ch dass europ mächte mitmachen. Aber in paris wurde 1902 sogar kongress kef erlaubt (wichtig dabei der sohn des schwiegersohns abdülhamids sabaheddin", "time_from": 1902, "time_to": 1902, "precision": "exact", "page": 505, "category": "Reichskrise", "confidence": "high"}, {"id": "s0138", "source": "Resat Kasaba - The Cambridge History of Turkey", "date_raw": null, "text": "hief ideologue of the CUP was Ahmed Rıza Bey, paris studiert agrikult, atheist, positivist, zeitschrift Me ̧sveret untertitel order and progress. murad bey, zeitschrift Mizan, literatur, stress mit regime, exil ägypten, frankreich. Sabaheddin, prinz und liberal, allianz mit brioten, armeniern, seine fraktion verliert bei spaltung 1902", "time_from": 1902, "time_to": 1902, "precision": "exact", "page": 59, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0194", "source": "The young Turks in opposition / M. Şükrü Hanioğlu  AAI 4: Wi 6085", "date_raw": null, "text": "Bis 1902 konservative, dann aktivistich-konservativ, jünger Ahmed Riza", "time_from": 1902, "time_to": 1902, "precision": "exact", "page": 213, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0195", "source": "The young Turks in opposition / M. Şükrü Hanioğlu  AAI 4: Wi 6085", "date_raw": null, "text": "Finanzierung durch: sale of journals, erpressung um an posten im palast zu kommen", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 214, "category": "Reichskrise", "confidence": "high"}, {"id": "s0196", "source": "The young Turks in opposition / M. Şükrü Hanioğlu  AAI 4: Wi 6085", "date_raw": null, "text": "Waren nie so tolle liberale/Konstitutionalisten, eher le Bon", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 214, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0197", "source": "The young Turks in opposition / M. Şükrü Hanioğlu  AAI 4: Wi 6085", "date_raw": null, "text": "Hatten bisschen das problem, positivismus und islam zusammen zu bringen, waren erstmal materialisten", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 215, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0215", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "arf Avedis Aharonian und hunchaks und jungtürken erst zusammen, 1902 auf kongress, armener für dezentr, jungtürken zetralisierung, armenier gehen", "time_from": 1902, "time_to": 1902, "precision": "exact", "page": 14, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0233", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Araber Fuad Paşa, kerkesse born ägypten, held russ-türk krieg, marschall, 1902 beschuldigt gegen sultanzu intrigieren und nach damaskus verbannt, freigelassen bei feier durch druck der straße, dann gebet ummayyadenmoschee. 6. August nach Beirut, großer empfang, dabei riza bey cup und jurji bey sursuq, besuch bei freimaurern, am 12. August nach Istanbul", "time_from": 1902, "time_to": 1902, "precision": "exact", "page": 35, "category": "Reichskrise", "confidence": "high"}, {"id": "s0234", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Prinz sabahhedin gilt armeniern als helden, weil er für dezentralisierung war", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 35, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0235", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Gab planung für feiern, mussten draußen und relig neutral sein: . Taksim Garden (Istanbul), Municipal Garden (Adana), Hamidian Garden (Beirut), the Garden of the Defterdar (Damascus), and the Municipal Garden (Jerusalem). Oftmals garnicht dekoriert, natura ls deko. Viele beginnen aber in kirchen, die umdekoriert warden. Aber nicht in moscheen/synagogen", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 36, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0236", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "In the postrevolutionary period, however, this function was thrown into the public domain. The public spheres of the postrevolutionary period seized symbolism from the monopoly of the state and the sovereign, appropriating it in an attempt to create a unified and overarching identity that itself became counterproductive.", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 40, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0237", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Wichtigstes symbol der revolution ist flagge, reden wurden teilweise in verschiedene sprachen übersetzt. Teilwesie begeleitung durch faggen von ethnien", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 41, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0238", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Gab banner wo verschiedene sprachen drauf waren symbol der solidarität. Teilweise auch aus versdcheidenen relig. Büchern. Revolution als göttliche intervention", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 44, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0239", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "In zeitungen thema, dass teilweise reden nicht verstanden werden können wegen sprachdifferenzen", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 46, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0240", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Rafiq Bey al-‘Azm führender intellektueller in damaskus sagt erste konst periode war nation noch nicht bereit, jetzt ja", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 46, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0241", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Viele reden über bruderschaft zwischen ethnien. Märtyrer der muslime und der armenier gemeinsam auf friedhof zb", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 47, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0242", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Generally, the speeches ended with hand shaking and hugging between spiritual leaders of different ethnic groups. This symbolic move was a practical implementation of the principle discussed in the speeches. At one of the celebrations in Damascus, Sheikh ‘Abd al-Qadir al-Khatib al-Mughrabi made this connection particularly explicit. After comparing the despotic re- gime with the constitutional regime and defying fanaticism, he shook the hand of the Greek Catholic bishop", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 47, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0243", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "With their condensation of meaning and multivocality, symbols demonstrated the existence of an ambiguous common symbolic culture aimed at uniting all ethnic groups under one identity: Ottomanism.", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 48, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0244", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "euphoric feelings were particularly connected to the par- ticipation of subordinate groups as a legitimizing force for the Revolution and a consecration of the new era.", "time_from": 1902, "time_to": 1902, "precision": "interpolated", "page": 48, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0387", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "1902 spaltung cup, sabahhedin wollen schnell revolution (mit briten, scheitert), Riza gradueller. Mehr struktur cup Bahaeddin’s, Nazim", "time_from": 1902, "time_to": 1902, "precision": "exact", "page": 29, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0084", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Sabaheddin fraktion, mit armeniern verbündet für äußere intervention vs fraktion umahmed riza, bürokrat, kategorisch gegen äußere Intervention. Nicht intervention gruppe kleiner, aber seit beginn kef dominant", "time_from": 1902, "time_to": 1905, "precision": "interpolated", "page": 505, "category": "Politische Akteure", "confidence": "medium"}, {"id": "s0085", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Europäische presse feiert natürlich interventionistenfraktion", "time_from": 1902, "time_to": 1905, "precision": "interpolated", "page": 505, "category": "Reichskrise", "confidence": "high"}, {"id": "s0086", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Sabaheddin gruppe versucht mit mazedonischer, albanischer und armenischer hilfe ausländische hilfe für putsch zu bekommen, rizas gruppe versucht besserre Organisation für die Zukunft und fokussiert sich auf Türken/muslime. Islam als bindendes Nationalbewusstsein, nicht unbedingt so religiös", "time_from": 1902, "time_to": 1905, "precision": "interpolated", "page": 505, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0087", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Riza war eigentlich eher graduell, abgelöst von Bahaeddin sakir, revolutionär, der sogar armenier ansprechen will, die lehnen aber ab, gründet Committee of Progress and Union (CPU), mitglieder laden militärs ein, idee evtl von deutschen armeetrainer freiherr von Goltz – führt zu idee militär-politik-nexus, einige natürlich dagegen", "time_from": 1902, "time_to": 1905, "precision": "interpolated", "page": 506, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0388", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Talat verhandelt merger cup und ottoman freedom soc (bio dateils Talat und Enver", "time_from": 1902, "time_to": 1909, "precision": "interpolated", "page": 31, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0389", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Bei nachricht dass es klappt mit revolution rufe thessaloniki „down with the spies“, weil erfolg gegen europa abspaltung balkan", "time_from": 1902, "time_to": 1909, "precision": "interpolated", "page": 33, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0390", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Einige kommentatoren bei cup putsch sind vorsichtig, weil cup soviele muslime sind", "time_from": 1902, "time_to": 1909, "precision": "interpolated", "page": 34, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0177", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Parlament nervt cup, auch sorge, dass es ethnische spannungen verstärkt. Abschaffen geht nicht, also über kabinett umgehen", "time_from": 1902, "time_to": 1913, "precision": "interpolated", "page": 80, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0178", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Alles entmachtet, einzig mächtige noch: die armee. Cup organisiert freiwilligenverbände. Armee ist mehr als für krieg es ist colmar von goltzes „Nation unter waffen“", "time_from": 1902, "time_to": 1913, "precision": "interpolated", "page": 81, "category": "Reichskrise", "confidence": "high"}, {"id": "s0179", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Legitimationsressourcen: Armeegeist und „Das Volk“ enver zwingt großwesir beim rücktritt zu schreiben es sei aufdruck des volkes und der armee", "time_from": 1902, "time_to": 1913, "precision": "interpolated", "page": 82, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0073", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Abdülhamid holte araber an den hof, „geiseln“ die für araber in ihren provinzen verantwortlich waren. Darunter abal huda al sayyadi", "time_from": 1904, "time_to": 1856, "precision": "interpolated", "page": 495, "category": "Reichskrise", "confidence": "high"}, {"id": "s0217", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "18. jh reformen nicht so relevant bei arabern, erst bemerkbar 2. Hälfte 19. Jh. werden garnicht als gruppe wahrgenommen, weil sie in ihren gebieten die mehrheit sind", "time_from": 1905, "time_to": 1858, "precision": "interpolated", "page": 18, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0036", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "KEF Schlaf bis 1905, dann eindruck Russ revolution 1905", "time_from": 1905, "time_to": 1905, "precision": "exact", "page": null, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0088", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Russ revolution 1905 gibt revolutionären auftrieb, liberale wurden da auch von ereignissen abgehängt, außerdem iran revolution", "time_from": 1905, "time_to": 1905, "precision": "exact", "page": 506, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0098", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Aufstände gegen steuern wie in anatolien 1905", "time_from": 1905, "time_to": 1905, "precision": "exact", "page": 511, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0169", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "The crucial reorganisation of the CUP on the road to revolution was carried out by Dr Bahaeddin S ̧akir, a representative of the activist faction, in 1905–6. The shift to an activist platform marginalised the hitherto predominant intellectuals within the Committee. Dr Bahaeddin S ̧akir, frequently described as the Stalin of the CUP, and Dr Naˆzım, another of the architects of the reorganisation, became the e ́minences grises of the organi- sation. Although they distanced themselves from intellectual debate, they also represented the Turkist ideological strand within the Committee. The hand of the men of action was strengthened by the merger with the Ottoman Free- dom Society, following which Talaˆt Bey (Pas ̧a), organiser of dissident activity in Salonica, rose to prominence.", "time_from": 1905, "time_to": 1905, "precision": "exact", "page": 75, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0216", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "Armenian revolutionary Federation und juntürken annäherung 1905-8, auch wegen sabahhedin", "time_from": 1905, "time_to": 1905, "precision": "exact", "page": 15, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0089", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Unruhen 1905 1907 in anatolien wegen einberufung für jemen krieg – will muslimischer großherrscher sein, aber alle werden wütend. 1906 sogar rebellion armenier muslime zusammen gegen steuern", "time_from": 1905, "time_to": 1907, "precision": "exact", "page": 507, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0037", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Revolutionsausbruch in Mazedonien (Manastir, Kosovo, Saloniki) ort mehr christen als muslime, weil berliner kongress diese gebiete als europ eigeteilt hatte wegen der Bevölkerung, Muslime bildeten keine einheitliche gruppe. Welle auswanderung weil entweder für Regie comany (tabak) arbeiten oder gehen, außerdem landenteignungen", "time_from": 1905, "time_to": 1908, "precision": "interpolated", "page": 372, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0099", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "CPU in mazedonien wendet sich nicht nur an muslime oder türken", "time_from": 1905, "time_to": 1908, "precision": "interpolated", "page": 511, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0170", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Cup gab schon mehr als enver und cemal bey, es gibt intellektuelle, Mehmed Cavid Bey, a financial expert, and Kara Kemal Bey, an organiser of societies and cooperatives, und soziologen Ziya Go ̈kalp aber das gremium sorgt dafür, dass niemand hervorsticht", "time_from": 1905, "time_to": 1912, "precision": "interpolated", "page": 75, "category": "Politische Akteure", "confidence": "medium"}, {"id": "s0171", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Cup wird mehr massenpartei, aber gleichzeitig konspirativ, vermeidet verwirklichung ein parteien staat", "time_from": 1905, "time_to": 1912, "precision": "interpolated", "page": 75, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0139", "source": "Resat Kasaba - The Cambridge History of Turkey", "date_raw": null, "text": "militärs haben von ihren gegnern, mazedonischen gangs gelernt, sind hands on, nicht mehr glorifizierte debattiergesellschaft. Gründeten osm freedom society 1906, übernehmen effektiv cup", "time_from": 1906, "time_to": 1906, "precision": "exact", "page": 60, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0090", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Agrarprodukte nicht gut besteuern (willkür) und weltmarkt nicht kompetetiv", "time_from": 1906, "time_to": 1907, "precision": "interpolated", "page": 507, "category": "Reichskrise", "confidence": "high"}, {"id": "s0091", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Cpu hatte keine rolle in anatolien, aber sabahhedin gruppe neue orga league of private Initiative and decentralization war dabei, neue verbindungen zu provinzanführern", "time_from": 1906, "time_to": 1907, "precision": "interpolated", "page": 508, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0093", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "1906 thessaloniki geheimorganisation ottoman freedom society anführer Talat Bey, außerdem mitglieder der dritten armee aus thessaloniki, darunter Ismail Enver, 1907 merge mit CPU, aber noch eigenständige Orga. Ziel: Verfassung wiedereinsetzen. Neue kraft CPU und basis in thessaloniki 508f", "time_from": 1906, "time_to": 1907, "precision": "exact", "page": null, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0140", "source": "Resat Kasaba - The Cambridge History of Turkey", "date_raw": null, "text": "sultantrupen gegen cup weigern sich zu kämpfen", "time_from": 1906, "time_to": 1909, "precision": "interpolated", "page": 60, "category": "Reichskrise", "confidence": "high"}, {"id": "s0092", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "1907 neuer Oppositionskongress in paris unter Riza und sabahhedin Bey, khachatur maloumian von den Dashnaks, spannungen wegen misstrauen gegen armenierallianz", "time_from": 1907, "time_to": 1907, "precision": "exact", "page": 508, "category": "Politische Akteure", "confidence": "medium"}, {"id": "s0145", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Wichtig: merger 1907 cpu und ottom freedom society, neue basis, mehr osmanismus, weniger turkismus, man will alle als support, auch nicht muslime, damit europäer nicht eingreifen", "time_from": 1907, "time_to": 1907, "precision": "exact", "page": 64, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0146", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Zwei beweggründe geht los 3. juli: england russland wollen reform, Gerüchte abdülhamid will zugreifen", "time_from": 1907, "time_to": 1908, "precision": "interpolated", "page": 64, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0147", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Incredibly, the revolution was so localised at the outset that news of it did not reach the public in Istanbul, the Asiatic provinces and Tripoli of Barbary until after the reinstatement of the constitution.", "time_from": 1907, "time_to": 1908, "precision": "interpolated", "page": 65, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0148", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Leute freuen sich dass jetzt alles besser wird, steuern etc, aber cup spricht schon vpn periode der implementeirung und aktion", "time_from": 1907, "time_to": 1908, "precision": "interpolated", "page": 65, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0101", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Diskussion zar nikkolaus und edward vii 9-12. Juni in tallinn, angst vor euro intervention führrt zu guerilla cpu", "time_from": 1908, "time_to": 1839, "precision": "interpolated", "page": 511, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0102", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Kontrolle erreicht übe makedonien, abdülhamid setzt bis 24. Juli verfassung ein und kündigt wahlen an nach drohung marsch auf istanbul", "time_from": 1908, "time_to": 1839, "precision": "interpolated", "page": 512, "category": "Reichskrise", "confidence": "high"}, {"id": "s0103", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Konstitutionelle monarchei, cpu wird zu cup. Aber eigentlich haben die keine lust auf parlamentarischen pluralismus, wollen rat der ethnien sein, die unter bedingungen der cup kooperieren. Parlament daher eliteprojekt", "time_from": 1908, "time_to": 1839, "precision": "interpolated", "page": 512, "category": "Politische Akteure", "confidence": "medium"}, {"id": "s0193", "source": "The young Turks in opposition / M. Şükrü Hanioğlu  AAI 4: Wi 6085", "date_raw": null, "text": "Cup hatte viele Fraktionen, ist eigent,ich schon zuviel gesagt, so wenig zusammenhalt. Ihre gegner später kamen auch aus CUP: Liberale Sabahhedin Bey, Ulama Huca Kadri und Hoca Muhiddin", "time_from": 1908, "time_to": 1902, "precision": "interpolated", "page": 213, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0033", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "KEF/Jungtürken (europäische Bezeichnung) waren sehr unterschiedliche, hatten wenig gemein außer Gegnerschaft zu Abdülhamid", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 370, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0038", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Jeden monat 1908 100 polit morde in unruheprovinz, außerdem Dürre – provinz großer auflösung und europ einmischung", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 374, "category": "Reichskrise", "confidence": "high"}, {"id": "s0039", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Treffen Juni 1908 könig edward und Zar Nikolaus II in Tallinn getroffen, um osm zur aufgabe mazed zu zwingen – grund für revolution, nach zwei wochen hatten die rebellen die provinz unter kontrolle, führung Ismail enver und ahmed nayazi", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 374, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0040", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Konzession des sultan: verfassung widerherstellen 7. Juli 1908", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": null, "category": "Reichskrise", "confidence": "high"}, {"id": "s0041", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Erster schuss des zerfallskriegs: Semsi Pascha in Manastir 7. Juli 1908 ermordet. Alle fangen an um das erbe des reiches zu kämpfen.", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 374, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0100", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "13. mai 1908 ultimatum an den sultan verfassung einzusetzen", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 511, "category": "Reichskrise", "confidence": "high"}, {"id": "s0108", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Soziale und ökonomische freiheiten 1908, auch kleidung für frauen, aber auch ansammlungen von unzufriedenen damit, wollen sitten weil reich auseinanderfällt, gegen theater, tavernen, fotografie, für verschleierung", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 514, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0109", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Auch neue freiheit genutzt für streiks, bahn und minen. Ein drittel der 200.000 – 250.000 arbeiter haben irgendwann gestreikt. Erste gesetzte gegen streik schon oktober 1908, bevor parlament wieder offen. Gewalt gegen streikende, cup hatte keine zeit für das Volk", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 515, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0149", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "The Young Turk Revolution overthrew the Hamidian regime under the banner of ‘Liberty, Equality, Fraternity and Justice’", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 65, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0150", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "They envisaged a parliamentary democracy headed by a responsible government and administered by a meritocratic bureaucracy. They expected political parties to replace age-old institutions, such as notable houses and religious orders, as the principal mediums of political participation. They stood for a new fraternal Ottoman identity, united against European intervention in the affairs of the empire. They spoke of a free press, and of virtually unlimited individual liberties. Very few of these things came to pass.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 66, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0151", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Jungtürkenrevolution ungewöhnlich: konservativ, restaurativ, nicht zerstörend, einparteienherrschaft", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 66, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0152", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Neue freiheiten der kosnt ära machten richtig den deckel auf für alles mögliche: arbeiter, steuern, frauen, aber viel unruhe und da appeliert cup erst, dann verbietet sie", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 67, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0153", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "1908 wahlen überraschend frei, öffentliche freude", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 67, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0181", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "he relative freedom of the first few years after 1908 did not do away with existing tensions; on the contrary, it aggravated them. Thus CUP policies only made things worse. The cancellation of all privileges of non-Turkish Muslim groups, the launching of an aggressive centralisation campaign and the demand that all citizens place their Ottoman identity above any other – all these were bound to provoke a strong reaction.", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 83, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0182", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "ticket cup war Europa behalten, sind dann in verantwortung und 1908 als österr ungarn bosnien und herzegowina annektiert können sie nur protestieren", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 84, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0192", "source": "The young Turks in opposition / M. Şükrü Hanioğlu  AAI 4: Wi 6085", "date_raw": null, "text": "Formierung Jungtürken an der Royal Medical Academy", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 71, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0201", "source": "The Young Turk revolution and the Ottoman Empire : the aftermath of 1908 / edited by Noémi Lévy-Aksu and Franc̜ois Georgeon aai 4: Wi 1103", "date_raw": null, "text": "
