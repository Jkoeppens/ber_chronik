evident among Armenians, Greeks, and Bulgarians. After all, not until 1911 did Zionism and its projects in Palestine attract the criticism of many Arab deputies.", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 147, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0401", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Liberale entende partei 1911 sabahhedin als gegenbewegung zur zentralisierungspolitik", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 42, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0409", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Balkan krieg, bulgarien, libyen, später noch jemen", "time_from": 1911, "time_to": 1911, "precision": "event", "page": 55, "category": "Reichskrise", "confidence": "high"}, {"id": "s0185", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Route mittelmeer von italienern, ägypten von briten blockiert, verteidigung tripoli erstaunlich gut – wird genau beobachtet. Italiener greifen rhodos etc an, um druck zu erhöhen", "time_from": 1911, "time_to": 1912, "precision": "interpolated", "page": 87, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0186", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Balkan bricht aber krieg aus, da wird tripoli abgegeben. Takaway: können die küsten nicht verteidigen, navy nicht leisten – brauchen wirklich großen bruder", "time_from": 1911, "time_to": 1912, "precision": "interpolated", "page": 87, "category": "Reichskrise", "confidence": "high"}, {"id": "s0173", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Problem Cup: imperium erhalten ist keine begeisterungsaufgabe für die massen, außerdem sind viele auch unzufrieden mit dem reich – besonders schwierig türkisten und unglückliche am rande des reiches", "time_from": 1912, "time_to": 1902, "precision": "interpolated", "page": 78, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0174", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Schon vor sultan „Putsch“ hatte sultan sich kabinettsbenennungen herausnehmen wollen, cup suchte ausrede ihn loszuwerden", "time_from": 1912, "time_to": 1902, "precision": "interpolated", "page": 78, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0175", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Neuer sultan dienlicher, bekommt sogar befugnis parlament aufzulösen: praktisch, wenn er hört", "time_from": 1912, "time_to": 1902, "precision": "interpolated", "page": 79, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0057", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Sturz kabinett KEF durch “Retteroffiziere“", "time_from": 1912, "time_to": 1910, "precision": "interpolated", "page": 381, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0058", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Viele gebietsverluste, krieg in catalca, 50 km vor istanbul, fast nichts mehr übrig von europäischen besitzungen, edirne, janina und shköder belagert", "time_from": 1912, "time_to": 1910, "precision": "interpolated", "page": 381, "category": "Reichskrise", "confidence": "high"}, {"id": "s0059", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Edirne wurde belagernt rettungsoffiz bieten teilung an, enver platzt in kabinettssitzung, erschießt großwesir, setzten mahmud sevket pascha an seine stelle", "time_from": 1912, "time_to": 1910, "precision": "interpolated", "page": 381, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0056", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Jemen Revolte gegen KEF herrschaft, albanien revolution, erdbeben Gallipoli 1912, kriegserklärung Montenegro, serbien, bulgarien, griechenland", "time_from": 1912, "time_to": 1912, "precision": "exact", "page": 380, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0164", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Entente sieg bei wahl istanbul, dann cup schnell neuwahlen ausgerufen februar bis april 1912, durch fälschungen gewonnen", "time_from": 1912, "time_to": 1912, "precision": "exact", "page": 72, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0165", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Juli 1912 krise wegen albanien militär meuterei, kabinettskrise, dann kabinett unter Gazi Ahmed Muhtar Pas a, nicht cup unterstützer, senat drängt cup ab? Sind rest abdülhamid regime", "time_from": 1912, "time_to": 1912, "precision": "exact", "page": 72, "category": "Reichskrise", "confidence": "high"}, {"id": "s0166", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "But unknown to the Committee, a secret military organisation, the Group of Saviour Officers, had come into being with the encouragement of a number of high-ranking commanders sidelined by the CUP. On 25 July 1912 this group issued an ultimatum demanding the dismissal of the chamber of deputies. The new, independent grand vezir seized the opportunity to ask the senate, composed of officers and high-ranking officials appointed by the sultan for life, to dismiss the chamber of deputies. Although the senate had little more than ceremonial significance, among its functions was the issue of decrees dissolving the chamber of deputies and calling for new elections, pending approval by the sultan. More significantly, it was an unreformed appendage of the old regime, consisting of prominent Ottomans who owed their careers to the sultan and could therefore be expected to side with the opponents of the CUP if the latter faltered. That the CUP had not seen fit to control this body until 1912 was therefore a serious error. On this occasion, the senate, approving of this civil coup against the CUP, dismissed the chamber convened less than four months before.  – das ist des ende der parlamentsperiode, nicht durch cup beendet", "time_from": 1912, "time_to": 1912, "precision": "exact", "page": 72, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0187", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Balkan eigentlich gespalten, angst vor dt, russland, bulgarien und osmanen. Aber dann machen serben und bulgaren pakt, sehr schlecht fürs reich, griechenland steigt sogar ein, eigentlich rivalen mit bulgarien über makedonien – ganz schlecht fürs reich 1912. Montenegro mit jeweiligen partnern auch abkommen", "time_from": 1912, "time_to": 1912, "precision": "exact", "page": 88, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0406", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "With war raging in the far-off province of Libya, Unionist opponents in the national assembly grew more confident in the wake of the 1912 election. Tensions grew precipitously in the summer of 1912 as a cohort of dissident officers from the Balkans, with the support of Albanian rebels and the Liberal Entente, attempted to stage a coup organized by a shadowy group calling itself the League of Savior Officers. The revolt, which began outside the CUP stronghold of Manastır, created a political firestorm in the capital. Pressured by CUP opponents, the sultan responded to the crisis by appointing a new civilian cabinet and a grand vizier with decidedly anti–Young Turk tendencies. – dann balkankrise, enver putsch (immer angst vor der figure des unabhängigkeitskämpfers", "time_from": 1912, "time_to": 1912, "precision": "exact", "page": 48, "category": "Reichskrise", "confidence": "high"}, {"id": "s0134", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Ausländischer einfluss ist guter sündenbock für cup. Half gegen liberale opposition, die nach auf parlament 1912 stark war. Dann repression nach sevket pasha ermordung Juni 1913 – exekution, nicht wie sonder immer exil", "time_from": 1912, "time_to": 1913, "precision": "exact", "page": 526, "category": "Reichskrise", "confidence": "high"}, {"id": "s0172", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Aufgeblasene unterebeenen cup sollen wie massenpartei wirken. Partei war nicht parallelstruktur zum staat sondern in themensektionen aufgebaut. Strukturreform 1913, viele leute treten dann ein, zentrum nach osten verlegt (nach 1912 nicht mehr jährlich thessaloniki treffen", "time_from": 1912, "time_to": 1913, "precision": "exact", "page": 76, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0188", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "8. oktober macht montenegro kreig, 18. Rest, innerhalb von wochen europ terret verloren, außer scutari, Janina und Edirne", "time_from": 1912, "time_to": 1913, "precision": "interpolated", "page": 88, "category": "Reichskrise", "confidence": "high"}, {"id": "s0132", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Lehre cup: islam als bindekraft nutzen, abdülhamid politik fortsetzen", "time_from": 1913, "time_to": 1912, "precision": "interpolated", "page": 525, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0133", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Ökonomischhre krise 19 jh und europ ausbeutung führte zu halbkolonialen status osm reich. Infrastrukturunternehmen gehörten europäern: versicherungen, eisenbahngesellschaften, banken, häfen. Management der schulden durch 7er gremium, 5 davon ausländer", "time_from": 1913, "time_to": 1912, "precision": "interpolated", "page": 526, "category": "Reichskrise", "confidence": "high"}, {"id": "s0128", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "23. jan 1913 enver putsch gegen konzession edirne aufzugeben, erschoss kriegsminister nazim pasha, erzwang kamils rücktritt,, zwangen sultan mit waffe? Mahmud sevekt pasha zum neuen großwesir zu machen, außerdem kriegsminister (hatte das amt paar monate vorher erst verloren", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 523, "category": "Reichskrise", "confidence": "high"}, {"id": "s0129", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Edirne dann doch verloren, dann doch friedensvertrag von london", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 523, "category": "Reichskrise", "confidence": "high"}, {"id": "s0130", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Enver hatte zwar regierung gestürzrt, militär hat das aber nichts gebracht, sevket pasha diskreditiert, 11 juni 1913 ermordet. Edirne wieder eingemommen weil balkankrieg 2", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 524, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0131", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Putsch januar 1913 zwar cup regierung, aber machtbasis balkan weg. Briten machen propaganda zur spaltung osmanen araber. Arabisch als schul und gerichtssprache wieder eingeführt. Sogar überlegungen hauptstadt aleppo savket pasha, weil nicht so verwundbar, andere schlagen anatolien vor.524", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": null, "category": "Reichskrise", "confidence": "high"}, {"id": "s0167", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Januar 1913 putsch balkankrieg für cup", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 73, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0180", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Cup macht viel presse selbst, dann: ollowing the precedent set byA bdu ̈lhamidII, they also exercised a severe regime of censorship, beginning in 1913. The combination of a skilful propaganda machine, a loyal press and effective restrictions on freedom of speech ensured that CUP policy gained a favourable reception among large parts of the literate population, while the opposition, which initially posed a fierce challenge to the CUP-sponsored press, was effectively silenced, particularly after 1913.", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 83, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0189", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Europäer wollen nicht russ-ungarn konflikt, drängen auf Einigung. Anstelle dessen cup putsch aber doch verlust edirne. Treaty of london 30. März 1913, dann aber resteverwertung osm reich konflikte. Rückeroberung edirne 22. juli", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 89, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0190", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Inevitably, the loss of the European provinces prompted a revision of the geographical image of the empire among the Ottoman ruling elite. For centuries, the empire had rested on two central pillars, Rumelia and Anatolia, between which nested the imperial capital. Suddenly, the Arab periphery almost appeared as part of the new heartland. Some influential politicians and pundits went so far as to propose the removal of the capital from Istanbul to a major town in central Anatolia or northern Syria.5", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 90, "category": "Reichskrise", "confidence": "high"}, {"id": "s0191", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "An sich bettelt osm reich um allianz mit Deutschland, hollweg will das nicht, nur kaiser will das (potenziell bürde im krieg", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 91, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0410", "source": "Talât Pascha : Gründer der modernen Türkei und Architekt des Völkermords an den Armeniern : eine politische Biografie / Hans-Lukas Kieser", "date_raw": null, "text": "Türkismus, Islamismus, Sozialdarwinismus, politisch rechte revolutionäre, ab 1913 ethnonationalismus mit Klassenkampf", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 75, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0061", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Carnegie bericht 1914 über bulgarische Verbrechen in edirne, taktik, nicht zufall", "time_from": 1914, "time_to": 1914, "precision": "exact", "page": 382, "category": "Reichskrise", "confidence": "high"}, {"id": "s0062", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Türken flohen vor christen, bulgaren vor griechen und türken, griechen und türken vor bulgaren, albaner vor serben. Griechische behörden töten bulgarische bewohner von serres, als bulgarische armee kam tötete die die griechen", "time_from": 1914, "time_to": 1914, "precision": "interpolated", "page": 383, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0063", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Balkanerfahrungen verschafften KEF extremisten auftrieb", "time_from": 1914, "time_to": 1914, "precision": "interpolated", "page": 384, "category": "Reichskrise", "confidence": "high"}, {"id": "s0064", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Russ botschaft überreichte frz, engl und dt vertretern vorschläge für reformen, KEF ausgeschlossen, unterschrieben 1914 ostgebiete zu teilen, ohne das wirklich vor zu haben. Einmischung von außen, innen kommt die idee anatolien zu homogenisieren (griechen und armenier raus", "time_from": 1914, "time_to": 1914, "precision": "exact", "page": 385, "category": "Reichskrise", "confidence": "high"}, {"id": "s0135", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Januar 1914 enver kriegsminister und militärgouverneur istanbuls, vorher pasha. Ahmed cemal pasha war in charge für rache an liberalen", "time_from": 1914, "time_to": 1914, "precision": "exact", "page": 526, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0136", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Parlament 1914 mehr araber, aber cup mehrheit, also autokratie", "time_from": 1914, "time_to": 1914, "precision": "exact", "page": 527, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0065", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Völkermord armenier, weil sie mit russen angeblich zusmmenarbeiten, außerdem verluste osm armee anatolien", "time_from": 1914, "time_to": 1923, "precision": "interpolated", "page": 388, "category": "Reichskrise", "confidence": "high"}, {"id": "s0066", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Osman's dream : the story of the Ottoman empire 1300 - 1923 / Caroline Finkel", "time_from": 1923, "time_to": 1923, "precision": "exact", "page": null, "category": "Reichskrise", "confidence": "high"}, {"id": "s0018", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Erwartungen geweckt durch vorhandensein von Verfassung", "time_from": null, "time_to": null, "precision": null, "page": 352, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0019", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Offensive frömmigkeit abdülhamids zur beschwichtigung der sunniten. Andere fühlen sich widerum gegeängelt", "time_from": null, "time_to": null, "precision": null, "page": 353, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0020", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Abdühlhamid mit 33 jahren sehr lange sultan, durch informationtechnik besonders autokratisch", "time_from": null, "time_to": null, "precision": null, "page": 354, "category": "Reichskrise", "confidence": "high"}, {"id": "s0137", "source": "Resat Kasaba - The Cambridge History of Turkey", "date_raw": null, "text": "Abdu ̈lhamid’s reign was ultimately brought to an end by the convergence of two trends: the development of a growing opposition movement both inside and outside the empire; and the re-emergence of the Balkan problem, this time centring on the intractable situation in Macedonia", "time_from": null, "time_to": null, "precision": null, "page": 58, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0142", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Selbstbild revolutionäre: frz rev, am unab, osm revolution. Heute wird verfassungsperiode stiefmütterlich behandelt als zwischenzeit", "time_from": null, "time_to": null, "precision": null, "page": 62, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0224", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Gab parade, einschließelich feier der türkisch-armenischen brüderlichkeit. Gleichzeitig beginn der öffentlichen sphäre", "time_from": null, "time_to": null, "precision": null, "page": 21, "category": "Reichskrise", "confidence": "high"}, {"id": "s0225", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Versuch, civic religion zu gründen", "time_from": null, "time_to": null, "precision": null, "page": 22, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0226", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Feiern sind rituale der öffentlichkeit, gemeinsame sprache, beginn von öffentlichkeit, ohne dass es konsens gab. Delegationen werden im ganzen land begrüßt", "time_from": null, "time_to": null, "precision": null, "page": 23, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0227", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Minderheiten demonstrieren loyalität zu neuem regime (armenier, juden, griechen", "time_from": null, "time_to": null, "precision": null, "page": 24, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0229", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "30. juli damaskus feier von militärakademiestudenten, befreien fouad Pascha, pol gefangenen", "time_from": null, "time_to": null, "precision": null, "page": null, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0231", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "In jerusalem einigkeit in verschiedenheit, viele feiern, arabische gedichte, isaia geschuite (musl, jüd) danach gehen alle in ihre viertel", "time_from": null, "time_to": null, "precision": null, "page": 30, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0232", "source": "The Euphorie oft he Revolution", "date_raw": null, "text": "Kultfiguren der revolution sind: Niyazi and Enver Bey, minderheiten haben jeweilige helden: Madteos II Izmirlian armenischer patriarch istanbul,", "time_from": null, "time_to": null, "precision": null, "page": 32, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0245", "source": "Debating the future of the Empire", "date_raw": null, "text": "Vor der revolution wurde im exil über Zukunft gesrpochen, danach im reich. Vorherrschend freiheit gleichheit brüderlichkeit, frz revolution, was das aber bedeute, ist für gruppen unterscheidlich", "time_from": null, "time_to": null, "precision": null, "page": 50, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0271", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "For those disenfranchised people who were dreaming of freedom, equality, and justice, the Revolution became their savior—the means by which a new and better future would be achieved and by which they themselves would be freed from the shackles of tyranny. For those traditional elites who were wary of the Revolution, however, it became their worst nightmare, shaking the pillars of their authority, endangering not only their power but also their survival.", "time_from": null, "time_to": null, "precision": null, "page": 73, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0272", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Jeweilige ethnische gruppen haben eigene kleine revolution, notablen verlieren posten (paar seiten über armenier, dann juden", "time_from": null, "time_to": null, "precision": null, "page": 74, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0273", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Araber: ihre abgesandten am hof sind teil der machtbalance", "time_from": null, "time_to": null, "precision": null, "page": 87, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0274", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Als revoliution arab provinzen als nachricht erreichte, waren machthaber zögerlich, wollten die verfassung nicht für eingesetzt erklären. Skeptisch wg nachrichtenzuverlässigkeit und wegen stabilität", "time_from": null, "time_to": null, "precision": null, "page": 88, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0275", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "In addition to the local officials, the notables and the ulema were stunned by the news, and some began to voice their opposition to the activities of the junior officers. They were afraid that the Revolution and the shift of the center of power from local authorities to the CUP would endanger their traditional source of legitimacy, power, status, and prestige. Stimmt wohl, erst gründeten sich überall cup kommitees, die dann Thessaloniki unterstellt wurden", "time_from": null, "time_to": null, "precision": null, "page": 88, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0276", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Damaskus: Among the Arab provinces, Damascus was an important center for the ac- tivities of the ulema, in part because the Ummayad Mosque made Damascus a traditional place of Islamic learning. Additionally, the notables in Damas- cus, numbering around fifty families, were a powerful force running the po- litical mechanism.  Transformation aber nicht so erfolgreich wie anderswo im reich", "time_from": null, "time_to": null, "precision": null, "page": 88, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0277", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "In Damascus, the traditional networks of the notables and the ulema were stronger than the newer ties of the Revolution. The old power structures were, nonetheless, affected by the Revolution, which resulted in the emergence of new actors on the political scene, a mixture of military person- nel and civilians, mostly members of the newly emerging CUP branches.88", "time_from": null, "time_to": null, "precision": null, "page": null, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0278", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "As the CUP assumed that role, its first task in Damascus was to remove the ancien régime’s officials from positions of power. Hence, they pressured the governor to dismiss the head of the Administrative Council of the province, the mufti of Damascus, the chief clerk of the şeriat courts, the kaymakam of Zabadani, and Busra Eski-Sham, along with several other district officials.107 These actions caused some discontent among the ulema class,108 resulting in the establish- ment of an association meant to protect its interests.109", "time_from": null, "time_to": null, "precision": null, "page": 89, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0279", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Rida tour nach revolution, rede in ummayadenmoschee, Salih Sharif al-Tunisi unterbricht wegen wahabismus, aufruhr, rida muss gehen, al tunisi festgenommen, dann bewaffneter auflauf fordert tunisis freilassung, wollen de fakto cup ruler syren As‘ad Bey töten, der flieht nach beirut. Ulama gewinnen dann wahl gegen cup, beschuldigen sie des säkularismus. Fußnote hier nicht auf Haqaiq sondern nur muqattam als quelle und erinnerungen", "time_from": null, "time_to": null, "precision": null, "page": 89, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0280", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Beirut wird alter gouverneur aus stadt gescheucht, straßen gesäumt", "time_from": null, "time_to": null, "precision": null, "page": 91, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0281", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Postrevolutionary ethnic politics in the Ottoman Empire should not be viewed only from the prism of political parties but also through ecclesiastical politics, a key factor in defining inter- and intraethnic politics. Interestingly, even though the Revolution attempted to create the modern secular Ottoman citizen whose loyalty was going to be to the state, it nevertheless strengthened the ethno-religious political centers of the ethnic groups. It did so by creating the space in which fierce competition began among the different actors within these communities for control over the power positions.", "time_from": null, "time_to": null, "precision": null, "page": 94, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0282", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Juden besorgt dass zionisten zorn bei osmanen hervorrufen, bei armeniern geht macht ovn patriarchat zur armenischen naitonalversammlung, dashnaken gestärkt", "time_from": null, "time_to": null, "precision": null, "page": 94, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0283", "source": "The „Historical Period“ and its Impact on Ethnic Groups", "date_raw": null, "text": "Für alle, die neue rolle übernehmen ist es schwer die traditionellen bünde zu ersetzen. Besonders schwer ist die transition in damaskus, weil es keinen einzelnen kopf sondern netztwerk von notablen gibt", "time_from": null, "time_to": null, "precision": null, "page": 95, "category": "Reichskrise", "confidence": "high"}, {"id": "s0356", "source": "Conclusion", "date_raw": null, "text": "Cup machte konstitution und parlament, weil das die mittel der zeit waren, dann haben sie außerlegal gehandelt", "time_from": null, "time_to": null, "precision": null, "page": 176, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0357", "source": "Conclusion", "date_raw": null, "text": "Liberaler osmanismus mit pressefreiheit und nationalsprachen hatte fliehkräfte, cup dann einfach zentralismus, Cup hatte es schwerer gewalt zu rechtfertigen, benutzt dann doch expekutive, repression verhinder repräsentation", "time_from": null, "time_to": null, "precision": null, "page": 177, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0358", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "Eröffnungssatz: Revolutionary theories are most useful when they attempt to define and interpret the causes and mechanisms of revolutions. However, when they attempt to forecast the outcomes and the impact of revolutions on their indigenous societies, they are largely unsuccessful.", "time_from": null, "time_to": null, "precision": null, "page": 189, "category": "Revolutions-Ereignisse", "confidence": "high"}, {"id": "s0359", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "Armenier, juden: mikrorevolution, bei arabern instabilität", "time_from": null, "time_to": null, "precision": null, "page": 189, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0360", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "within", "time_from": null, "time_to": null, "precision": null, "page": null, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0361", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "these interconnected public spheres, new actors emerged, threatening the social and political stability of the existing orders not only to (re)define their identities in the post-revolutionary period by inventing their own ancien regimes, victories, and new orders, but more importantly by com- peting against each other over control of existing positions of power, and in some cases, creating new ones.", "time_from": null, "time_to": null, "precision": null, "page": 189, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0362", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "revolution der cup erfolgreicher bei zentralisierung der gemeinschaften", "time_from": null, "time_to": null, "precision": null, "page": 189, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0363", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "The notion of public sphere within the context of the Ottoman Empire, Mid- dle East, and Muslim world still remains in its infancy.2 Of course, the public sphere, both in its pre-modern and modern fonns, existed in the Ottoman Empire.", "time_from": null, "time_to": null, "precision": null, "page": 190, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0374", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Nazim pasha ist getöteter kriegsminister jan 13, davor war es Mahmud Sevket, der wird dann großwesir, obwohl garnicht mitglied CUP, erschossen 11. Juli 13, dann ist es said Halim. Tod sevket bringt andere militärs dazu, die verantwortung zu übernehmen – Hist. Phase damit vorbei, finaler aufstieg CUP", "time_from": null, "time_to": null, "precision": null, "page": 12, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0375", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Nach tod sevket jüngere dran, mehr dringlichkeit viele ideologische vorstellungen schnell zu implementieren, nicht mehr alte vorstellung dienst am Reich, keine gedult mehr für Verhandlungen", "time_from": null, "time_to": null, "precision": null, "page": 13, "category": "IdeologischerWandel", "confidence": "high"}];

// ── Overrides exportieren → POST /overrides ───────────────────────────────────
btnExport.addEventListener("click", async () => {
  const arr = [...overrides.values()];
  btnExport.disabled = true;
  btnExport.textContent = "Speichere…";
  try {
    const res = await fetch("/overrides", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(arr),
    });
    if (res.ok) {
      btnExport.textContent = "Gespeichert ✓";
      setTimeout(() => {
        btnExport.textContent = "Overrides exportieren";
        updateExportBtn();
      }, 1500);
    } else {
      btnExport.textContent = "Fehler – nochmal?";
      btnExport.disabled = false;
    }
  } catch {
    // Server nicht erreichbar → Fallback: Datei herunterladen
    btnExport.textContent = "Overrides exportieren";
    updateExportBtn();
    const blob = new Blob([JSON.stringify(arr, null, 2)], {type: "application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "overrides.json"; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
});

// ── Neu berechnen → POST /recompute (SSE-Stream) ─────────────────────────────
btnRecompute.addEventListener("click", async () => {
  btnRecompute.disabled = true;
  btnRecompute.textContent = "Läuft…";
  logEl.className = ""; // reset error class
  logEl.textContent = "";
  logEl.style.display = "block";

  try {
    const res = await fetch("/recompute", {method: "POST"});
    if (!res.ok || !res.body) throw new Error("Server-Fehler " + res.status);

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buf     = "";

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split("\\n");
      buf = lines.pop(); // incomplete last line

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const msg = line.slice(6);
        if (msg === "__done__") {
          logEl.textContent += "\\n✓ Fertig – Seite wird neu geladen…";
          logEl.scrollTop = logEl.scrollHeight;
          setTimeout(() => window.location.reload(), 800);
          return;
        }
        if (msg.startsWith("__report__:")) {
          try {
            const rpt = JSON.parse(msg.slice(11));
            if (rpt.warnings && rpt.warnings.length) {
              logEl.textContent += "\\n⚠ " + rpt.warnings.join("\\n⚠ ");
            }
            logEl.textContent += `\\nKonfidenz niedrig: ${rpt.low_confidence} (${rpt.low_confidence_pct}%)`;
          } catch(_) {}
          logEl.scrollTop = logEl.scrollHeight;
          continue;
        }
        if (msg.startsWith("__error__")) {
          logEl.className = "error";
          logEl.textContent += "\\n" + msg.slice(9).trim();
          logEl.scrollTop = logEl.scrollHeight;
          btnRecompute.disabled = false;
          btnRecompute.textContent = "Neu berechnen";
          return;
        }
        logEl.textContent += (logEl.textContent ? "\\n" : "") + msg;
        logEl.scrollTop = logEl.scrollHeight;
      }
    }
  } catch (err) {
    logEl.className = "error";
    logEl.textContent += "\\nServer nicht erreichbar: " + err.message;
    btnRecompute.disabled = false;
    btnRecompute.textContent = "Neu berechnen";
  }
});

// ── Render cards ─────────────────────────────────────────────────────────────
const cardsEl = document.getElementById("cards");
const emptyEl = document.getElementById("empty");

// Map<segment_id, {seg, cardEl}>
const cardMap = new Map();

// source helpers: accept string or {name, date} object
function srcName(src) {
  return (src && typeof src === "object") ? (src.name || "") : (src || "");
}
function srcLabel(src) {
  if (!src) return "";
  if (typeof src === "object") {
    return [src.name, src.date].filter(Boolean).join(" \u00b7 ");
  }
  return src;
}

DATA.forEach(seg => {
  const ov    = overrides.get(seg.id);
  const prec  = (ov?.action === "set_anchor" ? "manual"
               : ov?.action === "undatable"  ? null
               : seg.precision) ?? "null";
  const tf    = ov?.action === "set_anchor" ? ov.time_from
               : ov?.action === "undatable"  ? null
               : seg.time_from;
  const tt    = ov?.action === "set_anchor" ? ov.time_to
               : ov?.action === "undatable"  ? null
               : seg.time_to;
  const color = PREC_COLOR[prec] ?? "#999";
  const label = PREC_LABEL[prec] ?? prec;
  const numTl = tf == null ? "undatiert"
                : tt && tt !== tf ? tf + "\\u2013" + tt : String(tf);
  const tl    = (!ov && seg.date_raw) ? seg.date_raw : numTl;
  const displayText = (ov?.action === "set_anchor" && ov.text) ? ov.text : seg.text;
  const page  = seg.page ? `<span class="card-page">S.\\u202f${seg.page}</span>` : "";
  const noteHtml = ov?.note
    ? `<div class="card-note">\u270f ${esc(ov.note)}</div>` : "";

  const div = document.createElement("div");
  div.className = "card" + (ov ? " has-override" : "");
  div.dataset.prec   = prec === null ? "null" : prec;
  div.dataset.source = srcName(seg.source);
  div.dataset.year   = tf ?? 9999;
  div.dataset.id     = seg.id;
  div.dataset.cat    = seg.category || "";
  div.style.setProperty("--prec-color", color);
  const catBadge = seg.category
    ? `<span class="cat-badge" style="background:${CAT_COLORS[seg.category]||'#888'}" title="${esc(seg.category)}">${esc(seg.category)}</span>`
    : '';
  const srcLbl = srcLabel(seg.source);
  div.innerHTML = `
    <button class="btn-edit" data-id="${seg.id}">Bearbeiten</button>
    <div class="card-source" title="${srcLbl.replace(/"/g,'&quot;')}">${esc(srcLbl)}</div>
    <div class="card-meta">
      <span class="card-time">${tl}</span>
      <span class="badge" style="background:${color}">${label}</span>
      ${catBadge}
    </div>
    <div class="card-text">${esc(displayText)}${page}</div>
    ${noteHtml}`;
  cardsEl.appendChild(div);
  cardMap.set(seg.id, {seg, cardEl: div});
});

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Edit form ─────────────────────────────────────────────────────────────────
let activeEditId = null;
let activeFormEl = null;

function closeActiveForm() {
  if (activeFormEl) {
    activeFormEl.remove();
    activeFormEl = null;
  }
  if (activeEditId) {
    const {cardEl} = cardMap.get(activeEditId) || {};
    if (cardEl) cardEl.querySelector(".btn-edit")?.classList.remove("active");
    activeEditId = null;
  }
}

function openEdit(segId) {
  if (activeEditId === segId) { closeActiveForm(); return; }
  closeActiveForm();

  const {seg, cardEl} = cardMap.get(segId) || {};
  if (!seg || !cardEl) return;

  const ov = overrides.get(segId);
  const isUndatable = ov?.action === "undatable";
  const curText = (ov?.action === "set_anchor" && ov.text != null) ? ov.text : seg.text;
  const curFrom = ov?.action === "set_anchor" ? ov.time_from : seg.time_from;
  const curTo   = ov?.action === "set_anchor" ? ov.time_to   : seg.time_to;
  const curNote = ov?.note ?? "";

  activeEditId = segId;
  cardEl.querySelector(".btn-edit").classList.add("active");

  const catOptions = CATEGORIES.map(c =>
    `<option value="${esc(c)}"${c === seg.category ? ' selected' : ''}>${esc(c)}</option>`
  ).join('');

  const form = document.createElement("div");
  form.className = "edit-form";
  form.innerHTML = `
    <div>
      <div class="ef-label" style="margin-bottom:4px">Text</div>
      <textarea class="ef-textarea" id="ef-text">${esc(curText)}</textarea>
    </div>
    <div class="ef-row">
      <span class="ef-label">Zeitraum</span>
      <input class="ef-input" id="ef-from" type="number" placeholder="von"
             value="${curFrom ?? ""}" ${isUndatable ? "disabled" : ""}>
      <span style="font-size:11px;color:#888">–</span>
      <input class="ef-input" id="ef-to" type="number" placeholder="bis"
             value="${curTo ?? ""}" ${isUndatable ? "disabled" : ""}>
      <label class="ef-check">
        <input type="checkbox" id="ef-undatable" ${isUndatable ? "checked" : ""}>
        Undatierbar
      </label>
    </div>
    ${CATEGORIES.length ? `
    <div class="ef-row">
      <span class="ef-label">Kategorie</span>
      <select id="ef-category" style="flex:1;padding:3px 7px;border:1px solid #d1d5db;border-radius:3px;font-size:12px">
        <option value="">— keine —</option>
        ${catOptions}
      </select>
    </div>` : ''}
    <div class="ef-row">
      <span class="ef-label">Notiz</span>
      <input class="ef-input-wide" id="ef-note" type="text" placeholder="Begründung…"
             value="${esc(curNote)}">
    </div>
    <div class="ef-actions">
      <button class="btn-save" id="ef-save">Speichern</button>
      <button class="btn-cancel" id="ef-cancel">Abbrechen</button>
    </div>`;

  cardEl.appendChild(form);
  activeFormEl = form;

  // Toggle time fields when undatable checkbox changes
  form.querySelector("#ef-undatable").addEventListener("change", e => {
    const dis = e.target.checked;
    form.querySelector("#ef-from").disabled = dis;
    form.querySelector("#ef-to").disabled   = dis;
  });

  form.querySelector("#ef-cancel").addEventListener("click", closeActiveForm);

  form.querySelector("#ef-save").addEventListener("click", () => {
    const text      = form.querySelector("#ef-text").value;
    const undatable = form.querySelector("#ef-undatable").checked;
    const fromVal   = form.querySelector("#ef-from").value;
    const toVal     = form.querySelector("#ef-to").value;
    const note      = form.querySelector("#ef-note").value.trim();
    const catEl     = form.querySelector("#ef-category");
    const catVal    = catEl ? catEl.value : (seg.category || "");

    let override;
    if (undatable) {
      override = { segment_id: segId, action: "undatable", note: note || undefined };
    } else {
      const tf = fromVal !== "" ? parseInt(fromVal, 10) : null;
      const tt = toVal   !== "" ? parseInt(toVal, 10)   : null;
      override = {
        segment_id: segId,
        action: "set_anchor",
        time_from: tf,
        time_to:   tt,
        precision: "manual",
        text:      text !== seg.text ? text : undefined,
        note:      note || undefined,
      };
      // Remove undefined keys
      Object.keys(override).forEach(k => override[k] === undefined && delete override[k]);
    }

    overrides.set(segId, override);

    // Persist category change to classified.json
    if (catVal !== (seg.category || "")) {
      seg.category = catVal || undefined;
      const qs = new URLSearchParams({project: _proj, document: _doc, token: _tok}).toString();
      fetch("/ingest/classified/update?" + qs, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({segment_id: segId, category: catVal}),
      }).catch(() => {});
    }

    updateExportBtn();
    closeActiveForm();
    refreshCard(segId);
  });
}

function refreshCard(segId) {
  const {seg, cardEl} = cardMap.get(segId) || {};
  if (!seg || !cardEl) return;

  const ov    = overrides.get(segId);
  const prec  = ov?.action === "set_anchor" ? "manual"
               : ov?.action === "undatable"  ? null
               : seg.precision;
  const tf    = ov?.action === "set_anchor" ? ov.time_from
               : ov?.action === "undatable"  ? null
               : seg.time_from;
  const tt    = ov?.action === "set_anchor" ? ov.time_to
               : ov?.action === "undatable"  ? null
               : seg.time_to;
  const color = PREC_COLOR[prec ?? "null"] ?? "#999";
  const label = PREC_LABEL[prec ?? "null"] ?? String(prec);
  const numTlR = tf == null ? "undatiert"
                : tt && tt !== tf ? tf + "\\u2013" + tt : String(tf);
  const tl     = (!ov && seg.date_raw) ? seg.date_raw : numTlR;
  const displayText = (ov?.action === "set_anchor" && ov.text) ? ov.text : seg.text;
  const page  = seg.page ? `<span class="card-page">S.\\u202f${seg.page}</span>` : "";
  const noteHtml = ov?.note ? `<div class="card-note">\u270f ${esc(ov.note)}</div>` : "";

  cardEl.dataset.prec = prec === null ? "null" : (prec ?? "null");
  cardEl.dataset.year = tf ?? 9999;
  cardEl.dataset.cat  = seg.category || "";
  cardEl.style.setProperty("--prec-color", color);
  cardEl.classList.toggle("has-override", !!ov);

  const catBadgeR = seg.category
    ? `<span class="cat-badge" style="background:${CAT_COLORS[seg.category]||'#888'}" title="${esc(seg.category)}">${esc(seg.category)}</span>`
    : '';
  const srcLblR = srcLabel(seg.source);
  cardEl.innerHTML = `
    <button class="btn-edit" data-id="${segId}">Bearbeiten</button>
    <div class="card-source" title="${srcLblR.replace(/"/g,'&quot;')}">${esc(srcLblR)}</div>
    <div class="card-meta">
      <span class="card-time">${tl}</span>
      <span class="badge" style="background:${color}">${label}</span>
      ${catBadgeR}
    </div>
    <div class="card-text">${esc(displayText)}${page}</div>
    ${noteHtml}`;
}

// Delegate edit button clicks
cardsEl.addEventListener("click", e => {
  const btn = e.target.closest(".btn-edit");
  if (btn) openEdit(btn.dataset.id);
});

// ── Filters ──────────────────────────────────────────────────────────────────
let activePrec   = "";
let activeSrc    = "";
let activeCat    = "";

function applyFilters() {
  let visible = 0;
  document.querySelectorAll(".card").forEach(c => {
    const matchPrec = !activePrec || c.dataset.prec === activePrec;
    const matchSrc  = !activeSrc  || c.dataset.source === activeSrc;
    const matchCat  = !activeCat  || c.dataset.cat === activeCat;
    const show = matchPrec && matchSrc && matchCat;
    c.classList.toggle("hidden", !show);
    if (show) visible++;
  });
  emptyEl.style.display = visible === 0 ? "block" : "none";
  updateMarker();
}

document.querySelectorAll(".fb").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".fb").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activePrec = btn.dataset.prec === "null" ? "null"
               : btn.dataset.prec === ""     ? ""
               : btn.dataset.prec;
    applyFilters();
  });
});

document.querySelectorAll(".cf").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".cf").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    applyFilters();
  });
});

document.getElementById("src-filter").addEventListener("change", e => {
  activeSrc = e.target.value;
  applyFilters();
});

// ── Quality report ────────────────────────────────────────────────────────────
const QUALITY_REPORT = {"warnings": ["Kategorie \"Revolutionäre Ereignisse\" hat nur 0.5 % Anteil (< 2 %)", "Kategorie \"Revolutionsereignisse\" hat nur 0.5 % Anteil (< 2 %)", "Kategorie \"SocietalTensions\" hat nur 0.3 % Anteil (< 2 %)", "Kategorie \"Societal Tensions\" hat nur 0.3 % Anteil (< 2 %)", "Kategorie \"Revolutions Ereignisse\" hat nur 0.3 % Anteil (< 2 %)", "Kategorie \"RevolutionèreEreignisse\" hat nur 0.3 % Anteil (< 2 %)", "Kategorie \"Revolutions-Ereignisse\" hat nur 0.3 % Anteil (< 2 %)"], "categories": {"Reichskrise": 24.5, "GesellschaftlicheSpannungen": 19.6, "RevolutionäreEreignisse": 16.8, "IdeologischerWandel": 14.5, "Politische Akteure": 12.9, "Machtstrukturen": 9.3, "Revolutionäre Ereignisse": 0.5, "Revolutionsereignisse": 0.5, "SocietalTensions": 0.3, "Societal Tensions": 0.3, "Revolutions Ereignisse": 0.3, "RevolutionèreEreignisse": 0.3, "Revolutions-Ereignisse": 0.3}, "low_confidence": 1, "low_confidence_pct": 0.3, "total": 387};
(function renderQualityReport() {
  const qr = QUALITY_REPORT;
  if (!qr || !qr.total) return;
  const el = document.getElementById("quality-report");
  const body = document.getElementById("qr-body");
  el.style.display = "block";
  const lines = [];
  if (qr.warnings && qr.warnings.length) {
    qr.warnings.forEach(w => {
      lines.push(`<div class="qr-warn">⚠ ${esc(w)}</div>`);
    });
  }
  lines.push(`<div class="qr-low">Niedrige Konfidenz: ${qr.low_confidence} (${qr.low_confidence_pct} %)</div>`);
  const cats = Object.entries(qr.categories || {})
    .map(([c, p]) => `${esc(c)} ${p}%`).join(" · ");
  if (cats) lines.push(`<div class="qr-low" style="margin-top:4px">${cats}</div>`);
  body.innerHTML = lines.join("");
})();

// ── Timeline marker ───────────────────────────────────────────────────────────
const tlEl       = document.getElementById("timeline");
const markerEl   = document.getElementById("tl-marker");
const yearLblEl  = document.getElementById("tl-year-label");

// Mark decades visually
document.querySelectorAll(".tick").forEach(t => {
  const yr = parseInt(t.dataset.year);
  if (yr % 20 === 0) t.setAttribute("data-decade", "");
});

function yearToFrac(yr) {
  return Math.max(0, Math.min(1, (yr - YEAR_MIN) / (YEAR_MAX - YEAR_MIN)));
}

function updateMarker() {
  const cards = [...document.querySelectorAll(".card:not(.hidden)")];
  if (!cards.length) return;

  // Find first visible card in the scroll viewport
  const panelRect = cardsEl.getBoundingClientRect();
  let topCard = null;
  for (const c of cards) {
    const r = c.getBoundingClientRect();
    if (r.bottom > panelRect.top) { topCard = c; break; }
  }
  const yr = topCard ? parseInt(topCard.dataset.year) : null;
  if (!yr || yr === 9999) return;

  const frac = yearToFrac(yr);
  const tlH  = tlEl.clientHeight;
  const topPx = frac * tlH;

  markerEl.style.top   = topPx + "px";
  yearLblEl.style.top  = topPx + "px";
  yearLblEl.textContent = yr;
}

cardsEl.addEventListener("scroll", updateMarker);
updateMarker();

// ── Timeline click → scroll to year ──────────────────────────────────────────
tlEl.addEventListener("click", e => {
  const tick = e.target.closest(".tick");
  if (!tick) return;
  const yr = parseInt(tick.dataset.year);
  const cards = [...document.querySelectorAll(".card:not(.hidden)")];
  // find first card >= yr
  const target = cards.find(c => parseInt(c.dataset.year) >= yr);
  if (target) target.scrollIntoView({behavior:"smooth", block:"start"});
});
