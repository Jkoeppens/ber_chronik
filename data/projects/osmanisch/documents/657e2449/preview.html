the non- scholarly, landowning bureaucrats played a dominant role in local politics dur- ing the Hamidian period.“ – osmanismus ist für sie eigene interessenvertretung, wollen wirklich keine revolution, waren garnicht teil jungtürken", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 20, "category": "SocietalTensions", "confidence": "medium"}, {"id": "s0246", "source": "Debating the future of the Empire", "date_raw": null, "text": "The columns and articles in the newspapers of the ethnic groups provide us with a rich mine of data for analyzing political discourse in different geographic areas of the empire. In addition to constructing and molding discourses, the press played the role of mediator between politicians and the public, connecting the masses with politics. It also assumed the role of educating and disciplin- ing the public during the fragile postrevolutionary period, in which collective anxiety and confusion were expansive in all sectors of society. Dazu FN6: This role of the educator was mostly evident in the Young Turk press. Imme- diately after the Revolution, Tanin began publishing a series of articles under the title “Neler Bilmeliyiz: Öğreniyoruz Öğretmiyoruz” (What should we learn? We are learning and not teaching). The title indicates that the newspaper itself was in a process of learn- ing along with the masses and did not have any intention of imposing its own percep- tions on them. In each issue, the title was followed by different subjects dealing with various dimensions of politics. For example, see “Devlet nedir? gâyet nedir?” (What is the state? What is the aim?), Tanin, August 22, 1908, no. 22, 1; “Meclis-i Mebusanda Azalarin Mıkdarı” (The number of the members of the House of Deputies), August 16, 1908, no. 16, 2; “Intihabatta Iki Derece” (Two stages in the elections), September 7, 1908, no. 38, 1; “Hürriyet-i Matbuat” (Freedom of press), September 12, 1908, no. 43, 2.", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 50, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0247", "source": "Debating the future of the Empire", "date_raw": null, "text": "Als erstes drucken Zeitungen die Verfassung ab, mit DER SULTAN hat… sultan noch immer vorn, aber eigentlich wird nation und parlament die Autorität", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 50, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0248", "source": "Debating the future of the Empire", "date_raw": null, "text": "Ethnische presse unterschlägt ein wenig die wichtigkeit der KEF, die versteckt sich hinter der amee, daher ist die dreifaltigkeit Sultan, Verfassung und Armee", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 51, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0249", "source": "Debating the future of the Empire", "date_raw": null, "text": "Wird erstmal über freiheit gesprochen, um sie zu definieren, damit sie nicht misbraucht werde: One writer for the Arabic newspaper Lisān al-Ḥāl said that the newspaper chose to define and explain the concept of freedom “in order to avoid bad behavior. … A correspondent for the Egyptian newspaper Al-Muqaṭṭam argued that the freedom resulting from the Revolution “does not have the right to intoxicate our minds with the wine of celebration and distract us from exam- ining its true structure.” The author further argued that the euphoric feelings of celebration did not reflect the deep animosities that existed in Beirut and other parts of the empire.12", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 51, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0250", "source": "Debating the future of the Empire", "date_raw": null, "text": "Freiheit wird mit sorge betrachtet als freibrief, der zu interethnischer gewalt führen könne. Einfluss frz postrevolutionäre literatur, lisan al hal: extremismus schlecht, außer in liebe zum vaterland", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 52, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0251", "source": "Debating the future of the Empire", "date_raw": null, "text": "Freiheit sei gesetztestreue", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 53, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0252", "source": "Debating the future of the Empire", "date_raw": null, "text": "Gleichheit: zwischen ethnien, jede trägt ihres bei. Besonders aber armenier und türken, müssen besonders gleich sein wegen drohendem Konflikt", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 54, "category": "Societal Tensions", "confidence": "high"}, {"id": "s0253", "source": "Debating the future of the Empire", "date_raw": null, "text": "Krise arm türk in papertanin", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 56, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0254", "source": "Debating the future of the Empire", "date_raw": null, "text": "Gibt auch argument, dass gleichheit heißt, dass nicht muslime privilegien verlieren", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 56, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0255", "source": "Debating the future of the Empire", "date_raw": null, "text": "Tag 1 nach revolution warnungen vor altem regime und seinen dienern. Nicht blutig, also sind sie noch da", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 57, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0256", "source": "Debating the future of the Empire", "date_raw": null, "text": "6.08.1908 erst verhaftungen von encien regime nach fall regierung Said Pascha", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 57, "category": "Reichskrise", "confidence": "high"}, {"id": "s0257", "source": "Debating the future of the Empire", "date_raw": null, "text": "Nach revolution gab es briefe nach istanbul über klagen dass altes regime noch regiert (anatolein hier", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 58, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0258", "source": "Debating the future of the Empire", "date_raw": null, "text": "Armenier diskutieren, weil alts regime noch da, ob nicht doch eigenregie, unabhängigkeit – cup sagt einfach die petitionen seien fälschungen der ARF", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 59, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0259", "source": "Debating the future of the Empire", "date_raw": null, "text": "Arab newspaper warnen auch vor resten altes regime (viel seltener als armenier), Muqaṭṭam 27.08.1908(ägypten), loyalität einiger rel anführer infrage gestellt.", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 60, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0260", "source": "Debating the future of the Empire", "date_raw": null, "text": "Es entstehen klassische ethnische parteien. The immediate task of the political parties was to publish articles and give lectures to enlighten their communities about the policies they should em- brace.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 61, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0261", "source": "Debating the future of the Empire", "date_raw": null, "text": "Sabah Gulian, editor of Hunch‘ak Rede für demokratie und autonomie, nur so geht es, außerdem bewaffnet die revolution verteitigen", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 62, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0262", "source": "Debating the future of the Empire", "date_raw": null, "text": "Armenians were not alone in these efforts to establish political platforms. In Istanbul, about twenty-six hundred Arabs gathered in a theater to discuss the establishment of a society representing all Arabs in the provinces, as well as the publication of a newspaper that would explain the principles of constitu- tion, freedom, and fraternity to Ottoman Arabs. The Ottoman-Arab Brother- hood Society was established by the dismissed Arab functionaries of the ancien régime.70  - ihre zietung in osmanische und arabisch. Name gesellscahft macht sorgen wegen separatismus, sie predigen aber vor allem einheit", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 62, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0263", "source": "Debating the future of the Empire", "date_raw": null, "text": "Größter streitpunkz zwischen ethnien: neues politisches System", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 62, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0264", "source": "Debating the future of the Empire", "date_raw": null, "text": "Sabahhedin war für dezentralisierung und private initiative. Für ersteres stark kritisiert", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 63, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0265", "source": "Debating the future of the Empire", "date_raw": null, "text": "The question of whether to adopt a centralized or decentralized political system was also high on the agenda of the Arabs in the provinces. Some of these commentators indicated that the administrative councils in the prov- inces would complement administrative decentralization if they adhered to the principles of the constitution.96 Others, such as Edwar Murqus, explained that Prince Sabahaddin was right, if he was not an extremist, as some of the capital’s newspapers had claimed. Murqus said that if Sabahaddin wanted administra- tive decentralization for the provinces along the lines of Germany and Amer- ica, in which “every province will take care of its budget inside and outside, remove and appoint high and low officials, and make the provincial council as a miniature of the Parliament, I think he is going too far.”", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 67, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0266", "source": "Debating the future of the Empire", "date_raw": null, "text": "As a result, the people of Lebanon were divided into two groups: one believed that it was necessary to send deputies to the Ottoman Parliament to ensure political enfranchisement, whereas the other thought that Lebanon should defend its privileges by declining to send any delegates. Die die libanon in osm reich behalten wollten, wurden liberale genannt, die sind gegen Règlement Organique. Die, die dagegen sind sagen libanon ist wie ägypten, bulgarien, samos, fallen nicht unter die jurisdiktion der verfassung, sagen Règlement Organique sei nicht aufgehoben", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 67, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0267", "source": "Debating the future of the Empire", "date_raw": null, "text": "Anderes ethnien diskussionsfeld: bildung. Angst vor assimilation, verstehen aber auch notwendigkeit, kinder zur schule zu geben, türkisch und ottom geschichte zu lernen", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 68, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0268", "source": "Debating the future of the Empire", "date_raw": null, "text": "Araber sagen arabisch wichtiger als osmanisch, koran ist arabisch, lehrer soll araber sein", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 69, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0269", "source": "Debating the future of the Empire", "date_raw": null, "text": "In addition to serving as a sounding board for these ideas, the ethnic press played the role of an educator attempting to discipline the masses during the fragile postrevolutionary period. This edu- cational role is particularly manifest in the newspapers’ struggles to define and elaborate on the concept of freedom in its different dimensions.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 70, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0270", "source": "Debating the future of the Empire", "date_raw": null, "text": "Es formen sich ethnische sphären, immer belebter je mehr neue gruppen ethnische notablen herausfordern", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 71, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0285", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Wahl 1908 natürlich nicht wirklich frei aber erfolgreiches experiment. CUP und liberale partei wichtigste", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 97, "category": "Reichskrise", "confidence": "high"}, {"id": "s0286", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Erwartungen ethnischer repräsentation wurden enttäuscht und setzen sapnnungen in gang. Armenier und juden waren aber auch mit eigenen wahlen beschäftigt", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 98, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0287", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Araber fordern kein proporzsystem, weil sie in ihren wahlkreisen die mehrheit waren. Cup araber und ulama als unabhängige kandidaten", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 100, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0288", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Juden waren ganz optimistisch, ihre kandidaten zu bekommen100", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": null, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0289", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Jungtürken waren gegen proporzsystem, so baue man turm zu babel. Sie sind die einzigen gegen proporz, haben aber ja die wahl übnerhaupt erkämpft", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 101, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0290", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Arf für föderalismus, betonen aber zugehörigkeit zum reich", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 102, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0291", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Cup für nicht muslime militärdienst", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 102, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0292", "source": "From the Streets to the Ballots", "date_raw": null, "text": "urji Efendi Ghammashi of Beirut published his electoral platform in Lisān al-Ḥāl. Ghammashi divided his platform into three sections: a political plan, a reform plan, and a prosperity plan.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 103, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0293", "source": "From the Streets to the Ballots", "date_raw": null, "text": "The major points of disagreement between the CUP and the nondominant ethnic groups were centered on the political system, the status of religious institutions, and education.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 106, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0294", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Cup will zentralismus und schulunterricht türkisch, alle ethn privil weg, armenier halten das für türkischen nationalismus", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 107, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0295", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Wahlkampagnen liefen über kirchen etc, folgte millet system und lief cup zuwieder", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 107, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0296", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Gab zt ethnische wahlallianzen, a uch in den provinzen", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 109, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0297", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Beirut zentrum cup in arabischen gebieten", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 113, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0298", "source": "From the Streets to the Ballots", "date_raw": null, "text": "In Syria, alliances played almost no role, since the CUP was one of the only organized political parties to campaign for the elections. Indeed, the CUP had a strong presence there, since it had active branches in Syria and the party had sent delegates from Salonica as early as October. The CUP did not make any electoral deals with the local populations of Syria, as they had in other places. Harran argues that the reasons for this were, first, that the Syrians were predominantly Muslim and therefore had an interest in the survival of the an- cien régime, and, second, that they did not yet show any signs of an organized national movement.83 At any rate, the CUP nominated most of the deputies in Syria. The candidates in Syria were from different social backgrounds, but, as in the case of the vilayet of Beirut, most of them served the state in some ca- pacity and came from prominent families.84 In short, the deputies in the Arab provinces came from three backgrounds: ulema, landowners, or professional men from the towns.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 113, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0299", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Vorwahlphase wichtiger als wahlen, gab deals, The phase before the balloting was characterized by a heated battle over ideas in which every ethnic group declared its political platform, which became the blueprint for the political system that the ethnic group envisioned.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 119, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0300", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Many of these partisan/national and individual electoral platforms had much in common, including disagreement with the policies envisioned by the Young Turks’ CUP. Therefore, administrative decentralization, ethno-religious privileges, national education, and proportional representation became key factors in the negotiation processes among the CUP, Armenians, Greeks, Alba- nians, and to a certain extent, Jews and Arabs.", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 119, "category": "Politische Akteure", "confidence": "medium"}, {"id": "s0317", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Mutran affäre Syrian Central Committee mit Rashid mutran (syrien griech kath) fordert in paris selbstregierung von syrien, erklärung zirkuliert 1908, fordert unabhängigkeit mit unterstützung des westens. Araber im parlament reagieren schnell und negativ", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 130, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0365", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "Spionagesystem abdülhamid führt zu verschiebung from Lebanon, Syria, and Anatolia, to European cities and Egypt. … After the Young Turk revolution of 1908, this exilic public sphere was transformed into a homeland public sphere. The revolution allowed for an immediate boom in serial publications of different ethnic groups in the Empire.8", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 191, "category": "Revolutions Ereignisse", "confidence": "high"}, {"id": "s0366", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "Fußnote 8: he best study on the post-revolutionary press is that of Palmira Brummett, Image and Imperialism in the Ottoman Revolutionary Press, J908-J9JI (Albany: State Univer- sity of New York Press, 20(0). Despite the fact that it concentrates more on the satirical press during the post-revolutionary period, mainly in the Ottoman press, it still provides important information on political discourse in the Ottoman press from the Turkish per- spective. The same kind of work needs to be undertaken on the ethnic press.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 191, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0367", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "n addition to the CUP branches in Syria, the revolution also resulted in the creation of Arab political movements, the first of which was the Arab-Ottoman Brotherhood, established by the dismissed Arab functionaries ofthe ancien regime.94  founding members were Shafiq Bey al-Mu 'ayyad al-' Azm, Nadra Bey Mutfiin, Shukri: Bey al-I:IusaynI, 'Arif Bey al-MardInI, Shukri: Pa§a al-AyyiibI, SaQiq Pa§a al-Mu'ayyad al- 'Azm, SharIf Ja'far Pa§a and MuJ:!ammad Pa§a al-MakhzumI.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 211, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0368", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "Among the Arab provinces, Damascus was considered an important center for the activities of the ulema. With its Ummayad Mosque, it was a traditional place of Islamic learning. In addition the notables of Damas- cus, numbering around 50 families,95 composed a powerful stratum run- ning the political mechanism. The constitution became the ultimate threat to these families and to the ulema class", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 212, "category": "Reichskrise", "confidence": "high"}, {"id": "s0369", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "Revolution in damaskus nicht so erfolgraich", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 212, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0370", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "UP branch of Damascus included Hussein Bey 'Awnl, who was the director of educa- tion (mudlr al-ma'iirij) in Damascus, Major SalIm al-Jaza'iri, and As'ad Bey, member of the general staff, who later became the chief of police of Damascus, and a certain Dr. f.laydar.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 212, "category": "Reichskrise", "confidence": "high"}, {"id": "s0371", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "The temporary political vacuum that was created after the revolution was filled by CUP branches as they began running the affairs of the administration.96 The first task of the CUP in Damascus was to get rid of the officials from the ancien regime period. To this end, they pressured the Vali to dismiss the head of the Administrative Council of the Prov- ince, Muhammad Fawzi Pa~a al-'Azm, the Mufti of Damascus, the chief clerk of the Shari'a courts, as well as the kaimakam of Zabadani and Busra Eski Sham, among several other district governors. These actions caused some discontent among the ulema class. The British Consul Devey reported on the 12th of August, \"There is some discontent on the part of the ulema and certain leaders of the town, for the Union and Pro- gress Society is going forward in its own way and removing officials without consulting them.\"98 The discontent continued and resulted in the establishment of an association by the ulema.99 212f", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": null, "category": "Reichskrise", "confidence": "high"}, {"id": "s0372", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "Some protester referred to the CUP as the committee of disunity and decline (jam 'iyyat al-tafrlq wa- al-tadannl).", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 214, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0373", "source": "FORMATION OF PUBLIC SPHERE(S) IN THE AFTERMATH OF THE 1908 REVOLUTION AMONG ARMENIANS, ARABS, AND JEWS – der Matossian", "date_raw": null, "text": "his article has contended that post-revolutionary ethnic politics in the Ottoman Empire should not be viewed solely through the prism of political parties, but also through ecclesiastical poli- tics, a key factor in defining inter- and intra-ethnic politics. Interestingly, despite the fact that the revolution aimed at creating the modem secular Ottoman citizen whose loyalty would be to the state, it nevertheless strengthened the ethno-religious political centers of the ethnic groups. It did so by creating a multiplicity of interconnected public spheres over which fierce competition began among the different actors in these ethnic groups for control of power positions.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 218, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0384", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Frühe jungtürken finden es schlecht, dass armeeleute etc einfluss beschnitten bekommen zugunsten palastgünstlinge, wollen allgemeine einbindung. Aber wie das gehen soll bleibt sehr strittig", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 27, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0385", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Gründung jungtürken", "time_from": 1908, "time_to": 1908, "precision": "event", "page": null, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0396", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Verfassung 1908 macht türkisch lingua franca - In an effort to pro- mote a far more rationalized and integrated state, committee members reasoned that its use should also extend to local administrative offices and schools, as well among parliamentarians, senior bureaucrats, and officers", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 40, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0397", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Hüseyin Cahid, pub- lisher of the pro-Unionist daily Tanin, pointed in part to the practical dimensions of such a policy. “To allow different languages in government,” he argued, “would be setting up a Tower of Babel.” Kayali 88", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 40, "category": "Politische Akteure", "confidence": "medium"}, {"id": "s0398", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Auch ehemalige cup unterstützer wie Shukri al-Asali ärgern sich über jungtürkische sprachpolitik", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 41, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0407", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "The creation of the CUP formed the critical point of separation between older figures like Mahmud Şevket and younger ones like Enver or Talat. The experience of mobilizing and agitating in closed quarters, for fear of government reprisal, left a lasting impact upon all those who participated in the Young Turk movement. – jungtürken bewegung junger leute, dann schaffen sie revolution, dann müssen se aufbauen, gegenwind, dann machen sie wieder wie revolution gewalt/geheimorganisation für das Reich", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 50, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0042", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Reaktion: undbhängigkeitserklärung Bulgarien, Annexion kretas durch griechenland, wien erklärte annexion bosnien und herzegowina", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 374, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0043", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Wenig einigkeit KEF, nur antiklerikal, materialistisch, Säkularisen, kaum pläne wie reich zu retten sei. Beratend Ziya Gökalp, Yusuf Akcara, aber erstmal dringende dinge erledigen", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 375, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0044", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Streiks im reich soldaten und Bahn wegen ausstehendem gehalt, hoffnung auf KEf unterstützung enttäuscht", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 375, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0110", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Muslimische opposition gegen CUP Muslim Union, Volkan Zeitung", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 515, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0124", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Revolution hat zwar in albanien begonnen, 3. Juli 1908, aber pressefreiheit danach macht nationalismus stark, cup wird 1909 skeptisch gegenüber albanischer nationalbewegung, brauchten es als puffer", "time_from": 1908, "time_to": 1909, "precision": "exact", "page": null, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0154", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "System der repräsenation umstritten: minderheuten wollen es anders, nicht von türken und muslimen erdrückt werden – tanzimatgleichheit, nicht bürgergleichheit?", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 68, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0155", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Wahlen produzierten unabhängige kandidaten, die spätern kern der opposition bildeten", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 68, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0156", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Cup wird paranoid – haben ja gerade selbst mit gewalt macht genommen", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 68, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0157", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Opposition: Liberale, Bürokraten für hohe pforte (Kamil Pasha), nationalisten gegen schmale osmanismusdefinition, lokale gruppen wegen zentralisierung, islamisten wegen säkularismus, sozialisten", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 68, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0158", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Wichtiger oppositioneller: Sabahaddin Bey, kampf gg cup mit League of Private Initiative and Decentralisation", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 69, "category": "Reichskrise", "confidence": "high"}, {"id": "s0159", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Cup kooptiert, behauptet zb fälschlich dass  mit League of Private Initiative and Decentralisation ihr beigetreten sei. Andree gruppe angesprochen quasi. Funktioniert aber nicht", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 69, "category": "Machtstrukturen", "confidence": "medium"}, {"id": "s0160", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Parteien: Mohammedan Union Party, the centre-left Democratic Party, the Liberal Party and the Moderate Freedom-Lovers’ Party, konnte aber nie cup herausfodern. Einparteiendominanz in multuparteienverfassung prodiziert spannungen", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 70, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0204", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "Nimr: we tasted the sweetness of Ottoman freedom and made the commitment to brotherhood and equality under the patronage of our empire", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 1, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0207", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "Es wurde aber nie bürgergleichheit eingeführt. Ziele der revolution nie ausformuliert, immer ambivalent, nur so konnte sie alle unter einen hut bringen", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 2, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0208", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "In the nineteenth century, the majority of the Ottoman Empire’s constituent groups did not see themselves as part of a nation but rather as part of an ethno-religious commu- nity. Their identities meshed in an array of overlapping identities, highlighted by religious, linguistic, and cultural diversity, on the one hand, and regional and local loyalties, on the other. (ethnien aber fluide", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 4, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0209", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "revolution: 1. Moderne, Konstitutionalismus um reich zu reparieren, 2. Zerstört empire, erschüttert fragile strukturen", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 6, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0318", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Hijazbahn eingeweiht 1. Sept 1908, mit deutscher beratung gebaut. 1909 stress weil die nicht gut verwaltet wird. El ula nach medina noch nicht fertig", "time_from": 1908, "time_to": 1909, "precision": "exact", "page": 131, "category": "Machtstrukturen", "confidence": "medium"}, {"id": "s0319", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Bagdad bahn involviert nicht nur araber, es geht auch im strategie, um konzession an ausländische firmen, davon erste diskussion", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 134, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0399", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Für cup ist türke sein sprache, also einschließend, universal – andere sehen das nicht so", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": 41, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0183", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "man sei ja gegen imperialismus – allerdings muss man sich mit einer großmacht alliieren, trotz anti brit Rhetorik wenden sie sich zuerst an die briten, dann deutsche (gegen russen), deutsche weniger fähig garantien zu geben", "time_from": 1908, "time_to": 1911, "precision": "interpolated", "page": 84, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0301", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Araber und juden waren eigentlich zufrieden mit den wahlen, griechen und armenier nicht. In the Arab provinces, most of the deputies were notables and landowners who influenced the election results by using their sociopolitical status.", "time_from": 1908, "time_to": 1911, "precision": "interpolated", "page": 120, "category": "Reichskrise", "confidence": "high"}, {"id": "s0302", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Cup gewinnt wahl. Parlament ethnien: Of 281 deputies from the first round of elections, there were 151 Turks, 56 Arabs, 25 Albanians, 22 Greeks, 10 Arme- nians, 5 Kurds, 4 Bulgarians, 4 Jews, 3 Serbs, and 1 Vlach", "time_from": 1908, "time_to": 1911, "precision": "interpolated", "page": 120, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0303", "source": "From the Streets to the Ballots", "date_raw": null, "text": "On the contrary, parliamentary politics became an important di- mension in the public spheres created after the Revolution. Parlament dauernd berichte in zeitungn By publishing such accounts, newspapers became the medium through which the masses became acquainted with and connected to parliamentary politics.", "time_from": 1908, "time_to": 1911, "precision": "interpolated", "page": 123, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0304", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Cup war klar, dass viele probleme zutage treten, weil sie diskutiert werden mussten, mit mehrheit und exekutivanordnungen konnten sie aber auch blockieren. Hoffnung der minderheiten lösen sich in ein partei system auf", "time_from": 1908, "time_to": 1911, "precision": "interpolated", "page": 124, "category": "Reichskrise", "confidence": "high"}, {"id": "s0408", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Collaps at the margins", "time_from": 1908, "time_to": 1911, "precision": "interpolated", "page": null, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0123", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "November 1911 liberale union, gegründet und wieder aufgelöst und wieder gegrün det seit 1908 wurde zentrum der regierungsgegner, cup gewinnt wahlen, löst mit eigener mehrheit parlament auf. Dann wahlen 1912 wahlbetrug etc, mehr cup. Dann wiederum juli 1912 anti cup orga erzwang parlamentsauflösung: gerlernt: nicht fair spielen. Sultan kündigt wahlenan, dauert aber über ein jahr, zwischendurch fängt weltkrieg an", "time_from": 1908, "time_to": 1912, "precision": "exact", "page": 520, "category": "Reichskrise", "confidence": "high"}, {"id": "s0315", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Four major issues were especially pertinent to the Arab deputies in the par- liamentary debates: ratification of the electoral results for four Arab deputies, including al-Mu’ayyad; the Mutran affair; the Hidjaz Railway; and the Baghdad Railway.", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": 129, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0316", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Stress zw cup und arabern ua wegen Shafiq al- Mu’ayyad of Damascus, er sei mit sultan verbunden. Auch Yusuf Shitwan (Bingazi), ‘Umar Mansur (Bingazi) and Sayyid Talib (Basra). Andere araber verteidigen sie nicht, damit sie. Nicht in cup ungnade fallen129", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": null, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0395", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Rethorisch cup natürlich gegen westeinmischung, aber bei lynch affäre dann wollen sie doch westprojekte im tausch für kredite durchdrücken – probleme er realpolitik. Gleiches bei zionismus: arabische abgeordnete finden wachsenden einfluss von juden im in und ausland schlecht, cup macht nichts, verteidigt sie als ehrliche arbeiter", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": 39, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0045", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Nun freie presse ist nicht nur für KEF, Karrikaturen, außerdem demo an prophetengeburtstag, ruf „sharia“ (31.März 1909), wirre nachrichten darüber in adana (kef gestürzt?, armenier wollen aufstand?", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 376, "category": "Reichskrise", "confidence": "high"}, {"id": "s0046", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Sevket pasha verhängte kriegszustand, truppen zur verteidigung der revolution vor istanbul, absetzung abdülhamid II", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 376, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0047", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Revision verfassung schränkte streikrecht ein und beendete befreiung nichtmuslime vom militärdienst", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 376, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0048", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Muslimische ulama macht mit bei adana hetzt armenier, zwei tage land kämpfe, truppen zur beruhigung machten mit bei morden", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 377, "category": "Revolutionäre Ereignisse", "confidence": "high"}, {"id": "s0049", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Konterrevolutionäre predigen und schockieren, liberale und nichtmuslimische verbündete verstummen, das führt in kef zu verschiebung zu radikalen säkularisten. Außerdem konservative gegen sufisten (?", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 378, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0111", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Gegenputsch 13.April 1909 gregorianisch, trdit allianz von enttäuschten klerikern und unzufriedenen truppen der ersten armee (waren schon berüchtigt für niederschlagung meuterei jemen rekruten", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 515, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0112", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Truppen 1. Und 3. Armee hatten offiziere festgenommen, waren für islamisches recht, hätten in armee keine zeit für glauben. Anführer sind diejenigen, auf die Abdülhamid zählte: durch ränge aufgestiegene, nicht akademieabsolventen der CUP. Gerücht dass verkürzte dienstzeit in jemen etc dazu führt, dass religionsschüler eingezogen werden", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 516, "category": "Reichskrise", "confidence": "high"}, {"id": "s0113", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Forderungen putsch: rücktritt großwesir und kriegsminister und parlamentspräsident, abgang einiger cup köpfe, islamisches recht, entlassung der offiziere, die nur akademie abgeschlossen haben, einsetzung der aufgestiegenen. 13. April schnelle reaktion: Abdülhamid sagt ja, mehr isl recht, vllt hat abdülhamid das alles sowieso organisiert", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 516, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0114", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Cup sagt das darf abdülhamid nicht, er ist ja kein autokrat mehr. Belagerung yildiz palast. Verkündung später das volk habe den sultan abgesetzt, exil nach thessaloniki", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 517, "category": "Reichskrise", "confidence": "high"}, {"id": "s0115", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Laut verfassung gab es keine organisierte vertretung des volkes, das hat cup einfach an sich genommen. Lösung war umweg über islamisches recht, islam ja staatsreligion", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 517, "category": "Reichskrise", "confidence": "high"}, {"id": "s0116", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Gegenputsch unblutig, sanktionen 80 hinrichtungen, auch volkan publisher", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 518, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0117", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Bruder des sultans kam als mehmed V an die macht, allerdings machte sich das parlament zur höchsten autorität, sultan bestätigt nur parlamentsbeschlüsse", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 518, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0118", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Mächtig: generalinspektor 1.2.3. armee Mahmud sevket, damit über parlament und CUP (marsch auf istanbul dann, martial law meiste zeit", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 518, "category": "Reichskrise", "confidence": "high"}, {"id": "s0119", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Machtkonkurrenz cup mahmud sevket pasha. Cup hatte wahlen gewonne, aber grenze militär und politik verwaschen, außerdem gab es das untergrundkommittee und dessen unsichtbare männer. Die wurden 1909 zur unionisten partei", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 519, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0141", "source": "Resat Kasaba - The Cambridge History of Turkey", "date_raw": null, "text": "konterrevolution 1909 kurz erfolgreich, im namen der sharia, ulama", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 61, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0161", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Konterrevolution: cup hatte keine vollständigen Zugriff auf armee, hat aber sultanstreue durch ränge aufgestiegene offiz versucht rauszuwerfen, hauptstadtarmee ganz ersetzt. Rebellion von 1. Und 3. Armee, die schon putsch gemacht hatte niedergeschlagen", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 70, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0162", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "April 1909: gesetzte gegen streik, gegen Pressefreiheit", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 71, "category": "Reichskrise", "confidence": "high"}, {"id": "s0168", "source": "The Second Constitutional Period, 1908–1918 m. s ̧ükrü haniog ̆lu", "date_raw": null, "text": "Cup macht mitglieder nicht öffentlich wie viele jung jung, außerdem legitimität der alten institutionen nutzen dann aura des mysteriums, bisschen gelüftet bei offenem kongress 1909, aber blieb eigentlich bis ende", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 74, "category": "Reichskrise", "confidence": "high"}, {"id": "s0198", "source": "The Young Turk revolution and the Ottoman Empire : the aftermath of 1908 / edited by Noémi Lévy-Aksu and Franc̜ois Georgeon aai 4: Wi 1103", "date_raw": null, "text": "Hoffnung verloren an 31 mart Vakasi 1909 und adana massaker april 1909", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 6, "category": "RevolutionèreEreignisse", "confidence": "high"}, {"id": "s0199", "source": "The Young Turk revolution and the Ottoman Empire : the aftermath of 1908 / edited by Noémi Lévy-Aksu and Franc̜ois Georgeon aai 4: Wi 1103", "date_raw": null, "text": "Pressefreiheit ab 1909 frühling eingeschränkt", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 6, "category": "Reichskrise", "confidence": "high"}, {"id": "s0210", "source": "Der Matossian, Bedross - Shattered dreams of revolution _ from liberty to violence in the late Ottoman Empire-Stanford University Press (2014)", "date_raw": null, "text": "nach konterrevolution 1909: „For some of the Arab notables, this juncture resulted in an inability to reclaim their previous status, leading some to cooperate with the new regime while others began looking for alternative ways to express their grievances—through, for example, proto-nationalism that later crystallized into Arabism.“", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 6, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0314", "source": "From the Streets to the Ballots", "date_raw": null, "text": "It was also at the end of 1909 that a heated debate took place over the Lynch affair, which related to the government’s plan to provide commercial conces- sion in Iraq to a foreign enterprise: the British Lynch Company.", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 129, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0320", "source": "From the Streets to the Ballots", "date_raw": null, "text": "One of the main factors that hampered Arab deputies’ from being more active participants in Parliament was their poor knowledge of Ottoman Turkish, as pointed out in an editorial in Al-Muqtabas in March 1909.", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 135, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0323", "source": "From the Streets to the Ballots", "date_raw": null, "text": "The Counterrevolution and the „Second Revolution”\nhochpunkt spannungen ermordung Hasan Fehmi, Redakteur Serbesti, Oppositionsblatt der anti-unionisten, besessen von bruder des sultans (Rashad Efendi). Hatte artikel gegen cup publiziert 149f", "time_from": 1909, "time_to": 1909, "precision": "event", "page": null, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0324", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Gegenrevolution zerstört zukunftstraum, cup danach auch repressive", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 149, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0325", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Konterrevolution für ethnien eigentlich keine hoffnung, angst vor ancien regieme, notablen haben aber bock", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 149, "category": "GesellschaftlicheSpannungen", "confidence": "medium"}, {"id": "s0326", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Konterrevolution auch komplex. Folge hauptsächlich cup politik gegen minderheiten, natürlich va armenier und mehr autoritarimus", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 150, "category": "Reichskrise", "confidence": "high"}, {"id": "s0327", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Liberale beschuldigen cup des mordes an Fehmi, andere sagen war palast, beerdigung wird zu anti cup demo. In parlamentsdebatte setzt sich interpretation des pol mordes durch", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 150, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0328", "source": "From the Streets to the Ballots", "date_raw": null, "text": "5.04.1909 gründung ittihad-i muhammedi/Society of Muhammad), wird schnell hauptgegner cup anlässlich des Mordes. Islamisches, antiwestlioches programm, posiert als verteidiger der bürokraten, soldaten, niederen offizieren, religionsstudenten, waisen, armen, witwen, Retired military. Organ der oragnisation ist Volkan. Drohung mit revolte, kooperation mit liberalen. Außerdem partnerschaft mit 1. Armee corps", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 151, "category": "Reichskrise", "confidence": "high"}, {"id": "s0329", "source": "From the Streets to the Ballots", "date_raw": null, "text": "31.03.1909 kemalisten nennen es incident, andere: war es abdülhamid? Andere: waren es die liberalen? Andere: war es cup für repression, sultan loswerden?", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 151, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0330", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Sohrabi erklärung: klassengegensatz/altersgegensatz militärs/Bürokraten vs ihre untergebenen. Nicht fanatismus, zusammensetzung divers", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 151, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0331", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Foderung nach Sharia war nicht gegen verfassung sondern verfassung im einklang mit sharia", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 152, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0332", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Sohrabi: auch wieder konflikt gebildete/ungebildete", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 152, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0333", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Zeitgenössisch schon diagnose das problem sei, dass 85% der rank officers abgesägt worden waren, außerdem zugangsexamen", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 152, "category": "Reichskrise", "confidence": "high"}, {"id": "s0334", "source": "From the Streets to the Ballots", "date_raw": null, "text": "12.04.1909 marschiert 1. Armee corps mit riesen menge leuten. Rücktritt hilmi pascha, tevfik pasha von sultan eingesetzt. Cup hohe mitglieder fliehen oder verstecken sich: Ahmed Riza, Mehmed Cavid, bahaeddin Sakir, hüssein cahid. Büros zeitungen cup sura-yi Ümmet und Tanin zerstört", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 153, "category": "Reichskrise", "confidence": "high"}, {"id": "s0335", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Cup festing rumelia, 3. Armee", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 153, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0336", "source": "From the Streets to the Ballots", "date_raw": null, "text": "17.04.1909 formung united ottoman association initiative ARF, cup istanbul, ottoman liberal party, albaner, kurden etc untersschreiben mit erklärung, dass trotzdem die Verfassung noch gelte wegen unklarheit", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 153, "category": "Reichskrise", "confidence": "medium"}, {"id": "s0337", "source": "From the Streets to the Ballots", "date_raw": null, "text": "17.04.1909 action army v thessaloniki los, verhandlungen mit neuer regierung scheitern, nemhen istanbul ein, paar tage später abdülhamid abgesetzt. Liberal Union führer flohen oder wurden verhaftet. Unblutig, aber weite Folgen", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 153, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0338", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Ethnische presse neutral zu konterrevolution, Zhamanak publiziert interview mit muslim society, dass sharia auch beratung, parlament mit nicht mulsime meine. Als cup gewinnt, feiert sie das opportunistisch", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 154, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0339", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Araber: Beirut entsetzen, va über eindringen ins parlament, mord an Amir Muhammad Arslan, arab deputy of Latakiyya", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 155, "category": "Revolutionsereignisse", "confidence": "high"}, {"id": "s0340", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Armenier unterstützen cup stark bei kampf gg konterrevolution, teil action army. Juden auch", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 158, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0341", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Hunchaken und Dashnaken waren eigentlich als gefählriche randerscheinung angesehen, mit cup herrschaft auf einmal das zentrum. Mögen notablen nicht in provinzen", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 161, "category": "Reichskrise", "confidence": "high"}, {"id": "s0342", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Society of Muhammad machte nach konterrevolution provinztour, zweige in Damaskus, Homs, Mosul und Hama, in Damaskus support durch: abd al wadir al ajlani, amir abdullah son of abd al Qadir al Jazairi, sheikh bard al-din. Offene ohren bei Beduinen, kerkessen und kurden", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 161, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0343", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Als konterrev nachricht in damaskus ankam, versammelten sich society of muslim mitglieder mit bevölkerung bewaffnet auf city Square und drohten in großer Moschee versammelte cup mitglieder zu töten, drei tage Feier der Konterrevolution. Muqtabas berichtet von schmuck municipality. Muqtabas: Damaszener wurden aufgehetzt von 5-6 notablen, die nicht von der konstitutionellen regierung befördert worden waren, daher ihre Feinde wurden (muqtabas 30.05.1909, nr 138,3-4", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 161, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0344", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Keine unruhe weil armee droht. Als konterrevolution vorbei war, wurden agaitatoren nach istanbul geschickt, tried by court martial", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 162, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0345", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Latakia sammlung konterrevolutionäre dann. Ali ayni bey ist mutasarrif, bei ihm beschweren sich liberale und christen", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 162, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0346", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Adana Massaker: ein isfendiar, türke, griff eine armenier an, der ihn tötet, seine beerdigung wird zu gewalt, rache an neuer ordnung und armenischen kollaborateuren. Am 13.04. nach nachrticht konterrevolution, viele saisonarbeiter in der stadt, markttag, gehen nach markttag nicht weg, bleiben, 14.04. mit waffen. Armenier machen lädenzu, das macht muslime Paranoid, mob aus türken, kurden, Fellahs, Kerkessen, Zigeuner, Kreter fangen zu plündern an, armenier verbarrikadieren sich, polizei belagert sie. 4 tage belagerung, leute kommen aus Aleppo und Sivas, armenier bitten regierung um hilfe, die handelt frieden aus", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 167, "category": "Reichskrise", "confidence": "high"}, {"id": "s0347", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Zweite welle schlimmer, rolle Ihsan Fikri? Der hetzt gg armenier, sie wollen Königreich Kilikien machen. Zeitung itidal (Mäßigung) hetzt, artikel von Fikri 20.04., armenier hätten nach unterdrückung revolution mit türken gemacht, dann die revolution betrogen und waffen gehortet. Hätten isfendiars mörder nicht ausgeliefert, gesetzesverachtung", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 167, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0348", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Burhan nuri schreibt auch itital: armenier, 2 mio verstreute, können keinen staat gründen, es sei denn in afrika oder an den Polen", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 168, "category": "Reichskrise", "confidence": "high"}, {"id": "s0349", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Gerücht armenier hätten eigene häuser angezündet, um europäer zum eingreifen zu bewegen", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 168, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0350", "source": "From the Streets to the Ballots", "date_raw": null, "text": "25.04. teile action armee 3. U 2. Regiment kommen, schüsse auf ihr lager, seien armenier, ok machen die fertig, adana armenierviertel abgebrant. Gerücht: armenieraufstand, alle muslims tot", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 169, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0351", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Internat entsetzten, cup wieder an macht, untersuchung, fikri und andere verurteilt, aber eher softe urteile. Cup hat wohl angst vor hartem durchgreifne in schwacher position, fördert natürlich misstrauen der Armenier, nur Dashnaken kooperieren noch mit cup", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 169, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0352", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Ethnien freuen sich über sturz abdülhamid, zweite revolution", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 170, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0353", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Armenier weniger begeistert, vorwurf cup sage ich bin der staat", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 171, "category": "Reichskrise", "confidence": "high"}, {"id": "s0354", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Cup begrenzt vereinsfreiheit, versammlungsfreiheit, Pressefreiheit, ihr war vorgeworfen worden, konterrevolution zugelassen zu haben, sieht sich als wächterin der revolution mit notwendigen, unkonstitutionellen mitteln", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 172, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0355", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Ethnien wollen von verfassung freiheit, cup will mit ihr das reich erhalten", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 172, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0391", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Gegenputsch hat zu tun mit Hasan Fehmi mord", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 36, "category": "Revolutionäre Ereignisse", "confidence": "high"}, {"id": "s0392", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Gegenputsch 1909 hatte liberale verschont, schwäche cup gezeigt, aufwind liberale", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 36, "category": "Reichskrise", "confidence": "high"}, {"id": "s0393", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Gegenputsch folge massaker anatolien an armeniern", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 37, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0394", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Cup politik nach gegenputsch: militärränge säubern, unionisten machen verschrfung pressefreiheit", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 38, "category": "Reichskrise", "confidence": "high"}, {"id": "s0120", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Cup findet hart durchgreifen für reichsrettung: streikverbote, eimnzug armee nichtmuslime", "time_from": 1909, "time_to": 1910, "precision": "interpolated", "page": 519, "category": "Reichskrise", "confidence": "high"}, {"id": "s0121", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Sevket kriegsminister um ihn zu bändigen, setzt aber durch dass es keine kürzungen beim militär gibt", "time_from": 1909, "time_to": 1910, "precision": "interpolated", "page": 519, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0050", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Schlüsselfiguren KEF enver pasha, mehmat Talat, Ziya Gökalp, Yusuf akcura, Celal Nuri (alle jung", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": 378, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0051", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Gleichzeitig gegen isl frömmigkeit und kein gespür für nichtmuslime, sehen in islam und überkonfessionelen osmanischen idealen keine bindekraft, sie wollten türkische sprache und osmanische schrfift", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": 379, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0052", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Kritik an kapitulationen mochten liberale nicht, weil das für sie staatswirtschaft war", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": 379, "category": "IdeologischerWandel", "confidence": "medium"}, {"id": "s0053", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Nichttürken wurden verdängt aus KEF", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": 379, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0054", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Said Nursi: festgenommen wirren 31. März, aber eigentlich kef naher liberaler, redet bei kaiuser reise balkan von türken als schildwache der islamischen nationalität, islamische gesellschaft sei wie eine Fabrik wo alle zusammen arbeiten (rede vorher damaskus", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": 380, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0060", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Verlust janina und shköder, märz edine an bulgarien, gescheiterter gegenputsch mordet trotzdem sevket pascha, balkankrieg der alliierten gegen osm reich untereinander, edirne dann doch an osm reich, enver held", "time_from": 1909, "time_to": 1912, "precision": "event", "page": 381, "category": "Reichskrise", "confidence": "high"}, {"id": "s0310", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Meisten arab abgeordneten über cup, also große cup unterstützer However, at the end of 1909, some Arab deputies were able to create a bloc that would play an important role in power politics from 1909 to 1912", "time_from": 1909, "time_to": 1912, "precision": "exact", "page": 128, "category": "Reichskrise", "confidence": "high"}, {"id": "s0311", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Ende 1909 aber arab block, spielt wichtige rolle bis 1912. Shafiq al-Mu’ayyad and Rushdi al-Sham‘a of Damascus, the leaders behind the creation of this bloc, were the same men whose election as parliamentary deputies had caused some anxiety among CUP circles in the Arab provinces. Other deputies who had been CUP supporters, including ‘Abd al-Hamid al-Zahrawi (Hama), shifted to- ward al-Mu’ayyad’s camp when they became disillusioned with the CUP party.", "time_from": 1909, "time_to": 1912, "precision": "exact", "page": 128, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0200", "source": "The Young Turk revolution and the Ottoman Empire : the aftermath of 1908 / edited by Noémi Lévy-Aksu and Franc̜ois Georgeon aai 4: Wi 1103", "date_raw": null, "text": "Verfassungsüberarbeitung 1909 damit rev vorbei? Aber jan 1913 wieder revolutionsrhetorik", "time_from": 1909, "time_to": 1913, "precision": "exact", "page": 7, "category": "Machtstrukturen", "confidence": "high"}, {"id": "s0312", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Ottoman- Arab Brotherhood Society in Istanbul wohl nicht so wichtig, nicht keim des blocks", "time_from": 1910, "time_to": 1909, "precision": "interpolated", "page": 128, "category": "Machtstrukturen", "confidence": "low"}, {"id": "s0313", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Arab partei Al-I‘tidāl (Moderation) von im haus von sulh in beirut angedacht. Bekannt dann unter Liberal Moderate Party (Al-ḥizb al-ḥurr al-Mu‘tadil", "time_from": 1910, "time_to": 1909, "precision": "interpolated", "page": 128, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0122", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Politischer mord an lib journalisten 1910", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": 519, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0126", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Cup versucht arabische provinzen, tradit unabnhängig, stärker zu kontrollieren, aufstände 1910 und 11 in syrien und arab halbinsel. Einige ägypter sind eigentlich für sultan khalif gegen briten, syrer, die nach ägypten gegangen waren, um griff des reiches zu entfliehen, waren weniger begeistert", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": 522, "category": "Revolutionsereignisse", "confidence": "high"}, {"id": "s0400", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Albanien 1910 – 12 stress über politik der entwaffnung und einziehung – entwaffnung der bevölkerung für ehr kontrolle", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": 42, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0405", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Cup kongress 1910 wohl türkifizierung", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": 45, "category": "Politische Akteure", "confidence": "medium"}, {"id": "s0127", "source": "Howard: das Osmanische Reich", "date_raw": null, "text": "Krieg tripoli mustafa kemal und enver", "time_from": 1910, "time_to": 1913, "precision": "interpolated", "page": 522, "category": "RevolutionäreEreignisse", "confidence": "high"}, {"id": "s0322", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Themen der armenier näher am herzen des imperiums, geht dann auch nicht nur um anatolien sondern auc hum versammlugnsrecht, beginnende repressionspolitik der cup", "time_from": 1911, "time_to": 1909, "precision": "interpolated", "page": 147, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0306", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Problem opposition: osmanismus betonen, geichzeitig ethnoagenda pushen", "time_from": 1911, "time_to": 1910, "precision": "interpolated", "page": 124, "category": "IdeologischerWandel", "confidence": "high"}, {"id": "s0307", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Kamil pascha regierung, nur nominell von cup unterstützt. Er wendet sich über das jahr mehr liberalen union zu", "time_from": 1911, "time_to": 1910, "precision": "interpolated", "page": 125, "category": "Politische Akteure", "confidence": "high"}, {"id": "s0308", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Oktober balkankrise, irgendwie Posten hin und her, werden kamil iweder los. Versammlungsfreiheit dann eingeschränkt", "time_from": 1911, "time_to": 1910, "precision": "interpolated", "page": 125, "category": "Reichskrise", "confidence": "high"}, {"id": "s0309", "source": "From the Streets to the Ballots", "date_raw": null, "text": "Mazedonienfrage zeigt, dass reich nicht religiös gespalten sondenr Parliament was divided along intrareligious and inter- ethnic lines in general and along Greek/Bulgarian lines regarding the Church Question.", "time_from": 1911, "time_to": 1910, "precision": "interpolated", "page": 128, "category": "GesellschaftlicheSpannungen", "confidence": "high"}, {"id": "s0403", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016", "date_raw": null, "text": "Cup doppelter charakter: bewegung, die direktkandidaten aufstellt und organisation mit sitz in thessaloniki, wird zu staat im staat, dessen politik ist geheim, aber manchmal funktionsieren befehlsketten auch nicht.", "time_from": 1911, "time_to": 1910, "precision": "interpolated", "page": 43, "category": "Reichskrise", "confidence": "high"}, {"id": "s0404", "source": "Fall of the sultanate : the Great War and the end of the Ottoman Empire, 1908-1922 / Ryan Gingeras 2016",
