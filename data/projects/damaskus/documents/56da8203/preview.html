<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Damaskus</title>
<style>
/* ── Tokens ── */
:root{
  --c-bg:#f4f3f0;--c-surface:#fff;
  --c-border:#e5e2dc;--c-border-ui:#e0ddd8;
  --c-text:#1a1a1a;--c-text-2:#555;--c-text-3:#888;--c-text-4:#aaa;
  --c-primary:#6d28d9;--c-primary-h:#5b21b6;
  --c-primary-tint:#ede9fe;--c-primary-bg:#faf5ff;--c-primary-ring:#c4b5fd;
  --c-success:#16a34a;--c-danger:#dc2626;
  --c-danger-bg:#fef2f2;--c-danger-border:#fca5a5;
  --c-code-bg:#f8fafc;--c-code-border:#e2e8f0;
}
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--c-bg);color:var(--c-text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Header ── */
#header{flex:0 0 auto;background:var(--c-surface);border-bottom:1px solid var(--c-border-ui);
         padding:10px 24px;display:flex;flex-direction:column;gap:8px;z-index:10}
#stats{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.stat-pill{display:flex;flex-direction:column;align-items:center;padding:4px 10px;
            background:#f9f8f5;border:1px solid var(--c-border-ui);border-radius:4px;min-width:64px}
.sv{font-size:16px;font-weight:700;line-height:1.2}
.sl{font-size:10px;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.04em}
#controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.fb{padding:4px 10px;border:1px solid var(--c-border);border-radius:20px;background:var(--c-surface);
     cursor:pointer;font-size:11px;color:var(--c-text-2);transition:background .15s,color .15s}
.fb.active{background:var(--fc,#333);color:#fff;border-color:var(--fc,#333)}
.fb[data-prec=""]{--fc:#333}
.fc{font-size:10px;opacity:.8}
#src-filter{padding:4px 8px;border:1px solid var(--c-border);border-radius:4px;font-size:11px;
             max-width:280px;background:var(--c-surface)}
#override-btns{display:flex;gap:6px;margin-left:auto}
#btn-export{padding:4px 10px;border:1px solid var(--c-primary);border-radius:4px;
             background:var(--c-surface);color:var(--c-primary);font-size:11px;cursor:pointer;
             transition:background .15s,color .15s}
#btn-export:disabled{border-color:var(--c-border);color:var(--c-text-4);cursor:default}
#btn-export:not(:disabled):hover{background:var(--c-primary);color:#fff}
#btn-recompute{padding:4px 10px;border:1px solid var(--c-border);border-radius:4px;
                background:var(--c-surface);color:var(--c-text-2);font-size:11px;cursor:pointer;
                transition:background .15s}
#btn-recompute:not(:disabled):hover{background:#f3f4f6}
#btn-recompute:disabled{color:var(--c-text-4);cursor:default}
#recompute-log{font-size:11px;color:#374151;background:var(--c-code-bg);
                border:1px solid var(--c-code-border);border-radius:4px;padding:6px 10px;display:none;
                font-family:ui-monospace,monospace;white-space:pre-wrap;max-height:120px;overflow-y:auto}
#recompute-log.error{background:var(--c-danger-bg);border-color:var(--c-danger-border);color:var(--c-danger)}
#cat-controls{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding-top:2px}
.cf{padding:3px 9px;border:1px solid var(--c-border);border-radius:20px;background:var(--c-surface);
     cursor:pointer;font-size:11px;color:var(--c-text-2);transition:background .15s,color .15s}
.cf.active{background:var(--fc,#333);color:#fff;border-color:var(--fc,#333)}
.cf[data-cat=""]{--fc:#333}
#quality-report{display:none;background:#fffbeb;border:1px solid #fcd34d;border-radius:4px;
                 padding:6px 12px;font-size:11px}
#quality-report summary{cursor:pointer;font-weight:600;color:#92400e;user-select:none}
.qr-warn{color:#b45309;margin-top:3px}
.qr-low{color:var(--c-text-3);margin-top:3px}

/* ── Main layout ── */
#main{flex:1 1 0;display:flex;overflow:hidden}

/* ── Timeline ── */
#timeline{flex:0 0 72px;position:relative;background:#fff;border-right:1px solid #e0ddd8;
           overflow:hidden;user-select:none}
.tick{position:absolute;left:0;right:0;display:flex;align-items:center;transform:translateY(-50%);
       cursor:pointer}
.tick:hover .tick-yr{color:#2563eb}
.tick-yr{font-size:10px;color:#bbb;width:36px;text-align:right;padding-right:4px;flex-shrink:0;
          transition:color .15s}
.tick-line{flex:1;height:1px;background:#eee}
.tick[data-decade] .tick-yr{color:#888;font-weight:600}
.tick[data-decade] .tick-line{background:#ccc}
#tl-marker{position:absolute;left:0;right:0;height:2px;background:#2563eb;
            transition:top .2s ease;pointer-events:none;z-index:2}
#tl-marker::before{content:"";position:absolute;left:36px;top:-4px;
                    width:8px;height:8px;background:#2563eb;border-radius:50%}
#tl-year-label{position:absolute;right:4px;font-size:10px;font-weight:700;color:#2563eb;
                transition:top .2s ease;transform:translateY(-100%);pointer-events:none;z-index:2}

/* ── Cards panel ── */
#cards{flex:1 1 0;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}

/* ── Card ── */
.card{background:var(--c-surface);border-radius:6px;border:1px solid var(--c-border);
       border-left:4px solid var(--prec-color,#ccc);
       padding:8px 12px;cursor:default;position:relative;
       transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card.hidden{display:none}
.card.has-override{box-shadow:0 0 0 2px #7c3aed33}
.card-source{font-size:10px;color:var(--c-text-4);margin-bottom:2px;
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 60px)}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.card-time{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--c-text)}
.badge{font-size:9px;text-transform:uppercase;letter-spacing:.05em;padding:1px 5px;
        border-radius:3px;color:#fff;background:var(--prec-color,#999)}
.cat-badge{font-size:9px;padding:1px 6px;border-radius:3px;color:#fff;
           white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.card-text{font-size:12px;line-height:1.55;color:var(--c-text-2)}
.card-page{font-size:10px;color:var(--c-text-4);margin-left:4px}
.card-note{font-size:10px;color:var(--c-primary);margin-top:4px;font-style:italic}

/* ── Edit button ── */
.btn-edit{position:absolute;top:6px;right:8px;padding:2px 7px;
           border:1px solid #d1d5db;border-radius:3px;background:var(--c-code-bg);
           color:var(--c-text-2);font-size:10px;cursor:pointer;line-height:1.4;
           transition:background .12s,border-color .12s}
.btn-edit:hover{background:var(--c-primary-tint);border-color:var(--c-primary);color:var(--c-primary)}
.btn-edit.active{background:var(--c-primary);border-color:var(--c-primary);color:#fff}

/* ── Inline edit form ── */
.edit-form{margin-top:8px;padding:10px;background:#f9f8f5;border-radius:4px;
            border:1px solid var(--c-border-ui);display:flex;flex-direction:column;gap:8px}
.ef-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ef-label{font-size:10px;color:var(--c-text-3);min-width:50px}
.ef-textarea{width:100%;font-size:12px;line-height:1.5;padding:5px 7px;
              border:1px solid #d1d5db;border-radius:3px;resize:vertical;min-height:60px;
              font-family:inherit}
.ef-textarea:focus{border-color:var(--c-primary);outline:none}
.ef-input{padding:3px 7px;border:1px solid #d1d5db;border-radius:3px;font-size:12px;width:72px}
.ef-input:focus{border-color:var(--c-primary);outline:none}
.ef-input-wide{width:100%;padding:3px 7px;border:1px solid #d1d5db;border-radius:3px;font-size:12px}
.ef-check{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--c-text-2);cursor:pointer}
.ef-actions{display:flex;gap:6px}
.btn-save{padding:4px 12px;background:var(--c-primary);color:#fff;border:none;
           border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-save:hover{background:var(--c-primary-h)}
.btn-cancel{padding:4px 10px;background:var(--c-surface);color:var(--c-text-2);
             border:1px solid var(--c-border);border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-cancel:hover{background:#f3f4f6}

/* ── empty state ── */
#empty{display:none;padding:40px;text-align:center;color:#999;font-size:13px}
</style>
</head>

const DATA = [{"id": "s0352", "source": "Weismann", "date_raw": null, "text": "Sufi reformbewegung seit 1780er", "time_from": 1780, "time_to": 1780, "precision": "exact", "page": 115, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0353", "source": "Weismann", "date_raw": null, "text": "Ägypten unter muhammad ali waren sufi orden unter staatl kontrolle, azhar anhänger präsentierten sich als sprecher der vielen gegen den herrscher", "time_from": 1780, "time_to": 1820, "precision": "interpolated", "page": 115, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0354", "source": "Weismann", "date_raw": null, "text": "Ende osm sponsored azm rule in syrien. Tripoli ab al qadir rafii, hoisting banner of ilm", "time_from": 1780, "time_to": 1820, "precision": "interpolated", "page": 115, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0355", "source": "Weismann", "date_raw": null, "text": "Damakus: weniger an ägypten angebunden als tripoli oder beirut, hier wird Khalwati idee verbreitet von außenseitr Umar al Yafi (d1817), keine tiefen wurzeln geschlagen", "time_from": 1780, "time_to": 1820, "precision": "interpolated", "page": 116, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0356", "source": "Weismann", "date_raw": null, "text": "Aufstände 1820er machen aufschwung für sufi reformisten. In aleppo und tripoli khalwatiyya bakriyya. 2. Viertel jh tripoli besonders wichtig: Mahmud al rafii, muhammad al jizr (kurz ägypten, dann küste", "time_from": 1820, "time_to": 1820, "precision": "exact", "page": 117, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0358", "source": "Weismann", "date_raw": null, "text": "Wichtigster reformist: Khalid Sharizuri (d1827), kurde, reist dheli, naqshbandiyya in damaskus gegründet. Schafft gute orga und einfluss, in arab provinz aber auch Istanbul (für tanzimat). Damaskus ab 1823 führt zu rel erwachen ulama und volk (junge männer Händlerfamilien, die unter 0, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0357", "source": "Weismann", "date_raw": null, "text": "Dann muhammad Rashid Miqati an küste entlang syrien (d1865). Alle unterstützen revolte 1834, miqati darf allein bleiben. 1860 stoppt miqati den mob davor, christen zu killen", "time_from": 1834, "time_to": 1860, "precision": "exact", "page": 118, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0451", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "1838 anglo osm vertrag senkt zölle gut für christl händler", "time_from": 1838, "time_to": 1838, "precision": "exact", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0073", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Außerdem posten durch tanzimat geschaffen, Council of the District (Majlis al-idara al-liwa') and the Municipal Council (Majlis al-baladiyya) of Damascus. Ulama familien monopolisieren Hanafi Mufti and Naqib al-Ashraf  posten", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 30, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0449", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "1839 gülhane: gleichheit aller", "time_from": 1839, "time_to": 1839, "precision": "exact", "page": null, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0454", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Tanzimat macht expertise der ulama zweifelhaft", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 12, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0455", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Mitte jh telegraphie und bahn  - zugriff istanbul, imeprium greift zu", "time_from": 1839, "time_to": 1839, "precision": "interpolated", "page": 13, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0456", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Tanzimat m acht nichtrel wissen wichtiger – schlecht für status in elite", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 13, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0525", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "The conservative ulama represented a faction of religious intellectualswho held fast in the face of the changes wrought by the Tanzimat in Damascus. Professional interests in customary practices and beliefs operative in law courts, mosques, and shrines buttressed the comfortable option of upholding inherited interpretations of Islam. … Sultan Abdulhamid's patronage of Sufi orders and shaykhs gave the conservatives a respite after the Tanzimat reforms had circumscribed the ulama's authority by establishing secular judicial and educational institutions. Emboldened by the sultan's patronage, conservative ulama took it upon themselves to act as ideological police upholding traditional religious beliefs and the sultan's authority. (konnten sich nie ganz durchsetzen sie festzusetzen aber salafis mithilfe des staates belästigen", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 115, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0639", "source": "Dawn: the origins of arab nationalism (zusammenfassung stand der dinge)", "date_raw": null, "text": "Tanzimat reform sei borrowing, salafi dagegen für eigene reform", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 7, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0658", "source": "Khalidi ottomanism and arabis before 1914", "date_raw": null, "text": "Neue schicht durch tanzimat: offiziere, journalisten, lehrer, kinder der elite wie aufsteiger die dann kef", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 64, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0660", "source": "Khalidi ottomanism and arabis before 1914", "date_raw": null, "text": "Notable als intermediäre zw bev und staat herausgefordert. Die sind dann osmanisten, weil sie da ihre macht weiter nutzen können im starken kef staat", "time_from": 1839, "time_to": 1839, "precision": "interpolated", "page": 64, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0674", "source": "Reviews", "date_raw": null, "text": "The youngest member in the first generation of the new Ottoman tendency that emerged in Damascus under the Tanzimat regime, ManÊnÊ was the scion of a religious family which had traditionally held the prestigious post of teaching hadith under the Nasr dome in the Umayyad mosque.", "time_from": 1839, "time_to": 1839, "precision": "event", "page": 124, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0698", "source": "Matossian", "date_raw": null, "text": "Araber wollen gleichheit des Tanzimat, nicht Hofpositionen aufgeben, eher liberal als voll KEF, gerichts- u. schulsprache Türkisch Beleidigung", "time_from": 1839, "time_to": 1839, "precision": "event", "page": null, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0700", "source": "Matossian", "date_raw": null, "text": "Werden tanzimat nicht als gruppe gesehen weil keine Minderheit, erst nachda macht etwas", "time_from": 1839, "time_to": 1839, "precision": "event", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0640", "source": "Dawn: the origins of arab nationalism (zusammenfassung stand der dinge)", "date_raw": null, "text": "Arab christen mochten anglo protestanten garnicht", "time_from": 1839, "time_to": 1860, "precision": "interpolated", "page": 7, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0675", "source": "Reviews", "date_raw": null, "text": "Mujtahid incident", "time_from": 1839, "time_to": 1860, "precision": "interpolated", "page": 125, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0074", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Gibt familienstiftungen, zum schutz vor konfiszierungen, da sitzen auch mal ulama vor", "time_from": 1839, "time_to": 1909, "precision": "interpolated", "page": 31, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0075", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Gab weniger religionsposten als bewerber. Several families among the 'honorable citizens'-notably the 'Ajlanis, the Ghazzis, the Kaylanis and the Hasibis - merged with a group of non-scholarly landowning families to form the cream of Damascus society in the late nineteenth century.", "time_from": 1839, "time_to": 1909, "precision": "interpolated", "page": 31, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0076", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Ajlani und hamzas teilen sich übers jh den posten Naqib al-Ashraf", "time_from": 1839, "time_to": 1909, "precision": "interpolated", "page": 31, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0213", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Nach konterrev konterrev und liberale festgenommen -  kef schwach, aber die einzigen, verschärfung konflikt zentralismus dezentralismus, aber nicht an sozioökonomischen linen, eher fluide. Zentralismus Muslim officialdom and lower-middle-class gg europ einfluss, ältere offiziere und bürokraten wollen macherhalt, also dezentralisierung. Außerdem übergangene bei posten und Handel leute. Andere wollen tanzimat privilegien behalten", "time_from": 1839, "time_to": 1909, "precision": "event", "page": 63, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0239", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Lynch affäre führte zu rücktritt husein hilmi pascha. Lynch brothers hatten business am tigris seit 1839, lynch company war symbol für brit interessen zwischen ägypten und indien. Ende 1909 überlegung regierung merger ottoman hamidiya compagny mit lynch – hieße lynch monopol tigris schiffahrt. Kef dafür, weil sie dafür darlehen v briten bekämen. Araber finden das doof, mangel an fürsorge für ihre gebiete, außerdem dann schauplatz deutsch-brtitische rivilität", "time_from": 1839, "time_to": 1909, "precision": "exact", "page": 76, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0148", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "The events of i860 gave the Ottoman government an opportunity to alter the local political configuration to facilitate its program of central- ization and modernization. Already the earliest institutions established by the Tanzimat (after 1841) had begun to break down the local paramilitary power base of leaders outside the traditional leadership; these individuals and some of their followers were, at the same time, offered a new power base within the local bureaucracy. Then a decisive Ottoman intervention to check the traditional leadership's attempt to shift the local balance of power in its own favor occurred in i860. The 'honorable citizens' were punished for failing to prevent or control the militant outburst of the populace and the erosion of their local power was drastically illustrated and their lack of zeal in implementing Ottoman policies severely acknowledged. The events of i860 permitted the Ottoman government to forge a new and more useful political elite by expanding the local bureaucracy and supporting upcoming families not previously a part of the traditional leadership.", "time_from": 1841, "time_to": 1841, "precision": "exact", "page": 93, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0149", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Drei arten regierung Istanbul: effizientere provinzialbürokratie, da braucht man posten um reich zu warden. Istanbul alleiniger Postengeber, säkulare posten 93f", "time_from": 1841, "time_to": 1841, "precision": "interpolated", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0150", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Damaszener eliten haben es damit sehr lange geschafft, niemanden in ihre Kreise zu lassen", "time_from": 1841, "time_to": 1841, "precision": "interpolated", "page": 94, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0151", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Familienstrukturen machen vertikale gesellschaftsintegration, horizontale verhindern sie", "time_from": 1841, "time_to": 1841, "precision": "interpolated", "page": 94, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0152", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Der ökon widerspruch, der zutagetritt ist intrafamiliar, die unteren nehmen arabismus als vehikel", "time_from": 1841, "time_to": 1841, "precision": "interpolated", "page": 95, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0153", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Christen hatten idee der araber geformt weil mitspielen wollten, zur ideologie wird es als sie eigentlich schon ganz gut dastehen mit handel etc", "time_from": 1841, "time_to": 1841, "precision": "interpolated", "page": 96, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0154", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Araber waren eigentlich osmanisten weil in istanbul elitenideologie war, osmanismus va hieß türken und araber. Daraus machen sie später bei KEF nur araber", "time_from": 1841, "time_to": 1841, "precision": "interpolated", "page": 97, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0155", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Ulama war schon seit halbe jahrhundert absteigend, Thus Arab religious leaders tried to use Arab nationalism as a double-edged sword: one edge would permit Arabs to cut their way back to their traditional position of leadership and influence among Muslims; the other would cut out a' truly Islamic State' based on purely religious solidarity,8 one in which the political influence of Arab religious experts would be paramount.", "time_from": 1841, "time_to": 1841, "precision": "interpolated", "page": 98, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0477", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Achtung anderer jazairi: Tahir al jazairi floh 1847 aus algerien. Viel mehr kontakt zu osm offiz als andere ulama", "time_from": 1847, "time_to": 1847, "precision": "exact", "page": 41, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0678", "source": "Reviews", "date_raw": null, "text": "#$rif al-Munayyir (1848-1923", "time_from": 1848, "time_to": 1923, "precision": "exact", "page": 126, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0072", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Nach 1850 wurden mixed courts eingeführt, ulama verlieren boden im rechtssystem", "time_from": 1850, "time_to": 1850, "precision": "exact", "page": 29, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0360", "source": "Weismann", "date_raw": null, "text": "1850er europäisierung und herausforderung durch jazairi (d1883), der bringt zusammen west rationalität, glaube und toleranz", "time_from": 1850, "time_to": 1850, "precision": "exact", "page": 120, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0121", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "The Damascus brand of Arabism evolved in the early years of the twentieth century as a literary and cultural movement composed of young intellectuals connected to the circle of religious scholars around Shaykh Tahir al-Jaza'iri (b. 1851), a noted teacher and religious reformer. This movement was directed by a loosely-knit organization called the Arab Renaissance Society (jamHyyat al-nahda aWArabiyya).59", "time_from": 1851, "time_to": 1851, ": "interpolated", "page": 32, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0472", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Jazairi ist für ulama held wegen erfolg, macht rationalismus gegen europa", "time_from": 1860, "time_to": 1847, "precision": "interpolated", "page": 32, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0473", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Einfluss abduh und afghani durch urwa wuthqa", "time_from": 1860, "time_to": 1847, "precision": "interpolated", "page": 32, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0474", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Zweite hälfte 19 jh gap zwischen ulama und notablen und istanbul", "time_from": 1860, "time_to": 1847, "precision": "interpolated", "page": 34, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0475", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Khani familie naqshbandani orden – schaffen erst fuß zu fassen als eigentlich rel posten weniger wichtig werden", "time_from": 1860, "time_to": 1847, "precision": "interpolated", "page": 37, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0476", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Rida nennt abd al razzaq al bitar „reviver of the salafi school in Damascus”", "time_from": 1860, "time_to": 1847, "precision": "interpolated", "page": 38, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0064", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Seit 1860 verschw uma. Haben bewaffnete gefolgschaft. Haben kein bock auf lokalpolitik sondern auf paris/istanbulo intrigen", "time_from": 1860, "time_to": 1860, "precision": "exact", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0099", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "In 1860, the notables failed to demonstrate decisive urban leadership when they obstructed the interests both of Istanbul and the local populace in Damascus. In the ensuing period (1860-1908), the behavior of the political leadership became less am- biguous. It openly identified with and defended the interests of the Ottoman state and more clearly defined its relationship with local society as one of outright control and domination.", "time_from": 1860, "time_to": 1860, "precision": "exact", "page": 46, "category": "Politik", "confidence": "high"}, {"id": "s0446", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "3 besonderheiten: status hängt davon ab, wie wichtig religion ist. Vor 1860 waren sie klasse der ökon elite. Ulama umfasst arm bis reich", "time_from": 1860, "time_to": 1860, "precision": "exact", "page": 9, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0453", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Nach 1860 mehr truppen: osm und fr bei beirut, angst vor eroberung", "time_from": 1860, "time_to": 1860, "precision": "exact", "page": 12, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0467", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Verhindert 1860 gewalt, evtl angst vor europ involvement. Europ. dankbar", "time_from": 1860, "time_to": 1860, "precision": "exact", "page": 28, "category": "Politik - Politische Ak ate_raw": null, "text": "Rural security improved as beduin tribes were encouraged to settle in greater numbers. Agricultural production and rural population grew in many districts as the margins of cultivation were pushed eastward. Even some hardpressed industries began to enjoy a revival by finding increased demand in the towns and countryside. Regional and international commerce continued to expand. Modern elementary, secondary, technical and military schools, departments of justice, and a modernized gendarmerie were other derivatives of the consolidation and extension of reforms stemming from Istanbul during the reign of Sultan 'Abd ul-Hamid II.1", "time_from": 1860, "time_to": 1908, "precision": "interpolated", "page": 53, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0105", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Autoritarismus Abdülhamid war nicht so das problem, gab genug profit. In beirut aber waren christen unglücklich, außerdem verbindungen zur handel nicht vorteilhaft, damaskus mehr an den Hof gebunden", "time_from": 1860, "time_to": 1908, "precision": "interpolated", "page": 54, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0106", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "hat opposition did exist in Damascus seems to have come from two sources. One included members of the Muslim religious establishment who were unable to diversify their power bases and thus remained ensconced in the decaying religious institutions. Unerfolgreiche Ulama konnten nur immer gegen säkularisierung kämpfen. Benutzen dafür die ungebildeten, rückkehr zum Islam. Mit panislamismuspolitik abdülhamids nimmt er aber den wind daraus. The Sultan's movement, which has been described as ' learn the sciences of war, establish more schools and develop the resources of the country, but in doing so adopt European ideas and techniques only where they agree with the spirit of Islam, '2 left disaffected 6ulama9 with few issues around which to rally opposition and no recourse but to work as agents of a joint Ottoman-Islamic revival.", "time_from": 1860, "time_to": 1908, "precision": "interpolated", "page": 54, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0107", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "The other visible source of dissidence in Damascus came from secular (and some religious) dignitaries who seem to have lost position in the state system. Some were linked to a group of Turkish liberal reformers who focused their attention, often from exile, on the issues of restoring the Constitution, greater freedom of expression, and a decentralized administrative system. Eventually they were to channel their growing opposition to the Sultan into a secretly organized movement of Turks and Arabs.", "time_from": 1860, "time_to": 1908, "precision": "interpolated", "page": 55, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0642", "source": "Dawn: the origins of arab nationalism (zusammenfassung stand der dinge)", "date_raw": null, "text": "Kurd ali gehört zu islamisten turned arabists. Außerdem mahmud shukri al alusi, abd al hamid zahrawi", "time_from": 1860, "time_to": 1918, "precision": "interpolated", "page": 9, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0643", "source": "Dawn: the origins of arab nationalism (zusammenfassung stand der dinge)", "date_raw": null, "text": "Kedouri sagt islam geschwächt durch westl einfluss, dann arabismus, durch britisch installierte offiziere in ww1", "time_from": 1860, "time_to": 1918, "precision": "interpolated", "page": 9, "category": "Gesellschaftliche Gruppen", "co an Empire, 1908-1918 (1997)", "date_raw": null, "text": "In 1895 three students from Tahir al-Jaza’iri’s entourage, Shukri al-‘Asali, Salim al-Jaza’iri, ‘Abd al-Wahab al-Inkilizi, and an Arab officer in Damascus, As‘ad Darwish, formed a political group and established contacts with Young Turk sympathizers in Damascus, including Bedri Bey and the director of education, Hüseyin Avni Bey. – gehen dann nach Istanbul. In Istanbul ärgern sies ich darüber, dass söhne türkischer funktionsträger in schulen sonderbehandlungen bekommen. Gibt auch sonderbehandlungen für söhne von shaikhs.", "time_from": 1895, "time_to": 1895, "precision": "exact", "page": 40, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0520", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Zu kontext? 1895-1902 Ereignisse in ägypten. Möglicherweise wilfried blunt neuen kaliphen mit rel, nicht polit autorität einigen quraish vorgeschlagen. Weiterleben als Gerücht. Rafiq al azm sagt das haben jungtürken gestreut um druck für verfassung zu machen. Kawakibi widerholt forderung in einem buch, rida druckt teile in al manar – macht salafi verdächtig", "time_from": 1895, "time_to": 1902, "precision": "exact", "page": 108, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0487", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Jamal al din Qasimi, ahmad jazairi razzaq bitar machen wöchentl treffen, mustafa al hallaq und muhammad said qasimi machen dann mit. Wird größer, kommen zwei notablen die qasimi nicht mögen, streiten sich. Nächste treffen kommt prominenter: bakri al attar, alte ulama familie. Lesen später sharani Gegner strteuen dann gerüchte sie hätten geheime agenda osm autorität zu unterminieren 50f", "time_from": 1896, "time_to": 1860, "precision": "interpolated", "page": null, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0488", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Gegner treffen sich mit muhammad al manini, jurisconsult – der lässt gruppe vorladen. Viele tun abwesen oder krank, ahma jazairi hatte fr schutz", "time_from": 1896, "time_to": 1860, "precision": "interpolated", "page": 51, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0489", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Jüngster, qasimi als erster vorgeladen, vorwurf: hätten quran und hadithe interpretiert und autoritative imame meinung außer acht gelassen", "time_from": 1896, "time_to": 1860, "precision": "interpolated", "page": 51, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0490", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Wir haben doch sogar mit attar zusammengesessen – halts maul, sag seinen namen nicht (um nicht mit dem in konflikt zu kommen", "time_from": 1896, "time_to": 1860, "precision": "interpolated", "page": 52, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0491", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Qasimi paar tage festgenommen, dann freigelassen. Ergebnis: vindiction, schmach für Mufti Manini", "time_from": 1896, "time_to": 1860, "precision": "interpolated", "page": 52, "category": "Politik - Politisches System", "confidence": "high"}, {"id": "s0492", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Qasimi macht mit bei ulama die manini scheiße finden", "time_from": 1896, "time_to": 1860, "precision": "interpolated", "page": 53, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0158", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "In 1896 the Turco-Syrian Committee merged with the Paris-based Union and Progress organization and helped Ahmed Rıza’s group establish contacts with the Egyptian-based opposition to Abdülhamid.178", "time_from": 1896, "time_to": 1896, "precision": "exact", "page": 36, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0159", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The Turco-Syrian Committee disappeared before the turn of the century, perhaps because Syrian aspirations for reform were to a large extent fulfilled by Abdülhamid. The province of Syria received preferential treatment from the Palace183 consistent with Abdülhamid’s desire to better integrate the Arab elite into the central administration.", "time_from": 1896, "time_to": 1896, "precision": "interpolated", "page": 37, "category": "Politik", "confidence": "high"}, {"id": "s0160", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "1896 armenier bei kef kongress nach nationalismus gefragt, dann denounced, dann araber gefragt, die sagen alle niemals", "time_from": 1896, "time_to": 1896, "precision": "exact", "page": 37, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0486", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Auftreten salafi erstmals 1896 bei mujtahid incident", "time_from": 1896, "time_to": 1896, "precision": "exact", "page": 50, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0161", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Abdülhamid’s active recruitment of Arabs to his personal service has mistakenly identified Arabs with the regime and have slighted their role in the opposition. At a time when the Palace overshadowed the Sublime Porte (or the ministerial bureaucracy), the sultan’s policy did indeed bring many Arabs of conservative leanings to influential positions. Abdülhamid thus drew on a pool of advisers, secretaries, and functionaries who were removed from the bureaucratic power struggles in İstanbul and who harbored personal loyalty to him.191 The choice of Arab dignitaries with mainstream Sunni and mystical Sufi backgrounds and enjoying religious prestige added to the force of his Islamic policy.192 Most important, the co-optation of Arab notables into the bureaucracy and palace administration served his policy of centralization.", "time_from": 1896, "time_to": 1908, "precision": "interpolated", "page": 38, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0514", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "In damaskus jungtürken aktivität bis 1897, vorher basis unzufriedene soldaten, die auf sold warten", "time_from": 1897, "time_to": 1897, "precision": "exact", "page": 94, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0515", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Senio circle verbindung salaf und jungtrürken", "time_from": 1897, "time_to": 1898, "precision": "interpolated", "page": 94, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0516", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Anbar schüler teilen sich in araber und türken, kämpfen richtig. Schmuggeln zeitungen", "time_from": 1897, "time_to": 1898, "precision": "interpolated", "page": 95, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0517", "source": "Commins: Islamic Reform. Politics and Social Change in
