 Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Assiziationsfreiheit: Greek Political Club (Rum Siyasi Kulübü), the Serbian-Ottoman Club (Sırp- Osmanlı Kulübü), the Armenian Dashnak (Federation), the Bulgarian Club, the Jewish Youth Club (Musevi Gençler Kulübü), the Lovers of Anatolia (Anadolu Muhibleri), the Albanian Bashkim (Union), and the Kurdish Mutual Aid Society (Kürt Teâvün Kulübü), stoßen bald mit KEF zusammen. Folge ist council of state erarbeitetes gessetz für assitiationen. Parlamentsbeschluss 29. Jul 1909", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 59, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0205", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Kef hält wie alle revolutionäre bildung für wichtig, aber nicht als kaderausbildung sondern für einsicht in liberale ordnung. 1909 schuele für 500 in damaskus, noch paar abendschulen", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 60, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0219", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Nach rev gab es ethn orgas, In a first step to defuse these organizations after the counterrevolution, the CUP attempted to form an umbrella organization called the Ottoman Allied Committee (Heyet-i Müttefika-ı Osmaniye),390 which included these and other cultural and political societies, including the Liberal Party. A few months later, the new Law of Association banned ethnic-based organizations.", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 67, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0224", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Änderung ist 1909 dass türkisch gerichtssprache wird, das findet sogar tanin unpraktisch", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 70, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0229", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Unionisten partei KEF nach konterrev 1909 gegründet, zu unterscheiden von KEF gesellschaft mit hoffnung, damit oppositionelle einbinden zu können", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 73, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0230", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Moderate Liberal Party (Mutedil Hürriyetperveran)(viele araber) and the People’s (Ahali) frühsommer 1909 gegründet", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 73, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0252", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Hawran waren es drusen, deren revolten eigentlich 1909 unter kontrolle gebracht waren. Kommandeur armee dagegen Faruq sami pascha (arab). War wegen ausstehender subventionen an nomaden bzw deren weigerung sich registrieren zu lassen von gouverneur ismail fazil, der dann entlassen. Hinrichtung anführer, aber zahlungen werden wieder aufgenommen: keine volle kontrolle", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 81, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0305", "source": "Caesar Farah, “Arab Supporters of Sultan Abdulhamid II: ‘Izzet al-‘Abid,” in Archivum Ottomanicum 15 (1997): 189–219.", "date_raw": null, "text": "Ulama aus damaskus schreibt brief wegen gerichtsverfahren zu konfiszierung. Dennoch urteil gg ihn 10 juli 1909", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 207, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0390", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "konterrevolution und inkonsistenz kef sowie unordnung und aufhören des spionageapparates führt zum spießen von vielen ideologischen gruppen", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 133, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0391", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "sie sind nicht nur strategisch anpassungsfähig sondern auch inhaltlich, folgende stelle ist salafi nicht unähnlich:", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0392", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "We have argued that religion is far from being inflexible. If we were to assume that religion had not legislated the veil, that in olden times women were not told to veil , and that women were virtuous on their own and obeyed the rules of religion , even this is no argument against things remaining as they are, nor does it deny our right to legislate according to our present needs . This is especially true in an age in which honor and religion have been abused and there is pride only in following animal desires and European customs . The greatest evidence of the wisdom of Muhammad and his ability to legislate according to need is that you see him legislating against something on certain occasions , then allow¬ ing it at other times . The wisdom in this is that social relations will be protected by setting rules dictated by levels of culture , civilization , and the degree to which they have been corrupted . 17", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 135, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0393", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Wie antionalisten: universal/modern /tradit/partikular, kann aber beides in einr soz org vorkommen. Erben der Tradition und erben der Aufklärung. Annahmen: fortschritt, universelle Zivilisation, Teilung der welt in Gruppen. All das kommt in watan stelle vor, nur Territorium nicht. In anderen Schriften kommt aber terret. vor 135f", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0394", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Gedicht nationalismus, erst in watan dann haqaiq:", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0395", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "ginally appeared in the newspaper al- Watan before its republication in al- Haqa 'iq :", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Presse und Öffentlichkeit", "confidence": "high"}, {"id": "s0396", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "0 sleepy Arab nation (umma ) , wake up ! All nations have surpassed you . 1 see foreigners depleting our [ Ottoman ] nation ( dawla ) while all its inhabitants remain relaxed and smiling. They seize our land for themselves to declare their greatness in it and to control it . But our land , which has been watered throughout all the ages with our blood , can never be sold as long as blood still pumps in our veins . 19", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 136, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0397", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Fortschritt durch religion:", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0398", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "The happiness of every umma is based upon its return to the foundations of the proper religion , accepting its judgments , and ensuring that all receive guidance . This might be accomplished by exhorting the people to purify their hearts , rectify their morals , stand up to adversity , and learn to speak with a unanimousvoice ...", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0399", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "If an adherence to the foundations of religion generates the power of unity and complete harmony for the umma and if it restores moral virtue to the umma , widens the circle of cul¬ ture , and enables it to progress to the highest degree of civilization , then we cannot but hasten to that which is the means to our success and the means to recover our glory , and we cannot but shun that which sweeps us away to the abyss of degeneration .2", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0400", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Islam wird hier terretorialmarker zwischen ost und west", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 136, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0401", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Sie können sogar proudhon, comte und fourier zitieren", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 137, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0402", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Abdülh hat sie stark beeinflusst bei islam als wataniyya – ist ja genau sein versuch gewesen, osm reich machte bürgerbewusstsein, offiziellen nationalismus", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 137, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0403", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Technik hat nationalismus möglich gemacht, dennoch ist es ein ideologisches projekt", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 139, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0404", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Kultur ist teil staatlicher politik:", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Politik", "confidence": "high"}, {"id": "s0405", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "It is appropriate for us to examine a bit the influence of contemporary civilization on the characteristics of nations ... We say that civilization exists in a nation only if that nation strives for the material and spiritual causes of happiness . . . As for now , civilization is on the verge of spreading throughout all areas of the earth . In the main, there is no way a nation can disappear or decay . Every contemporary state has prepared completely for the continuation of its rights and for the preservation of its existence by recasting its social structures . This makes them fortunate, for it endows them with an abundance of spiritual and material progress .", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0406", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "There is thus among nations a great equity in terms of civilization , with the exception of some Eastern states that are still absorbed in a period of languor. There are pacts among civilized nations which guarantee to all of them their continued rights . This is because the rights of states are not built except on a foundation that \" dominion is to the victor .\" It is power , therefore , which preserves the right of a nation against whomever seeks to violate it and which preserves its existence among other nations .27", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0408", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Das ist nicht explizit sondern in bezug auf aktuelle themen eine antwort auf herausfoderungen der zeit. Verkaufen das als fortführung des hamidischen projekts", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 140, "category": "Personennetzwerke", "confidence": "low"}, {"id": "s0409", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Qassab bringt dann denkart in nationale kommittees ein", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 141, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0410", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Ihr nationalismus ist die antwort auf fragen ihrer gegenwart, und es gibt verschiedene varianten von nationalismus, haqaiq hat eine bestimmte geprägt", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 142, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0527", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "kontext “Damascus's conservative ulama lapsed into political quiescence following their defeat in April 1909. A year later a monthly journal appeared, marking a new phase in the campaign against salafism and a novel development in the conservative interpretation of Islam. This journal, al-Haqa'iq, articulated conservatives' objections to salafism and indicated their adjustment to ideas about progress.“", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 116, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0528", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Nabhani hat an al azhar afghani und abduh getroffen", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 116, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0529", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Nabhani hat sich hochgearbeitet durch osm bürokratie", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 117, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0530", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Nabhani sagt man kann koran nicht mehr verstehen, kein ijtihad nach 10. Jh mehr möglich", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 118, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0531", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "kontext Nabahani's ad hominem arguments and his reliance on the sayings of ulama and Sufi saints to defend popular Islam and the legal schools' authority underlines his rejection of the ideas and methods of the salafis and their reformist predecessors. To convince fellow ulama, the salafis had staked out the Quran and the Sunnah as the grounds of their interpretation of Islam. Their assimilation of reason, unity, and progress to a reformist vision of Islam served to persuade Muslims with a \"modern\" education that religion could provide the basis for reforming the empire. Nabahani did not provide a conservative alternative to the salafis that addressed these pressing needs, but a group of ulama in Damascus formulated such an alternative in the journal al-Haqa'iq.", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 118, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0539", "source": "Conclusion", "date_raw": null, "text": "Arabisten verlassen sich auf kef bei konterrev aber auch gg christen", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 143, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0540", "source": "Conclusion", "date_raw": null, "text": "Spaltung kef arabisten über Reform", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 143, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0541", "source": "Conclusion", "date_raw": null, "text": "Kef sieht in notablen bessere verbündete als schreiberlinge/salafi rechtsgelehrte", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 143, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0546", "source": "Kedouri The Impact of the Young Turk Revolution in the Arabic-Speaking Provinces of the Ottoman Empire, 1974 – in Arabic political memoirs and other studies / Elie Kedourie 4: Qi 1008", "date_raw": null, "text": "Text geht nicht weit nach 1909", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": null, "category": "Politik", "confidence": "high"}, {"id": "s0605", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "konterrevolution und inkonsistenz kef sowie unordnung und aufhören des spionageapparates führt zum spießen von vielen ideologischen gruppen", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 133, "c _to": 1909, "precision": "interpolated", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0623", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "There is thus among nations a great equity in terms of civilization , with the exception of some Eastern states that are still absorbed in a period of languor . There are pacts among civilized nations which guarantee to all of them their continued rights . This is because the rights of states are not built except on a foundation that \" dominion is to the victor .\" It is power , therefore , which preserves the right of a nation against whomever seeks to violate it and which preserves its existence among other nations .27", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0625", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Das ist nicht explizit sondern in bezug auf aktuelle themen eine antwort auf herausfoderungen der zeit. Verkaufen das als fortführung des hamidischen projekts", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 140, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0626", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Qassab bringt dann denkart in nationale kommittees ein", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 141, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0627", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Ihr nationalismus ist die antwort auf fragen ihrer gegenwart, und es gibt verschiedene varianten von nationalismus, haqaiq hat eine bestimmte geprägt", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 142, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0628", "source": "Conclusion", "date_raw": null, "text": "Gab garkeinen einheitlichen arabischen nationalismus", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 287, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0629", "source": "Conclusion", "date_raw": null, "text": "Al fatat und arab club sind hinter den kulissen politik, sie werden abgelöst von massenorganisationen", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 288, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0630", "source": "Conclusion", "date_raw": null, "text": "Geheimgesellschaften vision war zivilisation, allumfassend, mahnend (hortatory), vision der wenigen. Und gegen die, die ihre nation verkaufen würden", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 289, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0631", "source": "Conclusion", "date_raw": null, "text": "Es gab öffentliche feste, volk war aber im grunde statist. Proteste machen sie dann zu akteuren", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 290, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0701", "source": "Matossian", "date_raw": null, "text": "Nach Konterrev 1909 „For some of the Arab notables, this juncture resulted in an inability to reclaim their previous status, leading some to cooperate with the new regime while others began looking for alternative ways to express their grievances—through, for example, proto-nationalism that later crystallized into Arabism.“", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": null, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0715", "source": "Matossian", "date_raw": null, "text": "It was also at the end of 1909 that a heated debate took place over the Lynch affair, which related to the government’s plan to provide commercial conces- sion in Iraq to a foreign enterprise: the British Lynch Company. … Four major issues were especially pertinent to the Arab deputies in the par- liamentary debates: ratification of the electoral results for four Arab deputies, including al Mu’ayyad; the Mutran affair; the Hidjaz Railway; and the Baghdad Railway.", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0718", "source": "Matossian", "date_raw": null, "text": "Als konterrev nachricht in damaskus ankam, versammelten sich society of muslim mitglieder mit bevölkerung bewaffnet auf city Square und drohten in großer Moschee versammelte cup mitglieder zu töten, drei tage Feier der Konterrevolution. Muqtabas berichtet von schmuck municipality. Muqtabas: Damaszener wurden aufgehetzt von 5-6 notablen, die nicht von der konstitutionellen regierung befördert worden waren, daher ihre Feinde wurden (muqtabas 30.05.1909, nr 138,3-4)", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0225", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Interethnische spannungen laut brit Konsul in Damaskus von oben, verbreitet sich nach unten", "time_from": 1909, "time_to": 1910, "precision": "interpolated", "page": 71, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0226", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Kritik an türkifizierung wird vehikel für araber, die unzufrieden sind – wie christen, die islamisierung befürchten, während araber Säkularisierung anprangern", "time_from": 1909, "time_to": 1910, "precision": "interpolated", "page": 71, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0227", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "In Damascus, it was the newly appointed müftü, Sulayman Chukhadar, who drew the ire of a number of town notables, including Sa‘id Mu’ayyad al-‘Azm. Chukhadar, who had served as magistrate in a number of Arab and Anatolian towns before his election to Parliament (and who was to serve as minister of justice in Syria in the post-Ottoman period),414 resigned his parliamentary seat on appointment to Damascus as müftü. The petitioners expressed dissatisfaction with what they considered to be his promotion to an undeserved post and went so far as to blame the rebellion in Karak on this appointment. Chukhadar, adding insult to injury, allegedly snubbed esteemed physicians in the government hospital and checked into the British hospital for the treatment of his hernia, “where he spent several nights among nuns. – Kef schreibt an muslimische offizielle, doch bitte freitags zu beten", "time_from": 1909, "time_to": 1910, "precision": "interpolated", "page": 72, "category": "Außenpolitik", "confidence": "low"}, {"id": "s0253", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Asir/ost najd. Sharif husayn (treu) gegen Sauds. Dann aufstand Idris von asir, italy backed gegen offensichtlich hilflose regierung. Dauert bis niedergeschlagen, Jemen aufstand Imam Yahya. Alles fürsten gegen zentralismus. Europäische beobachter sahen darin absichtsvoll neuen balkan", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": 82, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0306", "source": "Caesar Farah, “Arab Supporters of Sultan Abdulhamid II: ‘Izzet al-‘Abid,” in Archivum Ottomanicum 15 (1997): 189–219.", "date_raw": null, "text": "Nachdem er floh, gibt es kampagne gg ihn. Muqtabas nennt ihn hauptkorruptionsverbreiter (zaim al mufsidin", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": 210, "category": "Politik", "confidence": "high"}, {"id": "s0307", "source": "Caesar Farah, “Arab Supporters of Sultan Abdulhamid II: ‘Izzet al-‘Abid,” in Archivum Ottomanicum 15 (1997): 189–219.", "date_raw": null, "text": "Mahmud Buzu sagt, alles einkommen, das aus seinem besitz unter einem von Izzet eingesetzten verwalter käme, würde zum aufhetzen der Muslime gg die regierung verwendet", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": 210, "category": "Politik – Politische Akteure", "confidence": "high"}, {"id": "s0308", "source": "Caesar Farah, “Arab Supporters of Sultan Abdulhamid II: ‘Izzet al-‘Abid,” in Archivum Ottomanicum 15 (1997): 189–219.", "date_raw": null, "text": "Izzet war abdülhamids 2. Sekretär", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": 211, "category": "Politik", "confidence": "high"}, {"id": "s0716", "source": "Matossian", "date_raw": null, "text": "Stress zw cup und arabern ua wegen Shafiq al- Mu’ayyad of Damascus, er sei mit sultan verbunden. Auch Yusuf Shitwan (Bingazi), ‘Umar Mansur (Bingazi) and Sayyid Talib (Basra). Andere araber verteidigen sie nicht, damitsie. Nicht in cup ungnade fallen", "time_from": 1909, "time_to": 1911, "precision": "interpolated", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0124", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "In Damascus, newspapers began to promote Arabism. The most influential, al-Muqtabas, was edited by Muhammad Kurd 'Ali, a clever journalist and man of letters from modest social origins, a former supporter of the CUP and member of the Arab Renaissance Society. Kurd 'Ali used his newspaper as a vehicle with which to encourage literate elements among the local populace to turn towards Arabism after 1909. Writers like Rafiq al-'Azm, who had originally attracted his friend, Kurd 'Ali, to the Damascus branch of the CUP, published articles in al-Muqtabas defending Arabism as a necessary component in reviving Ottomanism and the idea of Ottoman nationhood, as expressed during the Hamidian era. After 1912, a second newspaper, al-Qabas, appeared. (Shukri al-'Asali, radikaler", "time_from": 1909, "time_to": 1912, "precision": "exact", "page": 60, "category": "Presse und Öffentlichkeit", "confidence": "high"}, {"id": "s0714", "source": "Matossian", "date_raw": null, "text": "Ende 1909 aber arab block, spielt wichtige rolle bis 1912. Shafiq al-Mu’ayyad and Rushdi al-Sham‘a of Damascus, the leaders behind the creation of this bloc, were the same men whose election as parliamentary deputies had caused some anxiety among CUP circles in the Arab provinces. Other deputies who had been CUP supporters, including ‘Abd al-Hamid al-Zahrawi (Hama), shifted to- ward al-Mu’ayyad’s camp when they became disillusioned with the CUP party.", "time_from": 1909, "time_to": 1912, "precision": "exact", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0580", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Fatat 1909 oder 11 gegründet in paris, dann headquarters beirut, bis 1918 nie mehr als 70 mitglieder, scholars, journalisten, professionelle", "time_from": 1909, "time_to": 1918, "precision": "exact", "page": 55, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0228", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "1910 bis 11 keine äußerliche bedrohung, innere tendenzen nehmen ihren Lauf: KEF dehnt sich aus, Opposition entwickelt sich", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": 72, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0237", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Parteien 1910/11 waren keine gefahr für kef, beweisen aber, dass sie sich ideologisch konsolidieren müssen", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": 75, "category": "Politik", "confidence": "high"}, {"id": "s0251", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Arab aufstände 1910/11 arab halbinsel syrien, nomaden und wo wenig regierungskontrolle. Hawran and East Jordan, Asir, Najd, and Y emen. Gegen zensus, Steuern und Bahn Hijaz", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": 78, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0257", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "1910 zeigte für talat nicht muslime nicht für das riech zu begeistern, also lass islam machen", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": 84, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0432", "source": "Schäbler", "date_raw": null, "text": "1910 machen jungtürken unter sami pasha al faruqi, geeignet weil araber strafexpedition nach hawran und al karak für exempel, nach 6 wochen mit modernster armee hawran unterworfen, drusen entwaffnet. Aufstand karak war gewesen wegen zensus, landregistreirung, rekrutierung, entwaffnung und gericht einführen. 150 knast, zwangsarbeit oder todesstrafe. Muqtabas druckt urteile. Frz berichte sind viel dramatischer, sprechen von konflikt, unruhe, muqtabas nett alles gerecht, bei abdülhamid sei mord noch so einfach gewesen, jetzt herrscht ordnung 189f", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0699", "source": "Matossian", "date_raw": null, "text": "Aufstände 1910/11 syrien arab halbinsel", "time_from": 1910, "time_to": 1910, "precision": "exact", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0258", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The most important outcome of the loss of Libya was that it highlighted the failure of Unionist policies of centralization, the justification for which had been the preservation of the empire’s territorial integrity .", "time_from": 1910, "time_to": 1911, "precision": "interpolated", "page": 84, "category": "Politik", "confidence": "high"}, {"id": "s0433", "source": "Schäbler", "date_raw": null, "text": "Späterer artikel muqtabas: die ignoranten wurden von ihrer ignoranz gefressen, shift in bericht. Später sagt kurd ali selbst er habe sich mit faruqi gestritten, einige urteile seien ungerecht gewesen. Später kampagne muqtabas für begnadigung der gefangenen", "time_from": 1910, "time_to": 1912, "precision": "interpolated", "page": 191, "category": "Presse und Öffentlichkeit", "confidence": "high"}, {"id": "s0434", "source": "Schäbler", "date_raw": null, "text": "Shaykhs selbsr plädieren auf ignoranz, an der die vorherige regierung schult trüge", "time_from": 1910, "time_to": 1912, "precision": "interpolated", "page": 191, "category": "Politik", "confidence": "high"}, {"id": "s0385", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "realevant hier: autor schreibt über nationalismus problem und macht es in haqaiq", "time_from": 1911, "time_to": 1909, "precision": "interpolated", "page": 133, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0386", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "ikanderani und anti salafi religiös und Jura ausgebildete badr al din al hasani, mahmud (1997)", "date_raw": null, "text": "Krieg tripolis heißt für kef lass mal wahlen machen", "time_from": 1911, "time_to": 1910, "precision": "interpolated", "page": 78, "category": "Personennetzwerke", "confidence": "low"}, {"id": "s0255", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Reich war vor allem in sorge wegen irgendwelcher britischen pläne", "time_from": 1911, "time_to": 1910, "precision": "interpolated", "page": 83, "category": "Politik", "confidence": "high"}, {"id": "s0256", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The “establishment” came to be defined as Turkish, regardless of the fact that many Arabs were part of it or sup ported it. Yet the CUP’s Arab critics were not motivated by an Arab nationalist ideology in accusing the CUP of Turkification, just as the CUP itself had not conceived of Turkish nationalism as a politically viable alternative to Ottomanism.", "time_from": 1911, "time_to": 1910, "precision": "interpolated", "page": 84, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0128", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Shukri al-'Asali  wurde 1911 im parlament wichtigster kämpfer für arabische rechte, anführer syrische liberale. Kritisiert schwäche ggü zionismus", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 61, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0231", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Moderate lib partei war brücke zw ahrar (hört aktivität auf nach beteiligung konterrev) und Liberty and Entente, die 1911 gegr. wird", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 73, "category": "Politik", "confidence": "high"}, {"id": "s0232", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Ismail kemal bey ahrar behauptet merger mit mod lib, anderer sagt partei löst sich auf monate später. Gab pol diff zwischen parteien. Mod lib dominiert v arabern, aber auch albanier, christen, türken drin. Albaner gehen dann zu eigener nationalpartei, mod lib wird araberpartei. Programm osamnistisch, ethnische eigenrechte seien vorspiel zu auflösung des reiches. Betonen aber mit Johann Bluntschli wichtigkeit von opposition. In partei sind kef leute wie Yusuf Shitwan and Sulayman al-Bustani und -gegner wie Shukri al-‘Asali and Sayyid Talib. Teilweise landbesitzer die stabilität wollen", "time_from": 1911, "time_to": 1911, "precision": "interpolated", "page": 73, "category": "Politik – Politisches System, Politische Akteure", "confidence": "high"}, {"id": "s0233", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Mod lib partei als deckmantel gegen ehtnienparteiverbot feuertaufe lynch affäre für kef gegnerschaft", "time_from": 1911, "time_to": 1911, "precision": "interpolated", "page": 74, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0234", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Ideologie arabistisch – schutz der sprachen des reiches, religiöse erziehung im einklang mit wissenschaft. Aber nie richtige kohäsion erreicht", "time_from": 1911, "time_to": 1911, "precision": "interpolated", "page": 75, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0235", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Peoples party, istanbuler liberalismus. Riza nour wird verschwörung gg regierung beschuldigt, mod lib und people party verteidigen gemeinsam", "time_from": 1911, "time_to": 1911, "precision": "interpolated", "page": 75, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0236", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Lütfi Fikri beklagt dass es keine pol richtungen parteien gibt. 1911 kurzzeitige spaltung kef in right (Hizb-i Cedid) and a left (Hizb-i Terakki", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 75, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0238", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Mod lib araber waren als araber zusammen, hatten so richtig aber auch keine linie. 50/5 0 split araber abgeordnete bei herausforderung gegen großwesir İbrahim Hakkı Pasha beim thema kriegszustand im märz 1911", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 75, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0244", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Frühling 1911 showdown über zionismus führt zu animositäten auf türk/arab basis", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 77, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0245", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Feb 1911 ‘Abd al- Hamid al-Zahrawi beschwert sich über ungleiche bezahlung für officials – debatte arab benachteiligung, dann mehrere zionismus debatten. Albaner sagt ach thessaloniki handel auch juden, fremde? Beirut handel auch fremde", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 77, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0246", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The unanimity that the Arab deputies had displayed in the Lynch affair was missing during the debates on Zionism, when the battle lines between the centralists and the decentralists were drawn more sharply. Decentralist Arab deputies strengthened the opposition’s assault through periodic outbursts.", "time_from": 1911, "time_to": 1911, "precision": "interpolated", "page": 77, "category": "Politik", "confidence": "high"}, {"id": "s0247", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Libyen krieg macht stress für regierung: warum Ibrahim pascha und truppen nach jemen verlegt???", "time_from": 1911, "time_to": 1911, "precision": "event", "page": 77, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0248", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Enver und ismail kemal werden nach libyen geschickt, best trainierte leute", "time_from": 1911, "time_to": 1911, "precision": "event", "page": 78, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0249", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Verlust libyen heißt araber nicht, dass türken sie fallen lassen, sondern dass man sich das reich sparen kann wenn man schon gegen italien verliert. Aber zunächst macht krieg einheit der muslime, also araber und türken gegen europa", "time_from": 1911, "time_to": 1911, "precision": "event", "page": 78, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0254", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Bedeutungsvoller albanien (muslime). Viele konzessionen ende 1911, eigentlich fast schon unabhängig. Aber ist keine inspiration für araber in istanbul, sie sehen in aufständen zuhause forderung nach lokaler autonomie, freuen sich über hinrichtung von beduinenführer aus karak in damaskus", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 83, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0259", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Ende 1911 opposition um entente parei. Arab ansprüche bringen kef zu dezentralismus", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 86, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0309", "source": "Caesar Farah, “Arab Supporters of Sultan Abdulhamid II: ‘Izzet al-‘Abid,” in Archivum Ottomanicum 15 (1997): 189–219.", "date_raw": null, "text": "Bei wahlen 1911 wollten hunderte notablen ihn zum kandidaten aufstellen, dafür bräcute er wieder bürgerrechte, debatte dauert 2 jahre, klappt dann nicht (er gilt, weil er in ägypten woht als im reich ansässig", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": 213, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0317", "source": "The Arabs of the Ottoman Empire, 1516 - 1918 : a social and cultural history / Bruce Masters", "date_raw": null, "text": "Briten fördern idee des khalifats. Kandidaten: hacshemiten in mekka, khedive abbbas hilmi in ägypten, sayyid ahmad al sanusi (widerstandskämpfer libyen), arab republik war noch nicht da als vorstellung", "time_from": 1911, "time_to": 1911, "precision": "event", "page": 215, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0375", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "märz 1911 in al haqaiq artikel watan wa al wataniyya über ambiguität des begriffs watan", "time_from": 1911, "time_to": 1911, "precision": "exact", "page": null, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0376", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "What they hope to convey is that it is necessary for each individual to love his watan and to exert every effort for its advancement . But they do not address the meaning of the word watan \\ rather , they take it for granted . Thus , while people attempt to do their duty by working for what they imagine to be the advancement of the watan , they are doing little more than contributing to the construction of a Tower of Babel .9", "time_from": 1911, "time_to": 1911, "precision": "interpolated", "page": 131, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0377", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Unterscheidung watan alsi, iqama und sakani – ambig und bindungen damit schwach, aber das reicht nicht, wenn es vom osten adaptiert werden soll.", "time_from": 1911, "time_to": 1911, "precision": "interpolated", "page": 131, "category": "Personennetzwerke", "confidence": "low"}, {"id": "s0378", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Richtige wataniyya muss alle drei arten betreffen:", "time_from": 1911, "time_to": 1911, "precision": "interpolated", "page": 132, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0379", "source": "Gelvin 127 (schreibt was über Haqaiq)", "date_raw": null, "text": "Your first duty is to strive to advance this community (jamfa ) and its authority by offering all individuals in it beneficence and assistance , by feeling their grief and participating in their joy , by offering them guidance : "Liberale Shukri al-'Asali, Shafiq Mu'ayyad al-'Azm, Rushdi al-Sham'a and 'Abd al-Hamid al-Zahrawi. In damaskus geblieben", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 63, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0134", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Dezentr partei war wie liberale union, hatte allg anspruch, zog aber nur syrer an, sekular, auch christen dabei", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 63, "category": "Politik", "confidence": "high"}, {"id": "s0135", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Damascus Unionists gibt es, alte eliten passen sich da an, like Muhammad Fawzi al-'Azm, 'Abd al-Rahman al-Yusuf, Ahmad al-Sham'a (member of the Municipal Council and father of Rushdi), Sami Mardam-Beg and Nasib al-Hamza werfen liberaler partei vor europapropagandisten zu sein. Nicht ganz unbegründet: briten förderten arabismus", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 63, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0136", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Früh 1913 gibt es kef versuch reformen gemeinsam mit damaszener notablen zu erarbeiten. Die spalten sich aber in Unionisten (mehr wohlstand) und Liberale (dezentralisierung). Eine minderheit ruft nach arabismus, der christen einschließt", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 64, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0138", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Arab congress in paris juni 1913 ziel arabische umma erhalten mithilfe von verwestlichung. Waren aber jung suchen verbindung nach kairo partei, die sind ehrbarer. In damaskus hetze gegen sie als verräter", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 65, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0286", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Feb 1913 ‘Arif al- Mardini", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": null, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0287", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Gouverneur damaskus ‘Arif al- Mardini (arab) als kef move zum appeasen, erfolgreich", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 96, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0288", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "In aleppo werden waren für versorgung von notablen requiriert, besonderns von entente nahen", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 96, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0289", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Hazım Pasha (von entente reg abgesetztn kef dann eingesetz) refused to act on the Beirut reform proposal.569 The Provincial Law was designed to render various local demands obsolete by stipulating for limited decentralizing measures such as local administration of tax revenues in the provinces. Declaring the Provincial Law inadequate and angered by Hazım’s reticence to address the reforms they had proposed, the reformers undertook antigovernment protests", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 96, "category": "Politik", "confidence": "high"}, {"id": "s0290", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Amerik vizekonsul: İstanbul’s decision to dissolve the Reform Club came after the latter opened negotiations with the reformists in Damascus", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 96, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0291", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Zeitung suriyya bereitete verbot club vor durch polemik, debatte kommt nach damaskus, scharfe kritik an regierung", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 97, "category": "Presse und Öffentlichkeit", "confidence": "high"}, {"id": "s0292", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Kef versucht indifferente in beirut zu mobilisieren und schnell ein paar reformen zu machen", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 97, "category": "Politik - Politisches System", "confidence": "medium"}, {"id": "s0293", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Briten drehen propagandamaschine in ägypten auf, zerfall, nicht mehr dezentralisierung", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 97, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0294", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Kef will kompromisse bei arabisch machen um reformen verhindern zu können. April 1913 arabisch ok vor gericht und mittelschule. Thema dann gerichtsbeamte austauschen, wird genutzt um unbeliebte loszuwerden", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 98, "category": "Politik", "confidence": "high"}, {"id": "s0295", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Außer in beirut und basra schafft es kef araber zufrieden zu stellen. Will aber größere reformen weil araber mehr kernland werden", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 99, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0296", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Debatte verlegung hauptstadt dann aber doch nicht", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 99, "category": "Presse und Öffentlichkeit", "confidence": "medium"}, {"id": "s0297", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Syrer in paris wollen noch mehr reform, nachdem der wind eigentlich raus war. In beirut hört man das, in damakus etc zu konservativ", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 100, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0298", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Kongress paris 18-25 juli 1913, Abd al-Hamid al-Zahrawi vorsitz, keine unabhängigkeit als thema, beiruter christen hatten vorher mit fr geredet. Midhat Şükrü für kef da verhandelt: enforcement of Arabic in provincial government and in schools at all levels; employment of foreign experts in provincial administration; local military service; and specified quotas of Arabs as governors, mutasarrıfs, and senators", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 100, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0299", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Congress fängt vor allem radikale wieder ein bzw schmeißt sie raus, aber auch reformen", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 101, "category": "Politik", "confidence": "high"}, {"id": "s0300", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Aber ermordung sevket pascha – parteipolitik vorbei, im krieg verfolgt syrien gouverneur Cemal dann oppositionelle", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 101, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0301", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Kef pusht loyalisten, das heißt es sind mehr araber", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 101, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0302", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "While not all Beiruti Muslim reformists were co-opted to Union ism, the reform movement petered out in Syria following the Congress. Important Arab notables such as Muhammad Fawzi Pasha al-‘Azm, ‘Abd al-Rahman al-Yusuf, Shakib Arslan, and Shaykh As‘ad al-Shuqayri declared their opposition to the Arab Congress and contended that it was not representative of the Arab provinces.", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 102, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0320", "source": "The Arabs of the Ottoman Empire, 1516 - 1918 : a social and cultural history / Bruce Masters", "date_raw": null, "text": "1913 reformkommitees aufgelöst", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 216, "category": "Politik", "confidence": "high"}, {"id": "s0321", "source": "The Arabs of the Ottoman Empire, 1516 - 1918 : a social and cultural history / Bruce Masters", "date_raw": null, "text": "Im krieg: lawrence erzählung verrat briten, muhammad kurd ali erzählung türkische unterdrückung, fortgeführt george antonius. Safarbalik: mobilisierung für krieg, geht darum wie scheiße es war für araber für das reich zu sterben", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 217, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0322", "source": "The Arabs of the Ottoman Empire, 1516 - 1918 : a social and cultural history / Bruce Masters", "date_raw": null, "text": "Hungersnot: kurd ali sagt 120.000 libanon, 300.000 in syrien: alliierte blockade zw ägy und lib, keine remittances", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0578", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Kongress 1913 shift zu jüngerer generation von geheimgesellschaften, ahd und fatat", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 54, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0579", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Nationalisten haben problem mit eigener nation: basis merchants, weder hier noch dort, junge, zu jung, militärs/bürokraten/pensionisten/arbeitslose, auch unorganisierbar", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 55, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0651", "source": "Dawn: the origins of arab nationalism (zusammenfassung stand der dinge)", "date_raw": null, "text": "Gökalp erst 1913 so wichtig", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 18, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0652", "source": "Dawn: the origins of arab nationalism (zusammenfassung stand der dinge)", "date_raw": null, "text": "Arabisten, und rida und kawakibi waren gegen ein system, das nicht durch kef geschaffen war sondern fortgesetzt", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 21, "category": "Politik – Politisches System", "confidence": "medium"}, {"id": "s0653", "source": "Dawn: the origins of arab nationalism (zusammenfassung stand der dinge)", "date_raw": null, "text": "In muqtabas schon früh schuld für niedergang den türken zugeschoben mit scheiß sprache", "time_from": 1913, "time_to": 1913, "precision": "interpolated", "page": 21, "category": "Personennetzwerke", "confidence": "low"}, {"id": "s0657", "source": "Khalidi ottomanism and arabis before 1914", "date_raw": null, "text": "Vor 1913 war osmanismus debatteirt, danach hat kef die opposition rausgeworfen, nicht teil des osmanismus", "time_from": 1913, "time_to": 1913, "precision": "exact", "page": 63, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0139", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Kongress findet statt, programm wie Beirut Reform Society and the Ottoman Party of Administrative Decentralization, nicht für unabhängigkeit. Danach kef verhandlungen, mehr unabhängigkeit, rafiq leakt papier, Kef sagt gabs nie. Sieg balkan macht kef selbstbewusst, kleine reform angeboten, syrer reagieren negativ. 'Abd al-Hamid al-Zahrawi läuft zu kef über, niederlage liberale", "time_from": 1913, "time_to": 1914, "precision": "interpolated", "page": 66, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0581", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Nach krieg legendenbildung um al fatat. Quellen sind memoiren der mitglieder", "time_from": 1913, "time_to": 1995, "precision": "interpolated", "page": 56, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0582", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Al fatat hatte nie richtig konsistente ideologie", "time_from": 1913, "time_to": 1995, "precision": "interpolated", "page": 57, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0583", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Verlässt fatat wegen elitismus, geht dann zu behind the scenes massenpolitik, redet auch mit wahhabis etc. schwierig darzustellen", "time_from": 1913, "time_to": 1995, "precision": "interpolated", "page": 128, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0584", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Dawn erbe: salafiayya klare linie zu nationalismus, bezugspunkt salafiyya war ja schon arabisch – daher kurzer weg. Qassab dann abduh schüler, später nationalist, rest ist rauschen", "time_from": 1913, "time_to": 1995, "precision": "interpolated", "page": 128, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0585", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Probleme an dawn these:", "time_from": 1913, "time_to": 1995, "precision": "interpolated", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0141", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Unterschiede arabismus osmanismus in damaskus: respective relationships to local administration, age, educational background, profession and position in the social hierarchy.", "time_from": 1914, "time_to": 1841, "precision": "interpolated", "page": 68, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0142", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Arabisten hatten keine posten abbekommen oder verloren sie weil gegen KEF", "time_from": 1914, "time_to": 1841, "precision": "interpolated", "page": 69, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0143", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Fatat leute jünger während kurd ali und posten leute gleich alt sind. Kurd ali besonders weil nicht an staatsschule gewesen sondern islamische Bildung von Privatlehrern", "time_from": 1914, "time_to": 1841, "precision": "interpolated", "page": 70, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0144", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Arabisten haben zwei camps: traditionalisten und modernisten, die reich durch verwestlichung erhalten wollen, die sind mehr gegen türkifizierung – jazairi, nahda arabiyya", "time_from": 1914, "time_to": 1841, "precision": "interpolated", "page": 70, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0145", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Arabisten hatten meist keine staatsanstellungen, waren.Journalisten (kurd ali), ärzte, ingeneure. Con- versely local Ottomanists in Damascus favored using their government positions and not their pens to defend Ottomanism.", "time_from": 1914, "time_to": 1841, "precision": "interpolated", "page": 72, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0146", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Innerfamiliale statusunterschiede determinieren pol position; For instance, Raflq and Haqqi al-'Azm, both Arabists, came from the poorer and less politically influential branches of the aristocratic al-'Azm family, while Muhammad Fawzi Pasha al-'Azm, an avowed Ottomanist and CUP supporter, headed the leading branch (As'ad) of the family, and was far and away the wealthiest and most influential al-'Azm in Damascus", "time_from": 1914, "time_to": 1841, "precision": "interpolated", "page": 73, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0147", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Arabists were individuals who had failed to secure public office and had therefore less of a stake in the Ottoman state. But they also tended to be slightly younger than the Ottomanist group, from more diverse educational backgrounds, more actively engaged in intellectual pursuits, and from less wealthy and influential branches of local aristocratic families or from families which were not socially prominent.", "time_from": 1914, "time_to": 1841, "precision": "interpolated", "page": 74, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0056", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Damaskus kontrolliert Hinterland, ist teil von handelsrouten und von Hajj route", "time_from": 1914, "time_to": 1860, "precision": "interpolated", "page": 2, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0057", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Istanbuler verwalter haben anbindung an stadt (arabisch/türkich) und wenig macht, bekommen keine armee von istanbul weil zu mächtig dann, gehen dann über lokale Patriarchen: Politics of notables (Hourani). Notable muss istanbuler zufriedenstellen, aber auch seine klientel. Ist nicht einfach. Anbindung ans reich aber nicht durch drohung sondern weil es sich lohnt", "time_from": 1914, "time_to": 1860, "precision": "interpolated", "page": 2, "category": "Politik – Politisches System", "confidence": "medium"}, {"id": "s0058", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Gab mal von notablen organisierte proteste: entweder regierung zu stark, will reinregieren oder zu schwach, hält deals nicht ein. aber nie bedürfnis nach Revolution", "time_from": 1914, "time_to": 1860, "precision": "interpolated", "page": 3, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0059", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Notablen: religiöses establishment, tax farms etc. in letzter phase osm reich dann stabilisierung der eigenen Position durch Posten in wachsender Bürokratie, landbesitz.3", "time_from": 1914, "time_to": 1860, "precision": "interpolated", "page": null, "category": "Politik", "confidence": "high"}, {"id": "s0060", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Neue generation ende jh: militär/handel einflussreich geworden, macht auch bei bürokratie/land mit", "time_from": 1914, "time_to": 1860, "precision": "interpolated", "page": 3, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0061", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "The formation and consolidation of classes were still in process and some classes could still be differentiated along ethnic or religious lines, or by income level, or by degree of access to the state, or by the character of their interaction with Europe.13", "time_from": 1914, "time_to": 1860, "precision": "interpolated", "page": 4, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0062", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Agrarian commercialization coupled with the development of modern means of communication and transport helped to create the framework for the private appropriation of property and its consolidation in the hands of an increasingly inter- related network of urban families with ties to the imperial capital through the provincial bureaucracy. Indeed these families received the support of the state, which itself was supported by a new more efficient military and civil administration.", "time_from": 1914, "time_to": 1860, "precision": "interpolated", "page": 5, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0063", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Bevölkerung und notablen waren sunnis, da gibt es hegemonie der notablen", "time_from": 1914, "time_to": 1860, "precision": "interpolated", "page": 5, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0051", "source": "Gelvin politics of notables forty years after", "date_raw": null, "text": "Dawn sagt; ideologie vor 1914 ist intra-eliten konflikt", "time_from": 1914, "time_to": 1914, "precision": "exact", "page": 27, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0055", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Arab Nationalismus infancy in Damaskus vor WK1, durch klasse von landowning burocratic class", "time_from": 1914, "time_to": 1914, "precision": "event", "page": 1, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0140", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "More specifically, the origins of Ottomanism and Arabism can be traced to a reaction at this time to the failure of the ruling elite in Istanbul to defend Islamic civilization against Western economic, cultural and political penetration. Bis 1914 gab es eigentlich kaum unterschiede zwischen arabismus und osmanismus", "time_from": 1914, "time_to": 1914, "precision": "exact", "page": 67, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0330", "source": "Introduciton", "date_raw": null, "text": "Vorher länder als einzeln betrachet, nicht in kontinuität vor wk1, hier jetzt anders, damit man nicht immer legitimität der staaten wiederaufdeckt 1f", "time_from": 1914, "time_to": 1914, "precision": "event", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0331", "source": "Introduciton", "date_raw": null, "text": "Welche probleme die teilung bei gemeinsamer geschichte produzierte", "time_from": 1914, "time_to": 1914, "precision": "interpolated", "page": 2, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"i // ── Overrides exportieren → POST /overrides ───────────────────────────────────
btnExport.addEventListener("click", async () => {
  const arr = [...overrides.values()];
  btnExport.disabled = true;
  btnExport.textContent = "Speichere…";
  try {
    const res = await fetch("/overrides", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(arr),
    });
    if (res.ok) {
      btnExport.textContent = "Gespeichert ✓";
      setTimeout(() => {
        btnExport.textContent = "Overrides exportieren";
        updateExportBtn();
      }, 1500);
    } else {
      btnExport.textContent = "Fehler – nochmal?";
      btnExport.disabled = false;
    }
  } catch {
    // Server nicht erreichbar → Fallback: Datei herunterladen
    btnExport.textContent = "Overrides exportieren";
    updateExportBtn();
    const blob = new Blob([JSON.stringify(arr, null, 2)], {type: "application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "overrides.json"; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
});

// ── Neu berechnen → POST /recompute (SSE-Stream) ─────────────────────────────
btnRecompute.addEventListener("click", async () => {
  btnRecompute.disabled = true;
  btnRecompute.textContent = "Läuft…";
  logEl.className = ""; // reset error class
  logEl.textContent = "";
  logEl.style.display = "block";

  try {
    const res = await fetch("/recompute", {method: "POST"});
    if (!res.ok || !res.body) throw new Error("Server-Fehler " + res.status);

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buf     = "";

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split("\\n");
      buf = lines.pop(); // incomplete last line

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const msg = line.slice(6);
        if (msg === "__done__") {
          logEl.textContent += "\\n✓ Fertig – Seite wird neu geladen…";
          logEl.scrollTop = logEl.scrollHeight;
          setTimeout(() => window.location.reload(), 800);
          return;
        }
        if (msg.startsWith("__report__:")) {
          try {
            const rpt = JSON.parse(msg.slice(11));
            if (rpt.warnings && rpt.warnings.length) {
              logEl.textContent += "\\n⚠ " + rpt.warnings.join("\\n⚠ ");
            }
            logEl.textContent += `\\nKonfidenz niedrig: ${rpt.low_confidence} (${rpt.low_confidence_pct}%)`;
          } catch(_) {}
          logEl.scrollTop = logEl.scrollHeight;
          continue;
        }
        if (msg.startsWith("__error__")) {
          logEl.className = "error";
          logEl.textContent += "\\n" + msg.slice(9).trim();
          logEl.scrollTop = logEl.scrollHeight;
          btnRecompute.disabled = false;
          btnRecompute.textContent = "Neu berechnen";
          return;
        }
        logEl.textContent += (logEl.textContent ? "\\n" : "") + msg;
        logEl.scrollTop = logEl.scrollHeight;
      }
    }
  } catch (err) {
    logEl.className = "error";
    logEl.textContent += "\\nServer nicht erreichbar: " + err.message;
    btnRecompute.disabled = false;
    btnRecompute.textContent = "Neu berechnen";
  }
});

// source helpers: accept string or {name, date} object
function srcName(src) {
  return (src && typeof src === "object") ? (src.name || "") : (src || "");
}
function srcLabel(src) {
  if (!src) return "";
  if (typeof src === "object") {
    return [src.name, src.date].filter(Boolean).join(" \u00b7 ");
  }
  return src;
}

  const tt    = ov?.action === "set_anchor" ? ov.time_to

  const numTl = tf == null ? "undatiert"

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
