s and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Vllt ist das der grund warum qasimi viuel zitiert und nicht eigene worte benutzt: schutz", "time_from": 1898, "time_to": 1893, "precision": "interpolated", "page": 54, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0346", "source": "Rogan", "date_raw": null, "text": "Neue quelle: memoiren salih al tal. Gemeinsame schulerfahrung, nicht ideologie", "time_from": 1898, "time_to": 1898, "precision": "interpolated", "page": 80, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0347", "source": "Rogan", "date_raw": null, "text": "Anbar scheint eher gemeinsame osmanische identität als osmanismus zu schaffen", "time_from": 1898, "time_to": 1898, "precision": "interpolated", "page": 81, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0348", "source": "Rogan", "date_raw": null, "text": "Geht m persönliche verbindungen im rahmen osmanischer strukturen", "time_from": 1898, "time_to": 1898, "precision": "interpolated", "page": 94, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0494", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Manii will ramadan dann mit ihnen frieden, sie sagen ne. Dann doch endgültig frieden 1898 kurz vor tod maninis", "time_from": 1898, "time_to": 1898, "precision": "exact", "page": 53, "category": "Außenpolitik", "confidence": "low"}, {"id": "s0513", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Jazairi 1898bibliothekswesen irgendwie??  Durch jungosmanen connection?", "time_from": 1898, "time_to": 1898, "precision": "exact", "page": 91, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0521", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Abduh hat sich bei den briten eingeschleimt um ägypten zu reformieren", "time_from": 1898, "time_to": 1908, "precision": "interpolated", "page": 109, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0092", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Mardam Beg", "time_from": 1900, "time_to": 1860, "precision": "interpolated", "page": 41, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0093", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Quwwatil beg", "time_from": 1900, "time_to": 1860, "precision": "interpolated", "page": 41, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0094", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Al sham’a", "time_from": 1900, "time_to": 1860, "precision": "interpolated", "page": 42, "category": "Personennetzwerke", "confidence": "low"}, {"id": "s0095", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Al barudi", "time_from": 1900, "time_to": 1860, "precision": "interpolated", "page": 43, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0096", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "These families can be divided into two subgroups: the landowning-bureaucrats and the landowning- scholars. The former was the more powerful bloc owing to its control of the highest posts in the civil bureaucracy, its closer identification with Istanbul, and its greater wealth. However, by this time the two subgroups had already begun to merge.", "time_from": 1900, "time_to": 1860, "precision": "interpolated", "page": 44, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0097", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "The remainder of the political elite, including the Rikabis, Haffars, Jallads, Sukkars, Mahaynis, Hakims, Tabba's, Rijlihs, Agribuz, Buzus, and 'Azmas, did not belong to the religious establishment and most were new on the political scene in i860.", "time_from": 1900, "time_to": 1860, "precision": "interpolated", "page": 46, "category": "Politik", "confidence": "high"}, {"id": "s0098", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "two Christian families, the Qudsis and the Shamiyyas, combined administrative office with merchant capital to purchase large estates, with the result that by the end of the nineteenth century they had joined the club of great landowning families in Damascus.", "time_from": 1900, "time_to": 1860, "precision": "interpolated", "page": 46, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0444", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Reichste ulama: jurisconsult, law court offic, preacher ummayyadenmosche, hadith Lehrer, sufi sulaymaniyya lodge, head of decendants of prophet (naqib al ashraf", "time_from": 1900, "time_to": 1860, "precision": "interpolated", "page": 9, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0445", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Mittel ulama warenh alt Lehrer, selten zu tun mit osm offiziellen", "time_from": 1900, "time_to": 1860, "precision": "interpolated", "page": 9, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0085", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "The list of the most politically influential non-scholarly landowning families in 1900 numbers at least eleven: the 'Azm (including the Mu'ayyad al-'Azm), 'Abid, Yusuf (including the Shamdins), Mardam- Beg, Quwwatli, Sham'a, Barudi, Sukkar, Mahayni, Agribuz and Buzu families.", "time_from": 1900, "time_to": 1900, "precision": "exact", "page": 35, "category": "Politik", "confidence": "high"}, {"id": "s0086", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Wichtiger pol block werden: 'Azm, 'Abid, Yusuf-Shamdin, Mardam-Beg, Quwwatli, Sham'a, and Barudi, zusammen mit gelehrtenfamilien 'Ajlani, Ghazzi, Kaylani, Hasibi and Jaza'iri", "time_from": 1900, "time_to": 1900, "precision": "interpolated", "page": 36, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0087", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Azms hatten jh wende meiste posten v allen familien", "time_from": 1900, "time_to": 1900, "precision": "interpolated", "page": 36, "category": "Personennetzwerke", "confidence": "low"}, {"id": "s0088", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Familie abid", "time_from": 1900, "time_to": 1900, "precision": "interpolated", "page": 37, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0090", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Ein abid, Muhammad ali wurde 1. Präs republic syrien. Familie: More than any other Damascus family they represented the new political leadership's identification with the ideology of'Ottomanism.'", "time_from": 1900, "time_to": 1900, "precision": "interpolated", "page": 39, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0091", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Al yusuf gibts, amir al hajj um 1900", "time_from": 1900, "time_to": 1900, "precision": "exact", "page": 40, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0163", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "In 1900 a Damascene, Mustafa Bey, was sentenced to hard labor for inciting soldiers in İstanbul to revolt against Abdülhamid.198 The nephew of Shaykh Zafir, one of the prominent Arab religious leaders in Abdülhamid’s court, was an army officer who distributed anti-Abdülhamid manifestos.", "time_from": 1900, "time_to": 1900, "precision": "exact", "page": 39, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0498", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Ägypten, zeitung, dann istanbul, rida mag ihn, sultan mag ihn nicht, er ist gegen despotie. Verbannung nach damaskus 1900, 18 mon hausarrest. Veröffentlicht trotzdem in ägypten, zb dass abdülhamid nicht kriterien für imamat erfüllt. Autorschaft für behörden nicht nachzuweisen, lassen ihn in ruhe. Auch artikel über scheidung, der die ulama sehr ärgert, die wollen ihn festnehmen lassen, klappt nicht", "time_from": 1900, "time_to": 1900, "precision": "exact", "page": 56, "category": "Presse und Öffentlichkeit", "confidence": "high"}, {"id": "s0499", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "1901 60 seiten aufreger jurisprudence and sufism, macht ulama darin kaputt, die sind sauer, brigen bakri attar dazu, den gouv einzuschalten, der lädt ihn vor, der (husayn nazim pascha) weiß nicht was tun, verweist das alles nach istanbul, zahrwai festgenommen nach istanbul geschickt, copies confiscated, eines davon bei jamal al din qasimi", "time_from": 1901, "time_to": 1901, "precision": "exact", "page": 56, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0500", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Jurisprudence and sufism erste salafi publ in damaksus die skandal macht. Sagt: schon sehr früh im islam spaltungen, nach umar (2. Khalif), spaltungen bestehen bis heute. Isl jura heute auch keine wissenschaft. Koran versteht aber jeder, alss uns ijtihad machen", "time_from": 1901, "time_to": 1904, "precision": "interpolated", "page": 57, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0501", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Punkt auch: an der welt teilnehmen, sie nicht zurückweisen", "time_from": 1901, "time_to": 1904, "precision": "interpolated", "page": 58, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0502", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Al qasimi (nicht jamal al din) macht netzwerk ende des jahrzehnts", "time_from": 1901, "time_to": 1904, "precision": "interpolated", "page": 60, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0503", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Zahrawi 1901 erst nach homs, dann 1902 nach kairo geflohen, tahir al jazairi 1907 kairo", "time_from": 1901, "time_to": 1907, "precision": "exact", "page": 60, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0165", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The Turco-Arab Consultative Society called for Islamic unity embodied in Ottoman unity and under the Ottoman caliph206 but denounced Hamidian rule together with European imperialism., wird später kritiker des Zentralismus", "time_from": 1902, "time_to": 1895, "precision": "interpolated", "page": 40, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0166", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "In damaskus bekommen niedere ulama weniger posten, dann salafi einfluss – Opposition", "time_from": 1902, "time_to": 1895, "precision": "interpolated", "page": 40, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0421", "source": "Schäbler", "date_raw": null, "text": "Kawakibi buch direkt bei erscheinen verboten, rida macht sequels in al manar 1902/03", "time_from": 1902, "time_to": 1902, "precision": "exact", "page": 182, "category": "Presse und Öffentlichkeit", "confidence": "high"}, {"id": "s0511", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "1902 kreis jüngere um jazairi: junior circle, daraus wird arab renaissance society", "time_from": 1902, "time_to": 1902, "precision": "exact", "page": 89, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0422", "source": "Schäbler", "date_raw": null, "text": "Dichtung aus 6. Jh wurde auch im 19. Jh wiederentdeckt", "time_from": 1902, "time_to": 1912, "precision": "interpolated", "page": 183, "category": "Presse und Öffentlichkeit", "confidence": "high"}, {"id": "s0423", "source": "Schäbler", "date_raw": null, "text": "In muhit al muhit wurde qawm von bedu wort für clan hergeleitet", "time_from": 1902, "time_to": 1912, "precision": "interpolated", "page": 183, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0504", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Quasimi kario aufenthalt erhöht anerkennung in damaskus, auch rida bekanntschaft", "time_from": 1904, "time_to": 1902, "precision": "interpolated", "page": 62, "category": "Außenpolitik", "confidence": "low"}, {"id": "s0505", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Salafi nach einigen verfolgeungen kurz still, gehen zu kollegen ins ausland", "time_from": 1904, "time_to": 1902, "precision": "interpolated", "page": 63, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0507", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Salafis sahen sich als elite, die niedere erheben muss: frauen und arme", "time_from": 1904, "time_to": 1902, "precision": "interpolated", "page": 87, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0508", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Qasimi findet nüchternen sufismus gut, sufismus der armen aber schlecht", "time_from": 1904, "time_to": 1902, "precision": "interpolated", "page": 87, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0509", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Ohren für salafi gedanken offen: generation von sekundarschulabgängern", "time_from": 1904, "time_to": 1902, "precision": "interpolated", "page": 89, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0510", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Link: tahir al jazairi, will bildungsreform, sein zirkel verkörpert 1. Gen, die mit osmanen reform machen wollen", "time_from": 1904, "time_to": 1902, "precision": "interpolated", "page": 89, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0524", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "…", "time_from": 1905, "time_to": 1839, "precision": "interpolated", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0523", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "Zw 1905 und 08 5 mal verfolgung salafis, angestiftet von ulama", "time_from": 1905, "time_to": 1905, "precision": "exact", "page": 110, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0029", "source": "Hermann", "date_raw": null, "text": "1906 in damaskus zweig von CUP, besonders viele darin waren teil gamaat annahda al arabiyya", "time_from": 1906, "time_to": 1906, "precision": "exact", "page": 104, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0426", "source": "Schäbler", "date_raw": null, "text": "Dezember 1906 gründet muhibb al din al khatib arab nahda society in istanbul, verlegt im sommer nach damaskus, erste arab nat orga, kern für ahd, fatat und Qahtaniyya (referenz tauber", "time_from": 1906, "time_to": 1906, "precision": "exact", "page": 186, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0039", "source": "Matossian extra", "date_raw": null, "text": "106. Al-Muqtabas, December 27, 1908, no. 10, 4. Al-Muqtabas (The quoter) was founded in Egypt in 1906 by the Syrian scholar, historian, and literary critic Muhammad Kurd ‘Ali. In 1909 Kurd ‘Ali moved the periodical to Damascus, where it was published until World War I. Kurd ‘Ali was a former supporter of the CUP and then became a member of the Arab Revival Society.", "time_from": 1906, "time_to": 1909, "precision": "exact", "page": null, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0117", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Die, die anfangs mit kef mitmachen, treten sehr bald aus. Opposition wurde in religiösen begriffen formuliert. Arabismus war dann ruf nach macht und aufmerksamkeit innerhalb des reiches", "time_from": 1908, "time_to": 1851, "precision": "interpolated", "page": 59, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0118", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "This opposition, how- ever, even until the outbreak of the War, was primarily opposition to a particular ruling group in hopes of replacing it with another ruling group through which local power could be regained, all within the framework of the Empire.", "time_from": 1908, "time_to": 1851, "precision": "interpolated", "page": 59, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0119", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Richti scheiße finden die leute tütkifizierung: kleine händler vor türkischen gerichten, schule. Außerdem verschlankung der bürokratie, araber werden durch türken ersetzt", "time_from": 1908, "time_to": 1851, "precision": "interpolated", "page": 59, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0120", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "So schlimm dass sekulare notablen und religiöse zusammengehen", "time_from": 1908, "time_to": 1851, "precision": "interpolated", "page": 59, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0211", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Im ersten parlament wurde nicht so darauf geachtet, dass türkisch geredet wrude, einige arab abgeordnete können das auch nicht und sind frustreirt, wenn ihre vorschläge nicht diskutiert werden, weil vergessen zu übersetzen", "time_from": 1908, "time_to": 1874, "precision": "interpolated", "page": 63, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0212", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Generell: „The Arabs demanded the regulation of administration, the expansion of state education, and the strengthening of the security apparatus: measures that called for an even greater role for the central government in the provinces.“", "time_from": 1908, "time_to": 1874, "precision": "interpolated", "page": 63, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0344", "source": "Rogan", "date_raw": null, "text": "Maktab anbar produzierte besonders viele arabisten", "time_from": 1908, "time_to": 1898, "precision": "interpolated", "page": 79, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0030", "source": "Hermann", "date_raw": null, "text": "1908-18 sunni händler, scheiche, beamte sind die intellektuellen des arabischen Nationalismus, einfluss jazairi", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 104, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0031", "source": "Hermann", "date_raw": null, "text": "4 phasen arabisten cup: 1. Unterstüzzung der jungtürken, 2. Beide geraten unter druck, 3. Rückgewinn der bewegungsfreiheit, 4. Kurd ali löst gegenseitige entfremdung aus", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 104, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0032", "source": "Hermann", "date_raw": null, "text": "Oktober 1908 demonstration gegen liberalisierung frauenkleider, sammlung der konservativen opposition", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 105, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0041", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Erstmals parteien, anders als 1908", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 462, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0042", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Unter martial law: bombardierung Beirut", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 462, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0043", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Sectarianism eingesetzt von KEF, aber auch Opposition", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 462, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0044", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Kef manipuliert auf dem land um unpopularität in der stadt auszugleichen", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 462, "category": "Politik", "confidence": "high"}, {"id": "s0045", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Sectarianismus: kef sagt achtung das sind christen und achtung die wollen euch awqaf wegnehmen", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 462, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0046", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Muqtabas war gegen türkifizierung und vermeidung schicksal libyens für syrien und kef kandidaten die das nur für persönlichen gewinn waren und für besseres syrisches budget", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 466, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0047", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Glauben der opposition dass wahlen wirkliche eine chance wären", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 466, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0048", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Interessant: entente sagt wir sind fair zu allen nationen: kef war eingeholt vom Reich", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 466, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0049", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Kurd ali noch vor bekanntgabe der endgültigen wahlergebnisse festgenommen", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 471, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0050", "source": "Khalidi: Elections campaign in Bilad al Sham", "date_raw": null, "text": "Opposition unterdrückt, sie kommt aber im nächste jahr wieder inform von Reformkommitee", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 471, "category": "Politik", "confidence": "high"}, {"id": "s0108", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Jungtürken revolution zwei reaktionen: KEF-organisierte Demonstrationen, Notablen sehr überrascht und nicht glücklich. Vor allem wahlen finden sie blöd", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 56, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0109", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "The religious establishment also feared the consequences of the coup. Suspicious of the CUP's liberal views and its platform of equality for all citizens in the Empire, leading Damascus 'ulama* began to come together against the new power behind the throne.9", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 56, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0110", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Nach revolution kef druck auf Wali entlassungen hamidian Posten: head of the Administrative Council of the Province, Muhammad Fawzi Pasha al-'Azm, the Naqib al-Ashraf, the Hanafi Muftis an important judge on the shari'a court, and several district governors.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 56, "category": "Politik", "confidence": "high"}, {"id": "s0111", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Ulama sucht thema, findet: Frauenkleidung, oktober 1908 demo", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 57, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0116", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Konstitutionsperiode geprägt vom streit über osmanismus. Jungtürken mögen nicht die eingegrabenen eliten", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 58, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0162", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Ende 19 jh schafft abdülh es, viele jungtürken umzudrehen indem er posten gibt und konfisziert. Viele gehen aber später wieder in opposition oder spionieren sogar", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 38, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0168", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Until 1908 Arabs did not constitute a faction in themselves whose interests had to be accorded special consideration in any Young Turk program of action. Unlike the Armenians, and even the predominantly Muslim Albanians, who supported the decentralist movement led by Sabahaddin, the Arabs did not identify clearly with any one of the Young Turk trends.", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 43, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0169", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "In the Arab provinces Young Turk ideas were propagated by young officials, officers, and exiles. In the İstanbul schools there were class-based tensions between the sons of the established bureaucratic or notable families and the provincial students of more modest backgrounds. There was little room for open political activity in the capital at the beginning of the century; but in general the younger generation of Arabs remained supportive of Young Turk ideals and of the movement that finally reinstituted the constitutional regime.", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 43, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0170", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The decision to resort to the use of force in Macedonia was largely independent of the direction of the expatriate leadership of the CUP. It was influenced by political conditions particular to the European provinces of the empire: the example of Macedonian guerrilla organizations, the prospect of European-imposed and -implemented administrative arrangements, and a heightened sense of the vulnerability of the Ottoman state to secession and annexation in the Balkans. … The politically influential men of the new constitutional regime came not from the ranks of those who fought absolutism and inculcated an entire generation with constitutional ideas but from the fringes of the movement and, in the early years, even from the cadres of the defunct regime. … kef war nicht vorbereitet einzige partei zu sein, Therefore, it was not prepared to make a bid for exclusive political power,228 and very soon the general population’s rising expectations began to haunt it. 44 zu kapitel", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 1, "category": "Politik", "confidence": "high"}, {"id": "s0171", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "he politicization of the Ottoman public after 1908 should be appraised as much by the growth and vibrancy of the press as by political activity, elections, and parliamentary proceedings. The press was that component of the expanding public sphere that proved hardest to keep in check. In the first months of the revolution, the absence of strong governmental authority gave free rein to journalistic activity. Just as censorship had become the symbol of Hamidian despotism, the free press became the symbol of the revolution. In the first year, 353 journals and newspapers were published in İstanbul alone, and 200 permits to publish were granted in just the first month of the revolution FN 231 türkisch", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 45, "category": "Presse und Öffentlichkeit", "confidence": "high"}, {"id": "s0172", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The distinction between the Committee’s and the government’s acts became increasingly blurred, as did the distinction between the Union and Progress as a public society and a political party.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 46, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0173", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "By missing the opportunity to introduce a vigorous and participatory political organization at the critical juncture of 1908, the CUP nourished a calcified nucleus of leadership, consisting predominantly of Turkish speakers and representing a narrow geographical background, which failed to embrace new social elements in the face of growing opposition. Over time, the CUP forfeited its claim to legitimacy, alienated different segments of Ottoman society, and failed to create a coherent base of political support.", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 46, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0187", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Damaksus kef schwach andere gruppen: “Freedom” and “Free Ottoman,” were formed by October 1908. Aber auch gruppe der ulama, der ärzte, der handler, sogar der schuhmacher", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 50, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0188", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Problem der kef auch, dass es überall gruppen kef gibt, die was eigenes vor haben", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 50, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0189", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "In vorbereitung der wahlen werden 2 kef aus saloniki nach damaskus geschickt, um zu überwachen. Die sagen die notablen haben keine lust macht abzugeben", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 51, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0190", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Bei wahlen nimmt kef auf ihre liste irgendwelche notablen, deren treue zweifelhaft ist. Die machen dann istanbul opposition", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 52, "category": "Außenpolitik", "confidence": "low"}, {"id": "s0191", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Wahlsystem: It stipulated two-stage balloting in which every tax-paying male Ottoman citizen above the age twenty-five was entitled to vote in a primary election to select secondary voters. Secondary voters, each elected by 500 to 750 primary voters, then voted to determine the member(s) of the Chamber in the numbers specified for a particular electoral district, the sancak. Keine quoten", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 52, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0192", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Besonders in den arabischen provinzen gab es 1908 wahlfälschungen", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 53, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0193", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Das erste was das parlament beschäftigt, zusammengetreten 17. Dez 1908 ist legitimität der abgeordneten, darunter araber Yusuf Shitwan (Tripoli-Libya) (vorher juridical inspector abdülh), ‘Umar Mansur (Benghazi), Sayyid Talib al-Naqib (Basra), and Shafiq al-Mu’ayyad (al-‘Azm)(regie de tabac) (Syria). The objections to these deputies were in essence political, but often legal impediments or electoral irregularities were put forward. Shitwan und muayyad Vorwurf spionage für abdülh. Mansur hätte wahlpapiere gefälscht. Alle approved bis auf shitwan, neuwahl wegen einschüchterung, auch da erfolgreich", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 54, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0194", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Viele arab mp Arab-Ottoman Brotherhood (Al-ikha’ al-‘arabi al-‘uthmani, or Uhuvvet-i Arabiyye-i Osmaniye) gegr September 1908, fortsetzung studentenclubs und interessenvertreter der araber abdühamids. Muayyad und shitwan prominent, macht orga oppositionsverdächtig. Ist aber kurzlbig, gegensätzliche positionen innerhalb. Zuhause anti unionisten Rhetorik. Rafiq al azm und rida sind gegen die orga wg alten regime. Schließung nach konterrev wg angebl verbinung zu muhammadan union", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 55, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0209", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "1908 hatten arab oppositionelle zu abdülh gleiche einstellung wie jungtürken – gegen elitismus der alten garde, an modernen schulen gelernt, nicht so hohen status. Entfremdet durch kef kooptierungspolitik", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 62, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0210", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Erster richtiger gegensatz war sprachfrage zw jungtürken und arabern. Wichtig weil viele themen sprachbasiert waren", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 62, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0215", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Repräsenation im parlament 1908 türken vs araber 2,5/1, das ist eigentlich araber überrepräsenation. Aber zahlen zensus falsch, komisch etc. sprachdifferenzen waren zeitgenössisch nicht klar bzw irrelevant", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 65, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0223", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Jungosmanen wollten anstelle von osmanischem türkisch schon türkisch weil einfacher, das wurde 1908 einfach übernommen. Aber türkisch gelehrt, nicht unterrichtsprache – integration, nicht assimilation", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 69, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0343", "source": "Rogan", "date_raw": null, "text": "Position 1: türkifizeriung führte zu arabismus (haniglou), pos 2: jungtürken haben nicht viel geändert, entwicklung gab es vorher (commins religious reformers, islamic reform s 95", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 79, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0363", "source": "Weismann", "date_raw": null, "text": "Ab 188er abdülh distanzieren sich jazairis von sufismus gehen zu salafismus wg autoritarismus, den die jungtürken im grunde fortführen", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 124, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0364", "source": "Weismann", "date_raw": null, "text": "Alter was für ein scheiß artikel. Irgendwelche genealogien, das wars", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "low"}, {"id": "s0425", "source": "Schäbler", "date_raw": null, "text": "In damaskus 1908 gab es schon 20 j geheime diskussionszirkel von reformern. Zirkel jazairi und dann Muhammad Kurd 'AH , Shukri al - cAsali , \"Abel al - Wahhab al - Inkllzi , and cAbd al - Rahman al – Shahbandar, anderer zirkel 10 j jünger um muhibb al din al khatib lesezirkel an maktab anbar. Der erwähnt eplizit umm al qura", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 186, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0427", "source": "Schäbler", "date_raw": null, "text": "Nach jungtürkenrevolution gibt es feier arab nahda soc in cafe Qawwatli", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 186, "category": "Personennetzwerke", "confidence": "low"}, {"id": "s0428", "source": "Schäbler", "date_raw": null, "text": "Muqtabas wird als mouthpiece der nahda society bezeichnet", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 187, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0429", "source": "Schäbler", "date_raw": null, "text": "Dezember 1908 hatte nahda ihren durchbruch in damaskus, konnten ideen verbreiten. Andere sind natürlich eher für regierung oder für konservative", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 187, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0430", "source": "Schäbler", "date_raw": null, "text": "1908-12 wird neu auf drusen geblickt: vorher waren sie barbaren, jetzt opfer osmanischer ungerechtigkeit, outlaws, helden", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 187, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0431", "source": "Schäbler", "date_raw": null, "text": "Einer der ersten issues muqtabas 1908 beschreibt streit drusen vs Hawranis, letztere peasants, auch stamm und so aber besser ins reich integriert, zahlen steuern, seinen patrioten", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 188, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0522", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "The revolt in Yemen, the Wahhabis' renascence, 'Abbas Hilmi's flirtations with Afghani and the Young Turks, and Kawakibi's book fueled Ottoman fears of a plot to establish an Arab caliphate. In view of these regional developments, a British/Wahhabi plot with Syrian religious reformers to detach Syria from the empire seemed credible, and conservative ulama exploited Ottoman fears to give credence to their spurious charges against the salafis.", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 110, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0577", "source": "From Partiotic Agitation to the Advent of Mass Politics", "date_raw": null, "text": "Nationalismus 1908-15 waren die nationalisten eigentlich nicht einflussreich", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 54, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0649", "source": "Dawn: the origins of arab nationalism (zusammenfassung stand der dinge)", "date_raw": null, "text": "Wahl zahlen 1908 bzw 12 sagen nicht unbedingt was über arabismus aus, waren aber wohl minderheit", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 14, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0654", "source": "Khalidi ottomanism and arabis before 1914", "date_raw": null, "text": "Dawn sage 1908-18 konflikt Osmanismus arabismus, wobei arabismus lange minderheit", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": 51, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0680", "source": "Reviews", "date_raw": null, "text": "he Young Turk Revolution of 1908, and particularly the dep- osition of #AbdülÈamÊd II in the following year, drove the #ulama of the Ottoman—orthodox tendency in Damascus to close their ranks and exploit the new freedom of expression to issue their own jour- nal, al-\\aq§\"iq. Appearing monthly for three years (1910-1912), the journal served as the mouthpiece of these men of religion in their defense of traditional practices and beliefs, and in their struggle against the SalafÊ and Westernizing trends. Al-\\aq§\"iq’s owner and editor was #Abd al-Q§dir al-Iskandar§nÊ (d. 1943), a prolific writer and an instructor in the Umayyad mosque who belonged to the extended Kayl§nÊ family.78", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0681", "source": "Reviews", "date_raw": null, "text": "contributers mitflieder: families of Munayyir, Usãuw§nÊ, and KhaãÊb, who continued to head the Ottoman—orthodox tendency of Damascus even in this period", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 131, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0682", "source": "Reviews", "date_raw": null, "text": "commins: sie borgen referenz auf salaf, fortschritt", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 131, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0683", "source": "Reviews", "date_raw": null, "text": "Our examination of the activities and writ- ings of these #ulama has shown, however, that the ideas which un- derlie these symbols had become prevalent among them already at the turn of the century, concomitant with #Izzat al-#$bid’s rising to prominence in Sultan #AbdülÈamÊd II’s court. In their orthodox in- terpretation, these symbols were nothing but the call to rely on the Qur\"an and the sunna as practiced in traditional Muslim learning, on the one hand, and to unreservedly confirm the course of mod- ernization as defined by the state, on the other. The claim of the orthodox #ulama to adhere to the path of the salaf, or to have adopted the ideal of progress, as well as their depiction of Islam as a religion of civilization (madaniyya) and consultation (shår§), therefore, points to their integration into the modern discourse, rather than to any change in their basic outlook. Their use of this new discourse merely served to reaffirm their readiness to harness orthodoxy to the ser- vice of the state also under the Young Turk regime.", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 131, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0684", "source": "Reviews", "date_raw": null, "text": "These #ulama continued to preach an Islamic unity embodied in the person of the Sultan—Caliph, despite his loss of actual rule over the Empire. They were also adamant in rejecting ijtihad, ceaselessly calling for the imitation of the rulings of one of the four established legal schools, which in their view supplied suitable solutions for the modern situ- ation too.", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 131, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0685", "source": "Reviews", "date_raw": null, "text": "Sufismus merkwürdig abwesend von haqaiq", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 131, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0686", "source": "Reviews", "date_raw": null, "text": "Setzen salafi und verwestlicher gleich", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 132, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0687", "source": "Reviews", "date_raw": null, "text": "Revolution führt dazu dass ulama arabismus machen oder sogar zur salafiyya überlaufen (Khatib and Ustuwani families.) va Jam§l al-DÊn al-KhaãÊb,", "time_from": 1908, "time_to": 1908, "precision": "interpolated", "page": 132, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0688", "source": "Reviews", "date_raw": null, "text": "#Abd al-Q§dir was among the chief agitators against RashÊd Ri·§ during the latter’s visit to Damascus in the wake of the Young Turk Revo- lution, as well as a leading figure in the MuÈammadan Union of the city, a religious association which sought to restore actual govern- ment into the hands of #AbdülÈamÊd einigt sich aber mit kef, dann wohl Faysal,", "time_from": 1908, "time_to": 1908, "precision": "event", "page": 133, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0697", "source": "Matossian", "date_raw": null, "text": "Von abdüh an hof geholt um sie zu binden, konservative berater am hof, syrien hijaz werden wichtiger am hof - „For example, in Damascus, the non- scholarly, landowning bureaucrats played a dominant role in local politics dur- ing the Hamidian period.“ – osmanismus ist für sie eigene interessenvertretung, wollen wirklich keine revolution, waren garnicht teil jungtürken", "time_from": 1908, "time_to": 1908, "precision": "event", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0702", "source": "Matossian", "date_raw": null, "text": "The columns and articles in the newspapers of the ethnic groups provide us with a rich mine of data for analyzing political discourse in different geographic areas of the empire. In addition to constructing and molding discourses, the press played the role of mediator between politicians and the public, connecting the masses with politics. It also assumed the role of educating and disciplin- ing the public during the fragile postrevolutionary period, in which collective anxiety and confusion were expansive in all sectors of society. Dazu FN6: This role of the educator was mostly evident in the Young Turk press. Imme- diately after the Revolution, Tanin began publishing a series of articles under the title “Neler Bilmeliyiz: Öğreniyoruz Öğretmiyoruz” (What should we learn? We are learning and not teaching). The title indicates that the newspaper itself was in a process of learn- ing along with the masses and did not have any intention of imposing its own percep- tions on them. In each issue, the title was followed by different subjects dealing with various dimensions of politics. For example, see “Devlet nedir? gâyet nedir?” (What is the state? What is the aim?), Tanin, August 22, 1908, no. 22, 1; “Meclis-i Mebusanda Azalarin Mıkdarı” (The number of the members of the House of Deputies), August 16, 1908, no. 16, 2; “Intihabatta Iki Derece” (Two stages in the elections), September 7, 1908, no. 38, 1; “Hürriyet-i Matbuat” (Freedom of press), September 12, 1908, no. 43, 2.", "time_from": 1908, "time_to": 1908, "precision": "exact", "page": null, "category": "Presse und Öffentlichkeit", "confidence": "high"}, {"id": "s0033", "source": "Hermann", "date_raw": null, "text": "Konservative (Al tunisi) zetteln eklat bei rida predigt an", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 105, "category": "Politik", "confidence": "high"}, {"id": "s0112", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Wahlen he elections were conducted in two stages, thus blunting the impact of popular resentment against the Committee which would have been more manifest in direct elections", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 57, "category": "Politik", "confidence": "high"}, {"id": "s0113", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Es gab kef kandidaten, das waren vor allem opportunisten. Nur in damaskus war das schwierig, schaffen es säkularismus aufzublasen. Arab türk differenz noch unwichtig", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 57, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0114", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Five parliamentary delegates to Istanbul were elected from Damascus: 'Abd al-Rahman Pasha al-Yusuf, Shaykh Muhammad al-'Ajlani, Shaykh Sulayman Jukhadar, Rushdi Bey al-Sham'a and Shafiq Bey Mu'ayyad al-'Azm.13 Only Shafiq Bey was a declared opponent of the CUP before the election though the others were by no means pleased with CUP activities inside their city", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 57, "category": "Politik", "confidence": "high"}, {"id": "s0156", "source": "Commins Religious Reformers an arabists in Damascus", "date_raw": null, "text": "in 1908-1909, opponents of the constitution, and later the CUP, salafis and Arabists as a single faction. Their continued collab decentralist movement justified that perception. The salafis and the Arabists shared a political and social agen represented different social groups", "time_from": 1908, "time_to": 1909, "precision": "exact", "page": 420, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0195", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Kursiert papier aus paris v syrian central committee v Rashid Mutran für syrische unabhängigkeit. Araber kennen das nicht, wollen es auch nicht, wut und trauer. Reaktion ist eschwärung der treue zum Reich", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 55, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0196", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Arab parlamentarier machen initiative für mehr proportionale repräsentation, kein widerspruch zu zurückweiseung mutran", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 56, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0197", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Anderes thema: steuern vereinheitlichen, beschwerden über unterschiedliche steuern, liegt an. Versagen taxregister zu ordnen, mp wollen mehr regierung. Generell übernehmen arabs keine sonderrolle, ihre politik ist größere rolle des Zentrums (prätor 162", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 57, "category": "Politik", "confidence": "high"}, {"id": "s0216", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Parlament sollte nicht repräsentativ sein sondern die gebildeten", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 65, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0217", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Es wurden auch türken in arab provinzen gewählt, das muss keine fälschung gewesen sein, sie vertraten lokale interessen", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 66, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0218", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Tanin zb verteidigt sich gegen türkifizierungsvorwürfe: armeeopbere voll arber, kerkessen, albaner etc", "time_from": 1908, "time_to": 1909, "precision": "interpolated", "page": 67, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0526", "source": "Commins: Islamic Reform. Politics and Social Change in Late Ottoman Syria", "date_raw": null, "text": "kontext„Antisalafi incidents that took place between July 1908 and April 1909 resulted in the defeat of the anticonstitution forces, and thereafter the conservative ulama could no longer per- secute the salafis.“ , führte alle saber zu mehr freiheit, dazu eigene Zeitung zu machen116", "time_from": 1908, "time_to": 1909, "precision": "exact", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "medium"}, {"id": "s0703", "source": "Matossian", "date_raw": null, "text": "Osmanisch-Arabische Society?", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0704", "source": "Matossian", "date_raw": null, "text": "The question of whether to adopt a centralized or decentralized political system was also high on the agenda of the Arabs in the provinces. Some of these commentators indicated that the administrative councils in the prov- inces would complement administrative decentralization if they adhered to the principles of the constitution.96 Others, such as Edwar Murqus, explained that Prince Sabahaddin was right, if he was not an extremist, as some of the capital’s newspapers had claimed. Murqus said that if Sabahaddin wanted administra- tive decentralization for the provinces along the lines of Germany and Amer- ica, in which “every province will take care of its budget inside and outside, remove and appoint high and low officials, and make the provincial council as a miniature of the Parliament, I think he is going too far.”", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0705", "source": "Matossian", "date_raw": null, "text": "Damaskus", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0706", "source": "Matossian", "date_raw": null, "text": "Among the Arab provinces, Damascus was an important center for the activities of the ulema, in part because the Ummayad Mosque made Damascus a traditional place of Islamic learning. Additionally, the notables in Damas- cus, numbering around fifty families, were a powerful force running the po- litical mechanism.  Transformation aber nicht so erfolgreich wie anderswo im reich", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0707", "source": "Matossian", "date_raw": null, "text": "In Damascus, the traditional networks of the notables and the ulema were stronger than the newer ties of the Revolution. The old power structures were, nonetheless, affected by the Revolution, which resulted in the emergence of new actors on the political scene, a mixture of military personnel and civilians, mostly members of the newly emerging CUP branches.", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0708", "source": "Matossian", "date_raw": null, "text": "Damaskus – autoritäten skeptisch wegen Nachrichtenlage und Stabilität In addition to the local officials, the notables and the ulema were stunned by the news, and some began to voice their opposition to the activities of the junior officers. They were afraid that the Revolution and the shift of the center of power from local authorities to the CUP would endanger their traditional source of legitimacy, power, status, and prestige. Stimmt wohl, erst gründeten sich überall cup kommitees, die dann Thessaloniki unterstellt wurden", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0710", "source": "Matossian", "date_raw": null, "text": "Rafiq Bey al-‘Azm führender intellektueller in damaskus sagt erste konst periode war nation noch nicht bereit, jetzt ja, Sheikh ‘Abd al-Qadir al-Khatib al-Mughrabi (Damaskus)sagt altes regime war fanatismus, umarmt griech kath bischoff", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0711", "source": "Matossian", "date_raw": null, "text": "As the CUP assumed that role, its first task in Damascus was to remove the ancien régime’s officials from positions of power. Hence, they pressured the governor to dismiss the head of the Administrative Council of the province, the mufti of Damascus, the chief clerk of the şeriat courts, the kaymakam of Zabadani, and Busra Eski-Sham, along with several other district officials.107 These actions caused some discontent among the ulema class,108 resulting in the establish- ment of an association meant to protect its interests.109", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0712", "source": "Matossian", "date_raw": null, "text": "Rida tour nach revolution, rede in ummayadenmoschee, Salih Sharif al-Tunisi unterbricht wegen wahabismus, aufruhr, rida muss gehen, al tunisi festgenommen, dann bewaffneter auflauf fordert tunisis freilassung, wollen de fakto cup ruler syren As‘ad Bey töten, der flieht nach beirut. Ulama gewinnen dann wahl gegen cup, beschuldigen sie des säkularismus. Fußnote hier nicht auf Haqaiq sondern nur muqattam als quelle und erinnerungen", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0713", "source": "Matossian", "date_raw": null, "text": "In Syria, alliances played almost no role, since the CUP was one of the only organized political parties to campaign for the elections. Indeed, the CUP had a strong presence there, since it had active branches in Syria and the party had sent delegates from Salonica as early as October. The CUP did not make any electoral deals with the local populations of Syria, as they had in other places. Harran argues that the reasons for this were, first, that the Syrians were predominantly Muslim and therefore had an interest in the survival of the an- cien régime, and, second, that they did not yet show any signs of an organized national movement.83 At any rate, the CUP nominated most of the deputies in Syria. The candidates in Syria were from different social backgrounds, but, as in the case of the vilayet of Beirut, most of them served the state in some ca- pacity and came from prominent families.84 In short, the deputies in the Arab provinces came from three backgrounds: ulema, landowners, or professional men from the towns.", "time_from": 1908, "time_to": 1910, "precision": "interpolated", "page": null, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0655", "source": "Khalidi ottomanism and arabis before 1914", "date_raw": null, "text": "Hanioglu: kef doch schon sehr türkisch", "time_from": 1908, "time_to": 1912, "precision": "interpolated", "page": 54, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0650", "source": "Dawn: the origins of arab nationalism (zusammenfassung stand der dinge)", "date_raw": null, "text": "Arabische nationalisten werden laut bevor kef türkistisch wird", "time_from": 1908, "time_to": 1913, "precision": "interpolated", "page": 18, "category": "Personennetzwerke", "confidence": "medium"}, {"id": "s0182", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Kef garnicht so mächtig, zentralisierung beruht auf Kooptierung", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": 49, "category": "Politik", "confidence": "high"}, {"id": "s0183", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Reaktion auf revolution: skepsis ob das bleibt, manchmal sogar verschweigen. Mekka: jeder der v verfassung spricht wird ausgepeitscht", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": 49, "category": "Politik - Politisches System", "confidence": "high"}, {"id": "s0184", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "In Greater Syria the response was relatively more enthusiastic in coastal regions266 compared with the interior, where established landed families viewed the developments in İstanbul with reservations. The CUP in Jerusalem, which consisted predominantly of civilians and also included non-Muslims, established communication with Salonika. Even though the mutasarrıf (governor of a subprovince, or sancak) of Jerusalem, Ekrem Bey, was unsympathetic to the CUP, he was obliged to announce the reinstatement of the constitution. The prorevolution committee was stronger in Jaffa, where the kaymakam (district governor) at once declared his support for the constitution and the CUP.267 An Iraqi colonel of the Ottoman army established CUP clubs in Iraq and launched the Arabic-Turkish newspaper Baghdad.268 In Mecca the self-appointed local committee released the political prisoners in the town jail. It declared an end to the tax levied on entry into town and all but eliminated the camel tax that had been imposed by Governor Ratib.269  49f", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": null, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0185", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Demonstrationen heißen, dass alle ansprüche formulieren, deckel auf", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": 50, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0186", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Nablus: bevölkerung gegen notablen, weil die fiese tax farmer waren. Kef stellt sich hinter das volk, notablen reagieren mit anti kef position, sie müssen die stadt verlassen. Als nazim pasha gouverneur ist, dürfen sie zurück – anpassung der politik an notable.  Tawfiq Hammad, notable wird sogar MP für KEF", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": 50, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0206", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Kef möchte zeitungsleserschaft in provinzen erhöhen, beobachtet genau. „Political journals introduced the literate to new ideas and initiated debates. Newspapers published selective portions of parliamentary debates. Indeed, the discourse produced by stormy articles and rebuttals made the daily press a more current forum for the discussion of national political issues than the floor e einheit stärken, wollte sprache vereinfachen, nicht v lehnwörter reinigen. Eher wie araber salafs: große vergangenheit entdecken. aber noch lange nicht politisch", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": 68, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0222", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The grievances, then, did not arise from the adoption of novel Turcocentric policies under the new regime, but rather from the failure of the government to adapt its existing policy when confronted with novel demands for greater recognition of languages other than Turkish in the affairs of the state", "time_from": 1909, "time_to": 1908, "precision": "interpolated", "page": 69, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0028", "source": "Ezzerelli", "date_raw": null, "text": "Gegenputsch muhammadisten leute gegen reformisten, hier repräsentiert durch salah al din al tunisi. Osmanische autoritäten haben sich lieber aufseiten der neuen muhammadisten gestellt und alte allianz reformisten verlassen", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 191, "category": "Politik", "confidence": "high"}, {"id": "s0034", "source": "Hermann", "date_raw": null, "text": "Gegenputsch abdühamids macht stress", "time_from": 1909, "time_to": 1909, "precision": "event", "page": 112, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0035", "source": "Hermann", "date_raw": null, "text": "Nach gegenputsch 1909 wird cup paranoider, arabisten denken deshalb erst über unabhängigkeit nach", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 115, "category": "Gesellschaftliche Gruppen", "confidence": "high"}, {"id": "s0077", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Ajlani familie sohn Muhammad Ahmad wird 1909 nach istanbul gewählt", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 31, "category": "Außenpolitik", "confidence": "medium"}, {"id": "s0115", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Partei: Muhammadan Union. Große freunde bei Gegenputsch 1909", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 57, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0125", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Although the CUP had originally liberalized the censorship code, in the wake of the April 1909 countercoup it became far less keen on extending freedoms of speech and association. Meanwhile, as new journals in the Syrian provinces appeared, editors and writers developed greater expectations and applied pressure to win increased freedom of expression. The CUP press law, however, was not sufficiently flexible or liberal. Occasionally newspapers were suppressed or suspended and editors put on trial for printing articles stressing the political virtues of Arabism which the CUP found inimical to its own interests.25 Single incidents promoted greater misunderstanding between Syrians and the Turkish Unionists, but their cumulative effect permitted latent hostilities to surface as outright conflict.", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 61, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0126", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Parlament in istanbul gab es feige araber, haben gegen zuhause für kef gestimmt und ein paar mutige aus damaskus, aber waren nicht viele oder organisiert", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 61, "category": "Außenpolitik", "confidence": "low"}, {"id": "s0127", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "1909-11: In this period attempts were made to establish a parlia- mentary party of' liberal' Syrian-Arab delegates in order to strengthen the bonds of Ottoman unity by preserving rights of equality as outlined in the Constitution. But members of the entente liberale could not agree on a set of common principles and some returned to the Unionist camp", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 61, "category": "Politik", "confidence": "high"}, {"id": "s0137", "source": "Philip S. Khoury - Urban Notables and Arab Nationalism_ The Politics of Damascus 1860-1920-Cambridge University Press (2003)", "date_raw": null, "text": "Nahda arabiyya war geheim, außerdm 1909 gegründete Qahtan Society (al-jamHyyaal- Qahtaniyya) in istanbul, syrische offiziere, teil nahda arabiyya. Außerdem 1909 Young Arab Society (jamHyyat al-umma al-Arabiyya al-fatat Paris, als einzige für arab unabhängigkeit (Jamil Mardam-Beg, Nasib and Fawzi al-Bakri, Fakhri al-Barudi and Muhibb al-Din al-Khatib) nach WK1 einflussreich", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 64, "category": "Personennetzwerke", "confidence": "high"}, {"id": "s0174", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Its insistence on manipulating the government from outside to conform to its political aims compounded the typical problems associated with legitimacy in revolutionary transfers of power. Not until the spring of 1909 did the Committee create the beginnings of a formal political organ and prepare to take on the responsibility of governing the empire.", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 46, "category": "Politik", "confidence": "high"}, {"id": "s0175", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Stabilitätsproblem unklare Machterteilung Palast, hohe pforte(regierung) und KEF", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 46, "category": "Politik", "confidence": "high"}, {"id": "s0176", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Säuberung der verwaltung schafft probleme: keine erfahrenen leute. In den provinzen keine kontrolle, da ist es noch schwieriger, zuverlässige zu finden. Kef erhöht daher macht für entsendete. – das auch gegen ankündigung sabahhedin eigene partei zu gründen", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 47, "category": "Politik - Politisches System", "confidence": "high"}, {"id": "s0177", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The confiscation of the rapacious Hijaz governor Ratib Pasha’s250 property and his dismissal just days after the restoration of the constitution, followed by the dismissal of the grand sharif of Mecca, were well- publicized signs that the new regime would look askance at extortion", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 48, "category": "Politik", "confidence": "high"}, {"id": "s0178", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Hijaz gouverneur lässt sich nicht finden, ist juli paar wochen fouad pascha", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 48, "category": "Außenpolitik", "confidence": "low"}, {"id": "s0179", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Vier probleme: arab konkurrenz um posten frustriert gouverneure, die dann versetzung wollen. Nicht viele qualifiziete auf vorrat, dann inkompetente zwischenlösungen. Kabinettskrisen in istanbul führen auch zuwechseln. Außerdem wollen viele in umbruch zeit nicht in provinz sein sondern chancen in istanbul ergreifen", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 48, "category": "Politik – Politisches System", "confidence": "high"}, {"id": "s0180", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "Streikts: beirut gas und hafen, eisenbahn hama damaskus, schlachter beirut damaskus", "time_from": 1909, "time_to": 1909, "precision": "interpolated", "page": 48, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0181", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "1909 stress militärgouverneur damaskus nazim pascha und kommandeur 5. Armee osman favzi pascha", "time_from": 1909, "time_to": 1909, "precision": "exact", "page": 49, "category": "Außenpolitik", "confidence": "high"}, {"id": "s0198", "source": "Hasan Kayali - Arabs and Young Turks_ Ottomanism, Arabism, and Islamism in the Ottoman Empire, 1908-1918 (1997)", "date_raw": null, "text": "The new government aimed at systematizing fiscal and administrative practices. Yet the implementation of a reform program embodying these ideals encountered problems in the political turmoil— international complications, financial constraints, and the Committee’s ambiguous role in the political process—that marked the initial stage of constitutional rule. Aber abgelenkt durch erstmal
