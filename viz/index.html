<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>BER Chronik 1989–2017</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body>

<div id="main">
  <div id="left-col">
    <header style="display:flex; align-items:center; height:44px; padding:0 20px; background:#F7F5F0; gap:24px; flex-shrink:0;">
      <span style="font-size:15px; font-weight:500; white-space:nowrap;">BER Chronik 1989–2017</span>
      <nav id="tabs" style="display:flex; gap:0; align-items:center;">
        <button class="tab active" id="tab-timeline">Timeline</button>
        <button class="tab"        id="tab-network">Netzwerk</button>
      </nav>
      <span id="tutorial-btn" title="Tutorial starten" style="margin-left:auto;">?</span>
    </header>

    <div id="chart-area">
      <svg id="chart"></svg>
      <div id="legend"></div>
    </div>

    <div id="network-area">
      <svg id="network"></svg>
      <div id="net-hint">Scrollen zum Zoomen · Ziehen zum Verschieben · Knoten ziehbar</div>
      <div id="net-legend"></div>
    </div>
  </div>

  <aside id="panel">
    <!-- Row 1: collapse toggle + chat input – always visible -->
    <div id="panel-topbar">
      <button id="panel-min" title="Ausklappen">←</button>
      <div id="chat-input-wrap">
        <input id="chat-input" type="text" placeholder="Frage zur BER-Chronik …" autocomplete="off">
        <span id="input-mode-label"></span>
      </div>
      <button id="chat-send">→</button>
    </div>
    <!-- Row 2: back + title + close -->
    <div id="panel-navbar">
      <button id="panel-back" title="Zurück">←</button>
      <div id="panel-title">Suche</div>
      <button id="panel-close" title="Schließen">×</button>
    </div>

    <!-- Scrollable content: three mutually exclusive views -->
    <div id="panel-content">
      <div id="view-chat"     class="panel-view active"></div>
      <div id="view-timeline" class="panel-view"></div>
      <div id="view-entity"   class="panel-view"></div>
    </div>
  </aside>
</div> <!-- #main -->

<div id="tooltip"></div>

<script src="highlight.js"></script>
<script src="highlight-state.js"></script>
<script src="panel.js"></script>
<script src="chart.js"></script>
<script src="network.js"></script>
<script src="search.js"></script>
<script src="tutorial.js"></script>
</body>
</html>
