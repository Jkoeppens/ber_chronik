<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>BER Chronik 1989–2017</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 24px 10px;
      border-bottom: 1px solid #ddd;
      background: #fff;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.8rem; color: #666; margin-top: 2px; }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .tab {
      background: none; border: none;
      padding: 9px 18px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #666;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab:hover { color: #111; }
    .tab.active { color: #111; border-bottom-color: #111; font-weight: 600; }

    #main { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── Chart ── */
    #chart-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 24px 16px;
      overflow: hidden;
      min-width: 0;
      /* right padding is set dynamically via JS to match panel width */
    }
    #chart-area.hidden { display: none; }
    #chart-area svg { flex: 1; overflow: visible; }

    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #e0e0e0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #444;
      cursor: pointer;
      user-select: none;
    }
    .legend-item.dimmed { opacity: 0.35; }
    .legend-swatch { width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0; }

    .axis text { font-size: 11px; fill: #555; }
    .axis path, .axis line { stroke: #ccc; }
    .grid line { stroke: #e8e8e8; }
    .grid path { stroke: none; }

    .line-path { fill: none; stroke-width: 2px; transition: opacity 0.15s; }
    .line-path.dimmed { opacity: 0.1; }

    .dot { cursor: pointer; }
    .dot.dimmed { opacity: 0.1; pointer-events: none; }
    .dot.active { stroke: #111 !important; stroke-width: 2px !important; }

    /* ── Network ── */
    #network-area {
      flex: 1;
      display: none;
      overflow: hidden;
      min-width: 0;
      position: relative;
      background: #fafaf8;
    }
    #network-area.active { display: flex; }
    #network { width: 100%; height: 100%; }

    .net-label {
      font-size: 10px; fill: #333;
      pointer-events: none; user-select: none;
    }

    /* Network type legend */
    #net-legend {
      position: absolute;
      bottom: 14px; left: 16px;
      background: rgba(255,255,255,0.88);
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 8px 12px;
      font-size: 0.72rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .net-legend-item { display: flex; align-items: center; gap: 6px; }
    .net-legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%; flex-shrink: 0;
    }
    #net-hint {
      position: absolute;
      top: 12px; left: 16px;
      font-size: 0.72rem; color: #888;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: rgba(20,20,20,0.85);
      color: #fff;
      font-size: 0.72rem;
      padding: 5px 9px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      white-space: nowrap;
      z-index: 100;
    }

    /* ── Panel (overlays right side) ── */
    #panel {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 300px;
      background: #fff;
      border-left: 1px solid #ddd;
      box-shadow: -3px 0 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease;
      z-index: 10;
    }
    #panel.expanded { width: 66.666%; }

    /* Row 1: collapse toggle + chat input – always visible */
    #panel-topbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    #panel-min {
      background: none; border: none;
      width: 26px; height: 26px;
      font-size: 1rem; cursor: pointer;
      color: #888; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }
    #panel-min:hover { color: #111; background: #f0f0f0; }
    #chat-input {
      flex: 1;
      padding: 6px 9px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
      min-width: 0;
    }
    #chat-input:focus { border-color: #999; }
    #chat-send {
      padding: 6px 11px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.82rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    #chat-send:hover { background: #333; }
    #chat-send:disabled { background: #999; cursor: default; }

    /* Row 2: back + title + close */
    #panel-navbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
      min-height: 34px;
    }
    #panel-back {
      background: none; border: none;
      font-size: 1rem; cursor: pointer;
      color: #888; flex-shrink: 0;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      visibility: hidden;
    }
    #panel-back.visible { visibility: visible; }
    #panel-back:hover { color: #111; background: #f0f0f0; }
    #panel-title {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    #panel-close {
      background: none; border: none;
      font-size: 1.1rem; cursor: pointer;
      color: #888; flex-shrink: 0;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }
    #panel-close:hover { color: #111; background: #f0f0f0; }

    /* Scrollable content area – three mutually exclusive views */
    #panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }
    .panel-view          { display: none; }
    .panel-view.active   { display: block; }

    mark.kw-hit {
      background: #fef08a;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    .chat-question-label {
      font-size: 0.7rem;
      color: #888;
      margin-bottom: 5px;
    }
    .chat-answer-text {
      font-size: 0.82rem;
      line-height: 1.6;
      color: #1a1a1a;
      white-space: pre-wrap;
    }
    /* Rendered markdown in AI answer */
    .chat-answer-text h2 { font-size: 0.88rem; font-weight: 700; margin: 14px 0 4px; color: #111; }
    .chat-answer-text h3 { font-size: 0.82rem; font-weight: 700; margin: 10px 0 3px; color: #333; }
    .chat-answer-text p  { margin: 0 0 8px; }
    .chat-answer-text ul,
    .chat-answer-text ol { margin: 0 0 8px; padding-left: 18px; }
    .chat-answer-text li { margin-bottom: 3px; }
    .chat-answer-text strong { font-weight: 700; }

    /* Inline source references [p59, 1992] */
    a.src-ref {
      color: #888;
      font-size: 0.72em;
      text-decoration: none;
      border-bottom: 1px dashed #bbb;
      vertical-align: super;
      line-height: 0;
    }
    a.src-ref:hover { color: #111; border-bottom-color: #555; }

    .chat-sources-header {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 0.72rem;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
    }
    .chat-params {
      margin-top: 6px;
      font-size: 0.66rem;
      color: #bbb;
    }
    .chat-spinner { font-size: 0.78rem; color: #888; padding: 6px 0; }

    .chat-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .chat-mode {
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .chat-mode-ai    { background: #dbeafe; color: #1d4ed8; }
    .chat-mode-local { background: #fef3c7; color: #92400e; }
    .chat-hits { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

    /* Paragraph card */
    .para-date   { font-size: 0.7rem; color: #888; margin-bottom: 5px; }
    .para-label  {
      display: inline-block; padding: 2px 7px; border-radius: 3px;
      font-size: 0.7rem; font-weight: 600; color: #fff; margin-bottom: 10px;
    }
    .para-text   { font-size: 0.85rem; line-height: 1.6; color: #222; }
    .para-source { margin-top: 10px; font-size: 0.72rem; color: #888; }

    /* Entity highlights */
    .entity {
      border-radius: 2px;
      padding: 0 2px;
      cursor: pointer;
      font-weight: 500;
      transition: filter 0.1s;
    }
    .entity:hover { filter: brightness(0.88); }
    .entity[data-typ="Person"]  { background: #cce0ff; color: #003580; }
    .entity[data-typ="Org"]     { background: #ffe4c0; color: #7a3500; }
    .entity[data-typ="Gremium"] { background: #ead5f5; color: #5a0080; }
    .entity[data-typ="Partei"]  { background: #ffd5d5; color: #800000; }


    .ep-summary {
      background: #f9f9f7;
      border: 1px solid #e0ddd8;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 0.8rem;
      line-height: 1.55;
      color: #333;
    }
    .ep-summary-count { margin-top: 6px; font-size: 0.7rem; color: #888; }

    .ep-para {
      border: 1px solid #e8e8e6;
      border-radius: 5px;
      padding: 10px 12px;
      background: #fff;
    }
  </style>
</head>
<body>

<header>
  <h1>BER Chronik 1989–2017</h1>
  <p>Klick auf einen Punkt für Absätze · Klick auf markierte Namen für Zusammenfassungen · Legende zum Ein-/Ausblenden</p>
</header>

<nav id="tabs">
  <button class="tab active" id="tab-timeline">Timeline</button>
  <button class="tab"        id="tab-network">Netzwerk</button>
</nav>

<div id="main">
  <div id="chart-area">
    <svg id="chart"></svg>
    <div id="legend"></div>
  </div>

  <div id="network-area">
    <svg id="network"></svg>
    <div id="net-hint">Scrollen zum Zoomen · Ziehen zum Verschieben · Knoten ziehbar</div>
    <div id="net-legend"></div>
  </div>

  <aside id="panel">
    <!-- Row 1: collapse toggle + chat input – always visible -->
    <div id="panel-topbar">
      <button id="panel-min" title="Ausklappen">←</button>
      <input id="chat-input" type="text" placeholder="Frage zur BER-Chronik …" autocomplete="off">
      <button id="chat-send">→</button>
    </div>

    <!-- Row 2: back + title + close -->
    <div id="panel-navbar">
      <button id="panel-back" title="Zurück">←</button>
      <div id="panel-title">Suche</div>
      <button id="panel-close" title="Schließen">×</button>
    </div>

    <!-- Scrollable content: three mutually exclusive views -->
    <div id="panel-content">
      <div id="view-chat"     class="panel-view active"></div>
      <div id="view-timeline" class="panel-view"></div>
      <div id="view-entity"   class="panel-view"></div>
    </div>
  </aside>
</div>

<div id="tooltip"></div>

<script>
// ── marked.js config ──────────────────────────────────────────────────────────
marked.use({ breaks: true, gfm: true });

// ── Constants ─────────────────────────────────────────────────────────────────
const EVENT_TYPES = [
  "Kosten","Termin","Klage","Technik",
  "Personalie","Beschluss","Vertrag","Planung","Claim",
];
const COLOR = {
  Kosten:"#f28e2b", Termin:"#e15759", Klage:"#b07aa1", Technik:"#17becf",
  Personalie:"#4e79a7", Beschluss:"#59a14f", Vertrag:"#8cd17d",
  Planung:"#ff9da7", Claim:"#999",
};
const NODE_COLOR = {
  Person:  "#4e79a7",
  Org:     "#f28e2b",
  Gremium: "#9467bd",
  Partei:  "#e15759",
};

// ── Entity lookup ─────────────────────────────────────────────────────────────
let aliasMap      = {};
let aliasesSorted = [];
let summaryMap    = {};

function buildAliasMap(csvText) {
  const lines = csvText.split("\n").slice(1);
  let loaded = 0;
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const parts = trimmed.split(",");
    if (parts.length < 3) { console.warn("[entity] skipping line:", trimmed); continue; }
    const alias      = parts[0].trim();
    const normalform = parts.slice(1, parts.length - 1).join(",").trim();
    const typ        = parts[parts.length - 1].trim();
    if (!alias || !normalform || !typ) continue;
    aliasMap[alias.toLowerCase()] = { normalform, typ };
    loaded++;
  }
  aliasesSorted = Object.keys(aliasMap).sort((a, b) => b.length - a.length);
  console.log(`[entity] aliasMap built: ${loaded} aliases`);
}

// ── Text helpers ──────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function highlightEntities(text) {
  return highlightWithKeywords(text, []);
}

function highlightWithKeywords(text, keywords) {
  const kwSet = new Set(keywords.map(k => k.toLowerCase()));
  const allPatterns = [
    ...aliasesSorted.map(escapeRegex),
    ...keywords.map(escapeRegex),
  ];
  if (!allPatterns.length) return escapeHtml(text);

  const pattern = allPatterns.join("|");
  const re = new RegExp(`(?<![\\p{L}\\d])(?:${pattern})(?![\\p{L}\\d])`, "giu");

  let result = "", lastIdx = 0;
  for (const match of text.matchAll(re)) {
    const m    = match[0];
    const info = aliasMap[m.toLowerCase()];
    result += escapeHtml(text.slice(lastIdx, match.index));
    if (info) {
      result += `<span class="entity" data-typ="${info.typ}" data-name="${escapeHtml(info.normalform)}">${escapeHtml(m)}</span>`;
    } else if (kwSet.has(m.toLowerCase())) {
      result += `<mark class="kw-hit">${escapeHtml(m)}</mark>`;
    } else {
      result += escapeHtml(m);
    }
    lastIdx = match.index + m.length;
  }
  return result + escapeHtml(text.slice(lastIdx));
}

// ── Entity + network highlight ────────────────────────────────────────────────
let selectedEntity   = null;
let netNodeSelection = null;
let netNeighbors     = null;   // Map<id, Set<id>> built in drawNetwork

const DIM = 0.35;  // opacity for "rest" nodes when something is highlighted

// ── Timeline highlight ────────────────────────────────────────────────────────
let chartDotSelection  = null;   // D3 selection of all .dot circles, set in drawChart
let highlightedAnchors = null;   // Set<string> of active source anchors, or null
let focusedAnchor      = null;   // single anchor being focused via src-ref click, or null

function applyTimelineHighlight(anchorSet, focused) {
  highlightedAnchors = anchorSet ?? null;
  focusedAnchor      = focused ?? null;
  if (!chartDotSelection) return;
  if (!anchorSet || anchorSet.size === 0) {
    chartDotSelection
      .attr("r", 4).attr("opacity", null)
      .attr("stroke", "#fff").attr("stroke-width", 1.5);
    return;
  }
  const isSource  = v => v.anchorSet && [...anchorSet].some(a => v.anchorSet.has(a));
  const isFocused = v => focused && v.anchorSet?.has(focused);
  chartDotSelection
    .attr("r",            v => isFocused(v) ? 9 : isSource(v) ? 7 : 4)
    .attr("opacity",      v => isSource(v) ? 1 : DIM)
    .attr("stroke",       v => isFocused(v) ? "#f5c518" : "#fff")
    .attr("stroke-width", v => isFocused(v) ? 2.5 : 1.5);
}

function _baseStroke(d) {
  return summaryMap[d.id] ? "#fff" : "#888";
}

function applyNetworkHighlight(normalform) {
  if (!netNodeSelection) return;
  // Restore base radius first (hover may have enlarged it)
  netNodeSelection.select("circle").attr("r", nodeRadius);
  if (!normalform) {
    // Rest state: everything fully visible
    netNodeSelection.attr("opacity", 1);
    netNodeSelection.select("circle")
      .attr("stroke",           _baseStroke)
      .attr("stroke-width",     1.5)
      .attr("stroke-dasharray", d => summaryMap[d.id] ? null : "4,3");
    return;
  }
  const nbrs = netNeighbors?.get(normalform) || new Set();
  netNodeSelection.attr("opacity", d =>
    (d.id === normalform || nbrs.has(d.id)) ? 1 : DIM);
  netNodeSelection.select("circle")
    .attr("stroke",           d => d.id === normalform ? "#f5c518" : _baseStroke(d))
    .attr("stroke-width",     d => d.id === normalform ? 3 : 1.5)
    .attr("stroke-dasharray", d => d.id === normalform ? null : (summaryMap[d.id] ? null : "4,3"));
}

// ── Panel view state machine ──────────────────────────────────────────────────
let viewStack   = [];
let currentView = { type: "chat", title: "Suche", renderFn: null, entityKey: null };

function _renderView({ type, title, renderFn, entityKey }) {
  document.getElementById("panel-title").textContent = title;
  document.getElementById("panel-back").classList.toggle("visible", viewStack.length > 0);
  document.querySelectorAll(".panel-view").forEach(el => el.classList.remove("active"));
  document.getElementById(`view-${type}`).classList.add("active");
  if (renderFn) renderFn(document.getElementById(`view-${type}`));
  document.getElementById("panel-content").scrollTop = 0;
  // Returning to chat: restore base highlight without any single-ref focus
  if (type === "chat" && highlightedAnchors) applyTimelineHighlight(highlightedAnchors, null);
}

function showView(type, title, renderFn, entityKey) {
  // Same entity already showing – just re-render in place
  if (currentView && currentView.type === type && currentView.entityKey === entityKey && entityKey) {
    if (renderFn) renderFn(document.getElementById(`view-${type}`));
    return;
  }
  if (currentView) viewStack.push(currentView);
  currentView = { type, title, renderFn, entityKey };
  _renderView(currentView);
}

function goBack() {
  if (!viewStack.length) return;
  currentView = viewStack.pop();
  _renderView(currentView);
  selectedEntity = currentView.entityKey || null;
  applyNetworkHighlight(selectedEntity);
}

function goHome() {
  viewStack      = [];
  selectedEntity = null;
  applyNetworkHighlight(null);
  applyTimelineHighlight(null);
  if (activeDot) { activeDot.classList.remove("active"); activeDot = null; }
  currentView = { type: "chat", title: "Suche", renderFn: null, entityKey: null };
  _renderView(currentView);
}

document.getElementById("panel-back").addEventListener("click", goBack);
document.getElementById("panel-close").onclick = goHome;
document.addEventListener("keydown", e => { if (e.key === "Escape") goHome(); });

// ── Panel collapse/expand ─────────────────────────────────────────────────────
const panelEl    = document.getElementById("panel");
const panelMin   = document.getElementById("panel-min");
const chartArea  = document.getElementById("chart-area");
const networkArea = document.getElementById("network-area");
let panelExpanded = false;

function applyPanelWidth() {
  const w = panelEl.offsetWidth;
  chartArea.style.paddingRight  = `${w + 24}px`;
  networkArea.style.paddingRight = `${w}px`;
}

// Set initial padding once layout is ready
requestAnimationFrame(applyPanelWidth);

panelMin.addEventListener("click", () => {
  panelExpanded = !panelExpanded;
  panelEl.classList.toggle("expanded", panelExpanded);
  panelMin.textContent = panelExpanded ? "→" : "←";
  panelMin.title       = panelExpanded ? "Einklappen" : "Ausklappen";
  // After CSS transition ends, update padding (transition is 0.25s)
  setTimeout(applyPanelWidth, 260);
});

// ── Para list helpers ─────────────────────────────────────────────────────────
let activeDot = null, dimmedTypes = new Set();

function renderParaList(entries) {
  return entries.map(p => {
    const et    = p.event_type || "?";
    const color = COLOR[et] || "#999";
    const date  = p.date_raw || String(p.year || "");
    const src   = [p.source_name, p.source_date].filter(Boolean).join(", ");
    return `<div class="ep-para">
      <div class="para-date">${escapeHtml(date)}</div>
      <span class="para-label" style="background:${color}">${et}</span>
      <div class="para-text">${highlightEntities(p.text || "")}</div>
      ${src ? `<div class="para-source">${escapeHtml(src)}</div>` : ""}
    </div>`;
  }).join("");
}

function renderEntityView(normalform, viewEl) {
  const entries = entriesByActor.get(normalform) || [];
  const sorted  = [...entries].sort((a, b) =>
    (a.year || 0) - (b.year || 0) || (a.id || 0) - (b.id || 0));
  const info = summaryMap[normalform];
  const summaryHTML = (info && info.summary) ? `
    <div class="ep-summary">
      ${highlightEntities(info.summary)}
      <div class="ep-summary-count">${info.count} Nennungen in der Chronik</div>
    </div>` : "";
  viewEl.innerHTML = summaryHTML + renderParaList(sorted);
}

function selectEntity(normalform) {
  selectedEntity = normalform;
  applyNetworkHighlight(normalform);
  showView("entity", normalform, viewEl => renderEntityView(normalform, viewEl), normalform);
}

document.getElementById("panel-content").addEventListener("click", e => {
  // Source-ref anchor: scroll target into view inside the panel container
  const ref = e.target.closest("a.src-ref");
  if (ref) {
    e.preventDefault();
    const targetId = ref.getAttribute("href").slice(1); // strip leading #
    document.getElementById(targetId)
      ?.scrollIntoView({ behavior: "smooth", block: "start" });
    const anchor = targetId.replace(/^src-/, "");
    if (highlightedAnchors) applyTimelineHighlight(highlightedAnchors, anchor);
    return;
  }
  // Entity highlight click
  const ent = e.target.closest(".entity");
  if (!ent) return;
  selectEntity(ent.dataset.name);
});

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tip = document.getElementById("tooltip");
function showTip(html, e) { tip.innerHTML = html; tip.style.opacity = 1; moveTip(e); }
function moveTip(e) {
  tip.style.left = (e.clientX + 12) + "px";
  tip.style.top  = (e.clientY - 28) + "px";
}
function hideTip() { tip.style.opacity = 0; }

// ── Timeline chart ────────────────────────────────────────────────────────────
function drawChart(series, years) {
  const svg    = d3.select("#chart");
  const margin = { top: 16, right: 20, bottom: 36, left: 38 };
  svg.selectAll("*").remove();

  const W = svg.node().clientWidth  || 800;
  const H = svg.node().clientHeight || 380;
  const w = W - margin.left - margin.right;
  const h = H - margin.top  - margin.bottom;

  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
  const x = d3.scaleLinear().domain([1989, 2017]).range([0, w]);
  const y = d3.scaleLinear()
    .domain([0, d3.max(series, s => d3.max(s.values, v => v.count))]).nice()
    .range([h, 0]);

  g.append("g").attr("class","grid")
    .call(d3.axisLeft(y).ticks(5).tickSize(-w).tickFormat(""));
  g.append("g").attr("class","axis").attr("transform",`translate(0,${h})`)
    .call(d3.axisBottom(x).tickFormat(d3.format("d")).ticks(15).tickSize(4));
  g.append("g").attr("class","axis")
    .call(d3.axisLeft(y).ticks(5).tickSize(4));

  const line = d3.line()
    .x(v => x(v.year)).y(v => y(v.count))
    .curve(d3.curveMonotoneX);

  series.forEach(s => {
    g.append("path").datum(s.values)
      .attr("class", "line-path" + (dimmedTypes.has(s.et) ? " dimmed" : ""))
      .attr("id", `line-${s.et}`)
      .attr("stroke", COLOR[s.et])
      .attr("d", line);

    g.selectAll(null)
      .data(s.values.filter(v => v.count > 0))
      .join("circle")
      .attr("class", "dot" + (dimmedTypes.has(s.et) ? " dimmed" : ""))
      .attr("cx", v => x(v.year)).attr("cy", v => y(v.count))
      .attr("r", 4)
      .attr("fill", COLOR[s.et]).attr("stroke", "#fff").attr("stroke-width", 1.5)
      .on("mouseenter", (event, v) => showTip(`<b>${v.year}</b> · ${s.et}: ${v.count}`, event))
      .on("mousemove", moveTip).on("mouseleave", hideTip)
      .on("click", (event, v) => {
        hideTip();
        if (activeDot) activeDot.classList.remove("active");
        activeDot = event.currentTarget;
        activeDot.classList.add("active");
        const sorted = [...v.entries].sort((a, b) =>
          (a.year || 0) - (b.year || 0) || (a.id || 0) - (b.id || 0));
        showView("timeline", `${v.year} · ${s.et}`,
          viewEl => { viewEl.innerHTML = renderParaList(sorted); });
      });
  });

  // Store dot selection for highlight; re-apply any active highlight after redraw
  chartDotSelection = svg.selectAll("circle.dot");
  if (highlightedAnchors) applyTimelineHighlight(highlightedAnchors, focusedAnchor);

  // Click on empty chart area resets all timeline highlighting
  svg.on("click.reset", (event) => {
    if (event.target.tagName !== "circle") applyTimelineHighlight(null);
  });
}

// ── Network graph ─────────────────────────────────────────────────────────────
function nodeRadius(d) { return Math.max(5, Math.sqrt(d.count) * 3); }

function drawNetwork(nodes, links, entriesByActor) {
  const svg = d3.select("#network");
  svg.selectAll("*").remove();

  const W = svg.node().clientWidth  || 800;
  const H = svg.node().clientHeight || 600;

  const g = svg.append("g");

  svg.call(d3.zoom()
    .scaleExtent([0.15, 5])
    .on("zoom", e => g.attr("transform", e.transform)));

  // Build adjacency map before D3 mutates link source/target to objects
  const neighbors = new Map();
  nodes.forEach(d => neighbors.set(d.id, new Set()));
  links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if (neighbors.has(sid)) neighbors.get(sid).add(tid);
    if (neighbors.has(tid)) neighbors.get(tid).add(sid);
  });

  const sim = d3.forceSimulation(nodes)
    .force("link",    d3.forceLink(links).id(d => d.id).distance(80).strength(0.4))
    .force("charge",  d3.forceManyBody().strength(-220))
    .force("center",  d3.forceCenter(W / 2, H / 2))
    .force("collide", d3.forceCollide(d => nodeRadius(d) + 4));

  const link = g.append("g")
    .selectAll("line").data(links).join("line")
    .attr("stroke", "#ccc")
    .attr("stroke-opacity", 0.6)
    .attr("stroke-width", d => Math.min(5, 0.8 + Math.log(d.count + 1)));

  const node = g.append("g")
    .selectAll("g").data(nodes).join("g")
    .attr("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end",   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

  node.append("circle")
    .attr("r",              nodeRadius)
    .attr("fill",           d => NODE_COLOR[d.typ] || "#999")
    .attr("fill-opacity",   d => summaryMap[d.id] ? 1 : 0.5)
    .attr("stroke",         _baseStroke)
    .attr("stroke-width",   1.5)
    .attr("stroke-dasharray", d => summaryMap[d.id] ? null : "4,3");

  // Labels for nodes with ≥5 mentions
  node.filter(d => d.count >= 5)
    .append("text")
    .attr("class", "net-label")
    .attr("dy",          d => nodeRadius(d) + 11)
    .attr("text-anchor", "middle")
    .text(d => d.id);

  node
    .on("mouseenter", (event, d) => {
      // Tooltip: only count (name is already on the label)
      showTip(`${d.count} Nennungen`, event);
      if (selectedEntity) return;
      const nbrs = neighbors.get(d.id) || new Set();
      node.attr("opacity", n => (n.id === d.id || nbrs.has(n.id)) ? 1 : DIM);
      d3.select(event.currentTarget).select("circle")
        .attr("r", nodeRadius(d) * 1.25);
    })
    .on("mousemove", moveTip)
    .on("mouseleave", (event, d) => {
      hideTip();
      d3.select(event.currentTarget).select("circle").attr("r", nodeRadius(d));
      if (selectedEntity) return;
      node.attr("opacity", 1);
    })
    .on("click", (event, d) => {
      hideTip();
      selectEntity(d.id);
    });

  // Store for applyNetworkHighlight
  netNodeSelection = node;
  netNeighbors     = neighbors;
  // Re-apply any active selection after redraw
  if (selectedEntity) applyNetworkHighlight(selectedEntity);

  sim.on("tick", () => {
    link
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  const netLegendEl = document.getElementById("net-legend");
  netLegendEl.innerHTML = Object.entries(NODE_COLOR).map(([typ, color]) => `
    <div class="net-legend-item">
      <div class="net-legend-dot" style="background:${color}"></div>${typ}
    </div>`).join("");
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
let networkDrawn  = false;
let netNodes = [], netLinks = [], entriesByActor = new Map();
let entriesByAnchor = new Map();

function switchTab(active) {
  ["timeline", "network"].forEach(id => {
    document.getElementById(`tab-${id}`).classList.toggle("active", id === active);
  });
  document.getElementById("chart-area").classList.toggle("hidden",  active !== "timeline");
  document.getElementById("network-area").classList.toggle("active", active === "network");
}

document.getElementById("tab-timeline").addEventListener("click", () => switchTab("timeline"));
document.getElementById("tab-network").addEventListener("click",  () => {
  switchTab("network");
  if (!networkDrawn) { drawNetwork(netNodes, netLinks, entriesByActor); networkDrawn = true; }
});

// ── Chat (in panel) ───────────────────────────────────────────────────────────
const API_URL = "http://localhost:8000";

// German stopwords (mirrors api_server.py)
const STOPWORDS = new Set([
  "aber","alle","allem","allen","aller","alles","also","als","am","an","auch",
  "auf","aus","bei","beim","bin","bis","bitte","da","damit","dann","dass","dem",
  "den","denn","der","des","dessen","die","dies","dieser","dieses","doch","dort",
  "durch","ein","eine","einem","einen","einer","eines","er","es","etwa","euch",
  "euer","gibt","haben","hatte","hier","ihm","ihn","ihnen","ihr","ihre","im",
  "immer","ist","kann","kein","keine","mal","man","mehr","mich","mir","mit",
  "nach","nicht","noch","nun","nur","oder","ohne","sehr","sein","sich","sie",
  "sind","soll","sowie","über","um","und","unter","uns","vom","von","vor","war",
  "waren","warum","was","weil","wenn","wer","werden","wie","wird","wir","worden",
  "wurde","wurden","wäre","würde","ziel","zu","zum","zur","zwischen",
]);

function extractKeywords(question) {
  return [...question.matchAll(/[A-Za-zÄÖÜäöüß]+/g)]
    .map(m => m[0].toLowerCase())
    .filter(w => w.length >= 4 && !STOPWORDS.has(w))
    .slice(0, 6);
}

// All loaded entries (filled in boot)
let allEntries = [];

function fulltextSearch(question) {
  const keywords = extractKeywords(question);
  if (!keywords.length) return { hits: [], keywords };
  const hits = allEntries
    .filter(e => keywords.some(kw => (e.text || "").toLowerCase().includes(kw)))
    .sort((a, b) => (a.year || 0) - (b.year || 0) || (a.id || 0) - (b.id || 0));
  return { hits, keywords };
}

function renderChatAnswer(viewEl, question, mode, content) {
  const modeLabel = mode === "ai"
    ? `<span class="chat-mode chat-mode-ai">KI-Antwort</span>`
    : `<span class="chat-mode chat-mode-local">Volltextsuche</span>`;

  if (mode === "ai") {
    const { data } = content;

    // Protect [pXX, YYYY] from marked (it strips unknown reference-style links).
    // Replace them with unique placeholders before parsing, restore after.
    const srcRefMap = new Map();
    let refIdx = 0;
    const protectedAnswer = data.answer.replace(/\[([pP]\d+)(?:,\s*(\d+|\?))?\]/g, (match, anchor, year) => {
      const key = `\x02SRCREF${refIdx++}\x03`;
      const label = year ? `[${anchor}, ${year}]` : `[${anchor}]`;
      srcRefMap.set(key, `<a href="#src-${anchor.toLowerCase()}" class="src-ref">${label}</a>`);
      return key;
    });
    let answerHtml = marked.parse(protectedAnswer);
    for (const [key, html] of srcRefMap) {
      answerHtml = answerHtml.replaceAll(key, html);
    }

    // Source cards with anchor IDs for in-page scrolling
    const sourceEntries = (data.sources || [])
      .map(anchor => entriesByAnchor.get(anchor))
      .filter(Boolean);

    const sourceCards = sourceEntries.map(p => {
      const et    = p.event_type || "?";
      const color = COLOR[et] || "#999";
      const date  = p.date_raw || String(p.year || "");
      const src   = [p.source_name, p.source_date].filter(Boolean).join(", ");
      return `<div class="ep-para" id="src-${p.doc_anchor}">
        <div class="para-date">${escapeHtml(date)}</div>
        <span class="para-label" style="background:${color}">${et}</span>
        <div class="para-text">${highlightEntities(p.text || "")}</div>
        ${src ? `<div class="para-source">${escapeHtml(src)}</div>` : ""}
      </div>`;
    }).join("");

    const sourcesHTML = sourceEntries.length ? `
      <div class="chat-sources-header">Verwendete Quellen (${sourceEntries.length})</div>
      <div class="chat-hits">${sourceCards}</div>` : "";

    viewEl.innerHTML = `
      <div class="chat-meta">${modeLabel}<span class="chat-question-label">${escapeHtml(question)}</span></div>
      <div class="chat-answer-text">${answerHtml}</div>
      ${data.keywords?.length ? `<div class="chat-params">Keywords: ${data.keywords.join(", ")}</div>` : ""}
      ${sourcesHTML}
    `;
    applyTimelineHighlight(new Set(data.sources || []));
  } else {
    const { hits, keywords } = content;
    const cards = hits.length
      ? hits.map(p => {
          const et    = p.event_type || "?";
          const color = COLOR[et] || "#999";
          const date  = p.date_raw || String(p.year || "");
          const src   = [p.source_name, p.source_date].filter(Boolean).join(", ");
          return `<div class="ep-para">
            <div class="para-date">${escapeHtml(date)}</div>
            <span class="para-label" style="background:${color}">${et}</span>
            <div class="para-text">${highlightWithKeywords(p.text || "", keywords)}</div>
            ${src ? `<div class="para-source">${escapeHtml(src)}</div>` : ""}
          </div>`;
        }).join("")
      : `<div class="chat-params">Keine Treffer.</div>`;

    viewEl.innerHTML = `
      <div class="chat-meta">${modeLabel}<span class="chat-question-label">${escapeHtml(question)}</span></div>
      ${content.apiError ? `<div class="chat-params" style="color:#c55">API-Fehler: ${escapeHtml(content.apiError)}</div>` : ""}
      ${hits.length ? `<div class="chat-params">${hits.length} Treffer · Keywords: ${keywords.join(", ")}</div>` : ""}
      <div class="chat-hits">${cards}</div>
    `;
    applyTimelineHighlight(new Set(hits.map(h => h.doc_anchor).filter(Boolean)));
  }
}

async function sendChat() {
  const input    = document.getElementById("chat-input");
  const sendBtn  = document.getElementById("chat-send");
  const question = input.value.trim();
  if (!question) return;

  // Switch to chat view if we're elsewhere (push current view to stack)
  if (currentView.type !== "chat") {
    viewStack.push(currentView);
    currentView = { type: "chat", title: "Suche", renderFn: null, entityKey: null };
    _renderView(currentView);
  }

  const viewEl = document.getElementById("view-chat");
  sendBtn.disabled = true;
  input.disabled   = true;
  viewEl.innerHTML = `<div class="chat-spinner">Suche …</div>`;

  let usedFallback = false;
  try {
    const res = await fetch(`${API_URL}/chat`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ question }),
      signal:  AbortSignal.timeout(30000),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || res.statusText);
    }
    const data = await res.json();
    renderChatAnswer(viewEl, question, "ai", { data });
  } catch (err) {
    console.warn("[chat] API nicht erreichbar, Fallback aktiv:", err?.message ?? err);
    usedFallback = true;
    const result = fulltextSearch(question);
    result.apiError = err?.message ?? String(err);
    renderChatAnswer(viewEl, question, "local", result);
  } finally {
    sendBtn.disabled = false;
    input.disabled   = false;
    if (!usedFallback) input.value = "";
    input.focus();
  }
}

document.getElementById("chat-send").addEventListener("click", sendChat);
document.getElementById("chat-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
Promise.all([
  fetch("data.json").then(r => r.json()),
  fetch("entities_seed.csv").then(r => r.text())
    .catch(() => ""),
  fetch("entities_summary.json").then(r => r.json())
    .catch(() => ({})),
]).then(([{ entries }, csvText, summaries]) => {

  buildAliasMap(csvText);
  summaryMap = summaries;
  allEntries = entries;

  for (const e of entries) {
    if (e.doc_anchor) entriesByAnchor.set(e.doc_anchor, e);
  }

  // ── Timeline series ──
  const years  = d3.range(1989, 2018);
  const byYear = d3.group(entries.filter(e => e.year), e => e.year);

  const series = EVENT_TYPES.map(et => ({
    et,
    values: years.map(year => {
      const ents = (byYear.get(year) || []).filter(e => e.event_type === et);
      return {
        year,
        count:     ents.length,
        entries:   ents,
        anchorSet: new Set(ents.map(e => e.doc_anchor).filter(Boolean)),
      };
    }),
  }));

  drawChart(series, years);
  new ResizeObserver(() => drawChart(series, years)).observe(
    document.getElementById("chart"));

  const legend = document.getElementById("legend");
  EVENT_TYPES.forEach(et => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `<div class="legend-swatch" style="background:${COLOR[et]}"></div>${et}`;
    item.addEventListener("click", () => {
      dimmedTypes.has(et) ? dimmedTypes.delete(et) : dimmedTypes.add(et);
      drawChart(series, years);
      document.querySelectorAll(".legend-item").forEach((el, i) =>
        el.classList.toggle("dimmed", dimmedTypes.has(EVENT_TYPES[i])));
    });
    legend.appendChild(item);
  });

  // ── Network data ──
  const nodeCounts = new Map();
  const edgeCounts = new Map();

  for (const entry of entries) {
    const actors = Array.isArray(entry.actors) ? entry.actors : [];
    for (const a of actors) {
      nodeCounts.set(a, (nodeCounts.get(a) || 0) + 1);
      if (!entriesByActor.has(a)) entriesByActor.set(a, []);
      entriesByActor.get(a).push(entry);
    }
    for (let i = 0; i < actors.length; i++) {
      for (let j = i + 1; j < actors.length; j++) {
        const key = [actors[i], actors[j]].sort().join("\x00");
        edgeCounts.set(key, (edgeCounts.get(key) || 0) + 1);
      }
    }
  }

  netNodes = [...nodeCounts.entries()].map(([id, count]) => ({
    id, count,
    typ: aliasMap[id.toLowerCase()]?.typ || "Org",
  }));

  netLinks = [...edgeCounts.entries()]
    .filter(([, count]) => count >= 2)
    .map(([key, count]) => {
      const [source, target] = key.split("\x00");
      return { source, target, count };
    });

}).catch(err => {
  document.getElementById("chart-area").innerHTML =
    `<p style="color:#c00;padding:20px">
      Fehler: ${err.message}<br><br>
      Starte mit: <code>python3 -m http.server 8765</code> (aus dem Projektordner)
    </p>`;
});
</script>
