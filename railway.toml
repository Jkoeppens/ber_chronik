[build]
builder = "railpack"

[deploy]
restartPolicyType = "on_failure"
volumeMounts = [{ mountPath = "/data", name = "ber-data" }]

[variables]
LLM_PROVIDER = "anthropic"
EMBEDDING_PROVIDER = "voyage"
DATA_ROOT = "/data"
DROPBOX_REDIRECT_URL = "https://berchronik-production.up.railway.app/api/obsidian/oauth/callback"
