<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zugang</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
     background:#0f172a;color:#e2e8f0;min-height:100vh;
     display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border:1px solid #334155;border-radius:10px;
      padding:40px;width:360px;max-width:90vw}
h2{font-size:1.1rem;font-weight:600;color:#f1f5f9;margin-bottom:8px}
p{font-size:.85rem;color:#94a3b8;margin-bottom:24px;line-height:1.5}
input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #475569;
      border-radius:6px;color:#f1f5f9;font-size:.9rem;font-family:monospace;
      outline:none;margin-bottom:12px}
input:focus{border-color:#3b82f6}
button{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;
       border-radius:6px;font-size:.9rem;font-weight:500;cursor:pointer}
button:hover{background:#1d4ed8}
button:disabled{background:#475569;cursor:default}
.err{color:#f87171;font-size:.82rem;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="card">
  <h2>Forschungszugang</h2>
  <p>Bitte Einladungscode eingeben.<br>Du hast den Link per E-Mail erhalten.</p>
  <input id="code" type="text" placeholder="Einladungscode" autocomplete="off" spellcheck="false">
  <button id="btn" onclick="check()">Weiter →</button>
  <div class="err" id="err">Ungültiger Einladungscode.</div>
</div>
<script>
const input = document.getElementById('code');
const btn   = document.getElementById('btn');
const err   = document.getElementById('err');

// If ?invite= in URL: auto-fill and submit
const urlInvite = new URLSearchParams(location.search).get('invite');
if (urlInvite) { input.value = urlInvite; check(); }

input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });

async function check() {
  const token = input.value.trim();
  if (!token) return;
  btn.disabled = true; btn.textContent = '…'; err.style.display = 'none';
  try {
    const res = await fetch('/api/check_invite?invite=' + encodeURIComponent(token));
    if (res.ok) {
      // 30 Tage Cookie
      document.cookie = `invite_token=${token}; path=/; SameSite=Lax; max-age=2592000`;
      location.reload();
    } else {
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Weiter →';
    }
  } catch {
    err.textContent = 'Server nicht erreichbar.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Weiter →';
  }
}
</script>
</body>
</html>
