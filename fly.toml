# fly.toml app configuration file generated for ber-chronik on 2026-04-20T22:27:58+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ber-chronik'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_ROOT  = '/mnt/data'
  PYTHONPATH = '/app'

[processes]
  app = '/app/.venv/bin/uvicorn src.generalized.dev_server:app --host 0.0.0.0 --port 8001'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source      = 'ber_data'
  destination = '/mnt/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
